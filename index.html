<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEBS Smart Attendance</title>
    <link rel="icon" href="logo.png">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root{--p:#1a3a6b;--pl:#2a5298;--s:#00c853;--w:#ff9800;--d:#e74c3c;--blue:#2196f3;--gold:#d4a843}
        body{font-family:'Inter',sans-serif;background:linear-gradient(180deg,#e8f0fe 0%,#f5f7fa 100%);color:#1a1a2e;min-height:100vh;margin:0}
        .dt body,body.dt{background:linear-gradient(180deg,#0d1b2a 0%,#1b2838 100%);color:#e0e0e0}
        *{margin:0;padding:0;box-sizing:border-box}a{text-decoration:none;color:inherit}ul{list-style:none}button{cursor:pointer;border:none;outline:none;font-family:inherit}input,select,textarea{font-family:inherit;font-size:.88rem;border:2px solid #dde3ea;border-radius:12px;padding:12px 16px;background:#fff;color:#1a1a2e;width:100%;transition:.2s}input:focus,select:focus,textarea:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(26,58,107,.08);outline:none}textarea{resize:vertical;min-height:50px}
        .ac{display:flex;min-height:100vh}.mc{flex:1;margin-left:240px;min-height:100vh;display:flex;flex-direction:column}.sb{width:240px;height:100vh;background:linear-gradient(180deg,#0f1f3a,#1a3a6b);position:fixed;left:0;top:0;z-index:1000;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,.1)}.sh{padding:20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06)}.slogo{width:38px;height:38px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}.slogo img{width:30px;height:30px;object-fit:contain}.sn{font-weight:700;font-size:.95rem;color:#fff}.snv{flex:1;overflow-y:auto;padding:12px 8px}.sm{display:flex;flex-direction:column;gap:2px}.si{border-radius:10px;transition:.15s}.si:hover{background:rgba(255,255,255,.06)}.si.act{background:rgba(255,255,255,.12)}.sl{display:flex;align-items:center;gap:10px;padding:10px 14px;color:#b0bec5;font-size:.84rem;font-weight:500;border-radius:10px}.sl i{font-size:1.05rem;width:20px;text-align:center}.sf{padding:12px 8px;border-top:1px solid rgba(255,255,255,.06)}.slo{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(231,76,60,.08);color:#ec7063;font-size:.84rem;font-weight:500;border-radius:10px}.so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;backdrop-filter:blur(2px)}.so.act{display:block}.tb{height:68px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid #e8edf2;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:900}#pt{font-size:1.15rem;font-weight:700}.td{font-size:.75rem;color:#5a6070}.tt{font-size:.8rem;font-weight:700;color:var(--p);font-family:monospace}.ttb{background:#edf1f7;color:#1a1a2e;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;transition:.2s}.ttb:hover{background:var(--p);color:#fff}.pc{flex:1;padding:24px;overflow-y:auto}
        .lc{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a1628 0%,#1a3a6b 50%,#2196f3 100%)}.lcd{width:100%;max-width:400px;background:#fff;border-radius:28px;padding:48px 36px;box-shadow:0 30px 80px rgba(0,0,0,.25);text-align:center;animation:fadeUp .5s}.llw{width:76px;height:76px;margin:0 auto 16px;border-radius:18px;background:linear-gradient(135deg,#f8f9fc,#fff);display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 4px 20px rgba(26,58,107,.1)}.llw img{width:58px;height:58px;object-fit:contain}.lsn{font-size:1.4rem;font-weight:800;color:#1a1a2e;line-height:1.3}.lst{font-size:.7rem;color:#636e72;font-weight:500;text-transform:uppercase;letter-spacing:2px;margin-top:3px}.ld{display:flex;align-items:center;gap:12px;margin:24px 0}.ld::before,.ld::after{content:'';flex:1;height:1px;background:#e0e5ec}.glb{width:100%;padding:14px 20px;background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(26,58,107,.2)}.glb:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(26,58,107,.3)}
        .card{background:#fff;border-radius:18px;padding:20px 24px;box-shadow:0 2px 8px rgba(0,0,0,.04);border:1px solid #eef1f6;margin-bottom:16px}.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}.stc{background:#fff;border-radius:18px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,.04);border:1px solid #eef1f6;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.2s}.stc:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.06)}.sci{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem}.sci.b{background:rgba(26,58,107,.06);color:var(--p)}.sci.g{background:rgba(0,200,83,.06);color:var(--s)}.sci.o{background:rgba(255,152,0,.06);color:var(--w)}.sci.r{background:rgba(231,76,60,.06);color:var(--d)}.sti h3{font-size:1.5rem;font-weight:800;line-height:1}.sti p{font-size:.68rem;color:#5a6070;margin-top:2px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:10px;font-weight:600;font-size:.82rem;cursor:pointer;transition:.15s}.btn-p{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;box-shadow:0 2px 8px rgba(26,58,107,.15)}.btn-p:hover{box-shadow:0 4px 16px rgba(26,58,107,.25);transform:translateY(-1px)}.btn-s{background:linear-gradient(135deg,#00c853,#00e676);color:#fff;box-shadow:0 2px 8px rgba(0,200,83,.15)}.btn-d{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}.btn-lg{padding:14px 26px;font-size:.9rem;border-radius:12px}.tbc{overflow-x:auto;border-radius:14px;border:1px solid #eef1f6}table{width:100%;border-collapse:collapse;background:#fff}thead{background:#f8f9fc}th{padding:12px 16px;text-align:left;font-weight:600;font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;color:#5a6070}td{padding:10px 16px;border-top:1px solid #f4f6f9;font-size:.8rem}.fg{margin-bottom:12px}.fl{display:block;font-size:.7rem;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;color:#5a6070}.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}.nc{position:fixed;top:16px;right:16px;z-index:3000}.nt{background:#fff;border-radius:12px;padding:12px 16px;box-shadow:0 8px 28px rgba(0,0,0,.1);display:flex;align-items:flex-start;gap:10px;border-left:4px solid var(--p);min-width:260px;animation:slideIn .2s;font-size:.8rem}.nt.success{border-left-color:var(--s)}.spinner{width:32px;height:32px;border:3px solid #eef1f6;border-top-color:var(--p);border-radius:50%;animation:spin .4s linear infinite;margin:16px auto}
        .cam-box{position:relative;background:linear-gradient(160deg,#0d1b2a,#1a2d44);border-radius:20px;overflow:hidden;width:100%;max-width:640px;margin:0 auto;aspect-ratio:4/3;box-shadow:0 20px 60px rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06)}.cam-box video{width:100%;height:100%;object-fit:cover}.cam-box canvas{position:absolute;top:0;left:0;width:100%;height:100%}.cam-hud{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;z-index:5}.hud-badge{background:rgba(0,0,0,.45);backdrop-filter:blur(10px);color:#fff;padding:7px 14px;border-radius:20px;font-size:.7rem;font-weight:600;display:flex;align-items:center;gap:7px;border:1px solid rgba(255,255,255,.08)}.hud-dot{width:9px;height:9px;border-radius:50%}.hud-dot.on{background:#00e676;box-shadow:0 0 10px rgba(0,230,118,.5);animation:pulse 1s infinite}.hud-dot.off{background:#e74c3c}.match-badge{background:rgba(0,0,0,.45);backdrop-filter:blur(10px);color:#fff;padding:7px 14px;border-radius:20px;font-size:.7rem;font-weight:600;border:1px solid rgba(255,255,255,.08)}
        .success-overlay{position:absolute;inset:0;background:rgba(0,200,83,.06);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:20}.success-card{background:#fff;border-radius:20px;padding:28px 32px;text-align:center;animation:scaleIn .25s;box-shadow:0 20px 50px rgba(0,0,0,.15)}.success-icon{font-size:3rem;animation:bounceIn .4s}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);z-index:2500;display:flex;align-items:center;justify-content:center}.modal{background:#fff;border-radius:20px;padding:28px;max-width:520px;width:95%;max-height:80vh;overflow-y:auto;animation:scaleIn .2s}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}@keyframes scaleIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}@keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}@media(max-width:1024px){.mc{margin-left:0}.sr{grid-template-columns:repeat(2,1fr)}.sb{transform:translateX(-100%);width:240px}.sb.mo{transform:translateX(0)}}@media(max-width:768px){.pc{padding:12px}.sr{grid-template-columns:1fr}.fr{grid-template-columns:1fr}.cam-box{aspect-ratio:1/1}}
    </style>
</head>
<body>

<div id="lp" class="lc"><div class="lcd"><div class="llw"><img src="logo.png" alt="SEBS" onerror="this.innerHTML='🏫'"></div><h1 class="lsn">Systematic English<br>Boarding School</h1><p class="lst">Smart Attendance System</p><div class="ld"><span>Secure Access</span></div><button class="glb" onclick="login()">🔑 Sign in to Continue</button></div></div>

<div id="app" class="ac" style="display:none">
    <aside id="sb" class="sb"><div class="sh"><div class="slogo"><img src="logo.png" alt="SEBS" onerror="this.innerHTML='🏫'"></div><h2 class="sn">SEBS</h2></div><nav class="snv"><ul class="sm">
        <li class="si act" data-p="db"><a href="#" class="sl" onclick="nav('db')"><i class="fas fa-th-large"></i><span>Dashboard</span></a></li>
        <li class="si" data-p="att"><a href="#" class="sl" onclick="nav('att')"><i class="fas fa-camera"></i><span>Live Attendance</span></a></li>
        <li class="si" data-p="stu"><a href="#" class="sl" onclick="nav('stu')"><i class="fas fa-users"></i><span>Students</span></a></li>
        <li class="si" data-p="rep"><a href="#" class="sl" onclick="nav('rep')"><i class="fas fa-chart-bar"></i><span>Reports</span></a></li>
    </ul></nav><div class="sf"><button class="slo" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button></div></aside>
    <div class="so" id="so" onclick="cmsb()"></div>
    <main class="mc"><header class="tb"><span id="pt">Dashboard</span><div style="display:flex;align-items:center;gap:14px"><span class="td" id="td"></span><span class="tt" id="tt"></span><button class="ttb" onclick="tth()" id="tth"><i class="fas fa-moon"></i></button></div></header><div class="pc" id="pc"></div></main>
</div>
<div class="nc" id="nc"></div>
<div id="modalContainer"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbxqvvfI1j8aOnKNKjnnSfaGPJw5ANiW6XEnLehaHxJ8YjjegbId8uvcMcHQSaxzHkjM/exec';
const MODELS='https://raw.githubusercontent.com/sebs-school/sebs-smart-attendance/main/models';
let th='lt',stream=null,attendanceActive=false,modelsLoaded=false,preloading=false;
let faceMatcher=null,markedToday={},pendingDescriptor=null;
let lastMark=0,scanning=true,prevEAR=1,motionFrames=0;

function init(){updateTime();setInterval(updateTime,1000);if(localStorage.getItem('s-login')==='1'){showApp();nav('db');}if(localStorage.getItem('s-theme')==='dt'){th='dt';document.body.className='dt';document.getElementById('tth').innerHTML='<i class="fas fa-sun"></i>';}}
function updateTime(){const n=new Date();document.getElementById('td').textContent=n.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});document.getElementById('tt').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function tth(){th=th==='lt'?'dt':'lt';document.body.className=th;document.getElementById('tth').innerHTML=th==='dt'?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';localStorage.setItem('s-theme',th);}
function login(){localStorage.setItem('s-login','1');showApp();nav('db');notify('✅ स्वागत छ! / Welcome!','success');}
function logout(){stopAttendance();localStorage.removeItem('s-login');document.getElementById('lp').style.display='flex';document.getElementById('app').style.display='none';}
function showApp(){document.getElementById('lp').style.display='none';document.getElementById('app').style.display='flex';}
function tmsb(){document.getElementById('sb').classList.toggle('mo');document.getElementById('so').classList.toggle('act');}
function cmsb(){document.getElementById('sb').classList.remove('mo');document.getElementById('so').classList.remove('act');}
function notify(m,t){const n=document.createElement('div');n.className=`nt ${t}`;n.innerHTML=`<div>${m}</div>`;document.getElementById('nc').appendChild(n);setTimeout(()=>{n.style.opacity='0';setTimeout(()=>n.remove(),150);},2500);}
async function api(action,data=null){try{if(data){const r=await fetch(API,{method:'POST',body:JSON.stringify({action,...data})});return await r.json();}else{const r=await fetch(API+'?action='+action);return await r.json();}}catch(e){return null;}}
function showModal(html){document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()">${html}</div></div>`;}

async function preloadModels(){if(modelsLoaded||preloading)return;preloading=true;await Promise.all([faceapi.nets.tinyFaceDetector.loadFromUri(MODELS),faceapi.nets.faceLandmark68Net.loadFromUri(MODELS),faceapi.nets.faceRecognitionNet.loadFromUri(MODELS)]);modelsLoaded=true;preloading=false;await loadAllEmbeddings();}
async function loadAllEmbeddings(){const d=await api('getAllEmbeddings');if(!d||!d.embeddings||d.embeddings.length===0){faceMatcher=null;return;}let lb=[];for(let e of d.embeddings){if(e.embedding&&Array.isArray(e.embedding))lb.push(new faceapi.LabeledFaceDescriptors(e.studentId,[new Float32Array(e.embedding)]));}faceMatcher=lb.length>0?new faceapi.FaceMatcher(lb,0.4):null;}

function nav(p){
    document.querySelectorAll('.si').forEach(e=>e.classList.remove('act'));
    const i=document.querySelector(`[data-p="${p}"]`);if(i)i.classList.add('act');
    document.getElementById('pt').textContent={db:'Dashboard',att:'Live Attendance',stu:'Students',rep:'Reports'}[p]||p;
    if(p==='att')preloadModels();else stopAttendance();
    const c=document.getElementById('pc');
    if(p==='db')loadDb(c);else if(p==='att')loadAtt(c);else if(p==='stu')loadStu(c);else if(p==='rep')loadRep(c);cmsb();
}

async function loadDb(c){c.innerHTML='<div class="spinner"></div>';const d=await api('getDashboard');if(!d){c.innerHTML='<p>Error</p>';return;}c.innerHTML=`<div class="sr"><div class="stc" onclick="nav('stu')"><div class="sci b"><i class="fas fa-users"></i></div><div class="sti"><h3>${d.totalStudents||0}</h3><p>Total</p></div></div><div class="stc"><div class="sci g"><i class="fas fa-check-circle"></i></div><div class="sti"><h3>${d.present||0}</h3><p>Present</p></div></div><div class="stc"><div class="sci o"><i class="fas fa-clock"></i></div><div class="sti"><h3>${d.late||0}</h3><p>Late</p></div></div><div class="stc"><div class="sci r"><i class="fas fa-times-circle"></i></div><div class="sti"><h3>${d.absent||0}</h3><p>Absent</p></div></div></div><button class="btn btn-p btn-lg" style="width:100%" onclick="nav('att')"><i class="fas fa-camera"></i> Start Attendance</button>`;}

function loadAtt(c){c.innerHTML=`<div><div class="cam-box"><video id="cam" autoplay playsinline muted></video><canvas id="overlay"></canvas><div class="cam-hud"><span class="hud-badge"><span class="hud-dot off" id="hudDot"></span><span id="hudText">Stopped</span></span><span class="match-badge" id="matchBadge" style="display:none"></span></div><div id="successOverlay" style="display:none"></div></div><div style="text-align:center;margin-top:14px;display:flex;gap:8px;justify-content:center"><button class="btn btn-p btn-lg" id="startBtn" onclick="startAttendance()"><i class="fas fa-play"></i> Start Attendance</button><button class="btn btn-d btn-lg" id="stopBtn" onclick="stopAttendance()" style="display:none"><i class="fas fa-stop"></i> Stop</button></div></div>`;}

async function startAttendance(){
    if(!modelsLoaded){notify('⏳ Loading models...','warning');await preloadModels();}
    try{stream=await navigator.mediaDevices.getUserMedia({video:{width:256,height:192,facingMode:'user'}});document.getElementById('cam').srcObject=stream;document.getElementById('startBtn').style.display='none';document.getElementById('stopBtn').style.display='inline-flex';document.getElementById('hudText').textContent='Active';document.getElementById('hudDot').className='hud-dot on';attendanceActive=true;scanning=true;detectFaces();notify('✅ Ready! Show face','success');}catch(e){notify('❌ Camera error','error');stopAttendance();}
}

function stopAttendance(){attendanceActive=false;if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}document.getElementById('hudText').textContent='Stopped';document.getElementById('hudDot').className='hud-dot off';document.getElementById('startBtn').style.display='inline-flex';document.getElementById('stopBtn').style.display='none';document.getElementById('successOverlay').style.display='none';document.getElementById('matchBadge').style.display='none';}

async function detectFaces(){
    if(!attendanceActive||!scanning)return;
    const video=document.getElementById('cam'),canvas=document.getElementById('overlay');if(!video||!canvas)return;
    try{
        const det=await faceapi.detectAllFaces(video,new faceapi.TinyFaceDetectorOptions({inputSize:96,scoreThreshold:0.35})).withFaceLandmarks().withFaceDescriptors();
        canvas.width=video.videoWidth;canvas.height=video.videoHeight;const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);
        const rs=faceapi.resizeResults(det,{width:video.videoWidth,height:video.videoHeight});
        if(rs.length>0){
            const d=rs[0],box=d.detection.box;let bm=null,ik=false;
            if(faceMatcher&&d.descriptor){bm=faceMatcher.findBestMatch(d.descriptor);ik=bm.label!=='unknown'&&bm.distance<0.45;}
            const color=ik?'#00c853':'#2196f3',cx=box.x+box.width/2,cy=box.y+box.height/2,r=Math.max(box.width,box.height)/1.4;
            const g=ctx.createRadialGradient(cx,cy,r*.6,cx,cy,r*1.5);g.addColorStop(0,color+')'.replace(')','').replace('rgb','rgba')+',0.1)');g.addColorStop(1,'transparent');
            ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r*1.5,0,2*Math.PI);ctx.fill();
            ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.shadowColor=color;ctx.shadowBlur=14;ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);ctx.stroke();ctx.shadowBlur=0;
            ctx.strokeStyle=color;ctx.lineWidth=1.2;ctx.setLineDash([5,3]);ctx.beginPath();ctx.arc(cx,cy,r-5,0,2*Math.PI);ctx.stroke();ctx.setLineDash([]);
            for(let a=0;a<360;a+=72){ctx.fillStyle=color;ctx.beginPath();ctx.arc(cx+Math.cos(a*Math.PI/180)*(r+7),cy+Math.sin(a*Math.PI/180)*(r+7),2.5,0,2*Math.PI);ctx.fill();}
            const lb=ik?'✅ '+bm.label.substring(0,10):'🆕 New Face';ctx.font='bold 11px Inter';const tw=ctx.measureText(lb).width,ly=cy+r+24;
            ctx.fillStyle='rgba(0,0,0,.7)';ctx.beginPath();ctx.roundRect(cx-tw/2-9,ly-13,tw+18,20,10);ctx.fill();ctx.fillStyle='#fff';ctx.fillText(lb,cx-tw/2,ly+1);
            document.getElementById('matchBadge').style.display='flex';document.getElementById('matchBadge').textContent=ik?'✅ Recognized':'🆕 New';document.getElementById('matchBadge').style.borderColor=color;
            if(Date.now()-lastMark>2000&&d.descriptor){const live=checkLive(d);if(live){lastMark=Date.now();scanning=false;
                if(ik){const sid=bm.label;if(!markedToday[sid]){const r=await api('markAttendance',{studentName:sid,studentId:sid,class:'',section:'',rollNumber:'',confidence:(1-bm.distance).toFixed(2)});if(r&&r.success){markedToday[sid]=true;showSuccess(sid,r.status||'Present');}else scanning=true;}else{notify('⚠️ '+sid+' - Already marked today!','warning');scanning=true;}}
                else{pendingDescriptor=Array.from(d.descriptor);showRegModal();}
            }}
        }else{document.getElementById('matchBadge').style.display='none';motionFrames=0;}
    }catch(e){}
    if(attendanceActive&&scanning)requestAnimationFrame(detectFaces);
}

function checkLive(detection){if(!detection.landmarks)return true;const lm=detection.landmarks,le=eyeAR(lm.positions,38,40,36,39),re=eyeAR(lm.positions,44,46,42,45),ear=(le+re)/2;let blinked=(ear<0.2&&prevEAR>0.2);prevEAR=ear;if(!blinked){motionFrames++;if(motionFrames>5){motionFrames=0;return true;}}else{motionFrames=0;notify('✅ Liveness: Blink Detected!','success');return true;}return false;}
function eyeAR(lm,t,b,lt,rt){const tp=lm[t],bp=lm[b],lp=lm[lt],rp=lm[rt],v=Math.abs(tp.y-bp.y),h=Math.abs(lp.x-rp.x);return h<.001?1:v/h;}

function showSuccess(name,status){const ov=document.getElementById('successOverlay');ov.style.display='flex';ov.innerHTML=`<div class="success-card"><div class="success-icon">✅</div><h3 style="color:#00c853;margin-top:4px">${status}!</h3><p style="font-weight:700;font-size:1rem">${name}</p><p style="color:#5a6070;font-size:.75rem;margin-top:2px">हाजिर भयो! / Marked!</p></div>`;setTimeout(()=>{ov.style.display='none';scanning=true;detectFaces();},1800);}

function showRegModal(){showModal(`<h3 style="margin-bottom:2px;color:#2196f3">🆕 New Face Detected</h3><p style="color:#00c853;font-weight:600;margin-bottom:10px;font-size:.8rem">✅ Liveness Verified</p><form onsubmit="return quickReg(event)"><div class="fr"><div class="fg"><label class="fl">Full Name *</label><input id="qn" required></div><div class="fg"><label class="fl">Admission No</label><input id="qa"></div></div><div class="fr"><div class="fg"><label class="fl">Class *</label><select id="qc" required><option value="">Select</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select></div><div class="fg"><label class="fl">Section</label><select id="qs"><option value="">Select</option><option>JUPITER</option><option>SATURN</option><option>URANUS</option><option>NEPTUNE</option></select></div></div><div class="fr"><div class="fg"><label class="fl">Roll Number</label><input id="qr"></div><div class="fg"><label class="fl">Gender</label><select id="qg"><option value="">Select</option><option>Male</option><option>Female</option></select></div></div><div class="fr"><div class="fg"><label class="fl">Father Name</label><input id="qf"></div><div class="fg"><label class="fl">Mother Name</label><input id="qm"></div></div><div class="fr"><div class="fg"><label class="fl">Phone</label><input id="qp"></div><div class="fg"><label class="fl">Address</label><textarea id="qad"></textarea></div></div><button class="btn btn-p btn-lg" style="width:100%;margin-top:10px"><i class="fas fa-save"></i> Register & Mark Present</button></form>`);}

async function quickReg(e){e.preventDefault();const d={studentName:document.getElementById('qn').value,admissionNumber:document.getElementById('qa').value,class:document.getElementById('qc').value,section:document.getElementById('qs').value,rollNumber:document.getElementById('qr').value,gender:document.getElementById('qg').value,fatherName:document.getElementById('qf').value,motherName:document.getElementById('qm').value,guardianPhone:document.getElementById('qp').value,address:document.getElementById('qad').value};if(pendingDescriptor)d.embedding=pendingDescriptor;const r=await api('registerStudent',d);if(r&&r.success){await api('markAttendance',{studentName:d.studentName,studentId:r.studentId,class:d.class,section:d.section,rollNumber:d.rollNumber,confidence:'0.99'});notify('✅ '+d.studentName+' Registered & Marked!','success');document.getElementById('modalContainer').innerHTML='';loadAllEmbeddings();showSuccess(d.studentName,'Present');}else{notify('❌ Failed!','error');scanning=true;detectFaces();}return false;}

async function loadStu(c){c.innerHTML='<div class="spinner"></div>';const d=await api('getStudents');if(!d||!d.students){c.innerHTML='<div class="card"><p style="text-align:center;padding:30px;color:#5a6070">No students registered yet</p></div>';return;}let h='<div class="card"><h2 style="margin-bottom:12px">👨‍🎓 Students ('+d.students.length+')</h2><div class="tbc"><table><thead><tr><th>ID</th><th>Name</th><th>Class</th><th>Section</th><th>Roll</th><th>Gender</th><th>Phone</th></tr></thead><tbody>';d.students.forEach(s=>{h+=`<tr><td><small>${s.StudentID||'-'}</small></td><td><strong>${s.StudentName||'-'}</strong></td><td>${s.Class||'-'}</td><td>${s.Section||'-'}</td><td>${s.RollNumber||'-'}</td><td>${s.Gender||'-'}</td><td>${s.GuardianPhone||'-'}</td></tr>`;});h+='</tbody></table></div></div>';c.innerHTML=h;}
function loadRep(c){c.innerHTML=`<div class="card"><h2 style="margin-bottom:12px">📊 Reports</h2><button class="btn btn-p" onclick="loadRepData()"><i class="fas fa-download"></i> Load Data</button></div><div id="rv" style="margin-top:12px"></div>`;}
async function loadRepData(){const v=document.getElementById('rv');v.innerHTML='<div class="spinner"></div>';const d=await api('getStudents');if(!d){v.innerHTML='<p>Error</p>';return;}v.innerHTML='<div class="card"><table><thead><tr><th>Name</th><th>Class</th><th>Section</th><th>Roll</th><th>Phone</th></tr></thead><tbody>'+d.students.map(s=>`<tr><td><strong>${s.StudentName}</strong></td><td>${s.Class}</td><td>${s.Section}</td><td>${s.RollNumber}</td><td>${s.GuardianPhone||'-'}</td></tr>`).join('')+'</tbody></table></div>';}

document.addEventListener('DOMContentLoaded',init);
</script>
