<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEBS Smart Attendance</title>
    <link rel="icon" href="logo.png">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/face_detection.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root{--p:#1a3a6b;--s:#00c853;--w:#ff9800;--d:#e74c3c;--blue:#2196f3}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(175deg,#e3ecfa,#f0f4fa,#f8f9fc);color:#1a1a2e;min-height:100vh}
        a{text-decoration:none;color:inherit}ul{list-style:none}
        button{cursor:pointer;border:none;outline:none;font-family:inherit}
        input,select,textarea{font-family:inherit;font-size:.9rem;border:2px solid #dde4f0;border-radius:12px;padding:12px 16px;background:#fff;color:#1a1a2e;width:100%}input:focus,select:focus,textarea:focus{border-color:var(--p);outline:none}textarea{resize:vertical;min-height:55px}
        .ac{display:flex;min-height:100vh}.mc{flex:1;margin-left:250px;display:flex;flex-direction:column}
        .sb{width:250px;height:100vh;background:linear-gradient(180deg,#0a1628,#1a3a6b);position:fixed;left:0;top:0;z-index:1000;display:flex;flex-direction:column}
        .sh{padding:22px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06)}.slogo{width:40px;height:40px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}.slogo img{width:32px;height:32px;object-fit:contain}.sn{font-weight:700;font-size:1rem;color:#fff}
        .snv{flex:1;overflow-y:auto;padding:16px 10px}.sm{display:flex;flex-direction:column;gap:3px}.si{border-radius:10px}.si:hover{background:rgba(255,255,255,.05)}.si.act{background:rgba(255,255,255,.12)}.sl{display:flex;align-items:center;gap:12px;padding:11px 16px;color:#b8c9e0;font-size:.85rem;font-weight:500;border-radius:10px}.sl i{font-size:1.1rem;width:22px}.sf{padding:14px 10px;border-top:1px solid rgba(255,255,255,.06)}.slo{width:100%;display:flex;align-items:center;gap:12px;padding:11px 16px;background:rgba(231,76,60,.06);color:#f4877a;font-size:.85rem;font-weight:500;border-radius:10px}.so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999}.so.act{display:block}
        .tb{height:70px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:900}#pt{font-size:1.2rem;font-weight:700}.td{font-size:.78rem;color:#64748b}.tt{font-size:.82rem;font-weight:700;color:var(--p);font-family:monospace}.ttb{background:#edf2f9;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}.pc{flex:1;padding:28px;overflow-y:auto}
        .lc{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#060d1f,#1a3a6b,#2a5298)}.lcd{width:100%;max-width:420px;background:#fff;border-radius:28px;padding:52px 40px;box-shadow:0 35px 100px rgba(0,0,0,.3);text-align:center;animation:fadeUp .6s}.llw{width:80px;height:80px;margin:0 auto 18px;border-radius:20px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}.llw img{width:62px;height:62px;object-fit:contain}.lsn{font-size:1.5rem;font-weight:800;color:#1a1a2e}.lst{font-size:.72rem;color:#64748b;text-transform:uppercase;letter-spacing:2px}.ld{display:flex;align-items:center;gap:14px;margin:28px 0}.ld::before,.ld::after{content:'';flex:1;height:1px;background:#e2e8f0}.glb{width:100%;padding:15px 24px;background:linear-gradient(135deg,var(--p),#2a5298);color:#fff;border-radius:14px;font-size:.92rem;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(26,58,107,.2)}
        .card{background:#fff;border-radius:18px;padding:22px 26px;box-shadow:0 2px 12px rgba(0,0,0,.03);border:1px solid #eef2f8;margin-bottom:18px}.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}.stc{background:#fff;border-radius:18px;padding:20px 22px;box-shadow:0 2px 12px rgba(0,0,0,.03);border:1px solid #eef2f8;display:flex;align-items:center;gap:16px;cursor:pointer}.sci{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem}.sci.b{background:rgba(26,58,107,.08);color:var(--p)}.sci.g{background:rgba(0,200,83,.08);color:var(--s)}.sti h3{font-size:1.6rem;font-weight:800}.sti p{font-size:.7rem;color:#64748b;text-transform:uppercase}
        .btn{display:inline-flex;align-items:center;gap:7px;padding:11px 20px;border-radius:10px;font-weight:600;font-size:.84rem;cursor:pointer}.btn-p{background:linear-gradient(135deg,var(--p),#2a5298);color:#fff}.btn-s{background:linear-gradient(135deg,#00c853,#00e676);color:#fff}.btn-d{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}.btn-o{background:#fff;border:2px solid #dde4f0}.btn-lg{padding:15px 28px;font-size:.92rem;border-radius:12px}
        .tbc{overflow-x:auto;border-radius:16px;border:1px solid #eef2f8}table{width:100%;border-collapse:collapse}thead{background:#f8fafd}th{padding:13px 18px;text-align:left;font-weight:600;font-size:.7rem;text-transform:uppercase;color:#64748b}td{padding:11px 18px;border-top:1px solid #f4f7fb;font-size:.82rem}
        .fg{margin-bottom:14px}.fl{display:block;font-size:.72rem;font-weight:600;margin-bottom:5px;text-transform:uppercase;color:#64748b}.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
        .nc{position:fixed;top:18px;right:18px;z-index:3000}.nt{background:#fff;border-radius:12px;padding:14px 18px;box-shadow:0 10px 35px rgba(0,0,0,.12);display:flex;align-items:flex-start;gap:10px;border-left:4px solid var(--p);min-width:280px;animation:slideIn .25s;font-size:.82rem}.nt.success{border-left-color:var(--s)}
        .spinner{width:36px;height:36px;border:3px solid #eef2f8;border-top-color:var(--p);border-radius:50%;animation:spin .5s linear infinite;margin:18px auto}
        .cam-box{position:relative;background:linear-gradient(170deg,#080f1a,#162540);border-radius:22px;overflow:hidden;width:100%;max-width:700px;margin:0 auto;aspect-ratio:4/3;box-shadow:0 24px 64px rgba(0,0,0,.3)}.cam-box video{width:100%;height:100%;object-fit:cover}.cam-box canvas{position:absolute;top:0;left:0;width:100%;height:100%}
        .cam-hud{position:absolute;top:16px;left:16px;right:16px;display:flex;justify-content:space-between;z-index:5}.hud-badge{background:rgba(0,0,0,.5);color:#fff;padding:8px 16px;border-radius:22px;font-size:.72rem;display:flex;align-items:center;gap:8px}.hud-dot{width:10px;height:10px;border-radius:50%}.hud-dot.on{background:#00e676;animation:pulse 1.2s infinite}.hud-dot.off{background:#e74c3c}
        .success-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:20}.success-card{background:#fff;border-radius:22px;padding:32px;text-align:center;animation:scaleIn .3s}.success-icon{font-size:3.5rem}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2500;display:flex;align-items:center;justify-content:center}.modal{background:#fff;border-radius:22px;padding:30px;max-width:560px;width:95%;max-height:82vh;overflow-y:auto}
        @keyframes fadeUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}@keyframes slideIn{from{opacity:0;transform:translateX(35px)}to{opacity:1;transform:translateX(0)}}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
        @media(max-width:1024px){.mc{margin-left:0}.sr{grid-template-columns:repeat(2,1fr)}.sb{transform:translateX(-100%)}.sb.mo{transform:translateX(0)}}@media(max-width:768px){.sr{grid-template-columns:1fr}.fr,.fr3{grid-template-columns:1fr}.cam-box{aspect-ratio:1/1}}
    </style>
</head>
<body>

<div id="lp" class="lc"><div class="lcd"><div class="llw"><img src="logo.png" alt="SEBS" onerror="this.innerHTML='🏫'"></div><h1 class="lsn">Systematic English<br>Boarding School</h1><p class="lst">Smart Attendance System</p><div class="ld"><span>सुरक्षित पहुँच</span></div><button class="glb" onclick="login()">🔑 Sign in to Continue</button></div></div>

<div id="app" class="ac" style="display:none">
    <aside id="sb" class="sb"><div class="sh"><div class="slogo"><img src="logo.png" alt="SEBS" onerror="this.innerHTML='🏫'"></div><h2 class="sn">SEBS</h2></div><nav class="snv"><ul class="sm">
        <li class="si act" data-p="db"><a href="#" class="sl" onclick="nav('db')"><i class="fas fa-th-large"></i><span>Dashboard</span></a></li>
        <li class="si" data-p="att"><a href="#" class="sl" onclick="nav('att')"><i class="fas fa-camera"></i><span>Live Attendance</span></a></li>
        <li class="si" data-p="reg"><a href="#" class="sl" onclick="nav('reg')"><i class="fas fa-user-plus"></i><span>Registration</span></a></li>
        <li class="si" data-p="stu"><a href="#" class="sl" onclick="nav('stu')"><i class="fas fa-users"></i><span>Students</span></a></li>
        <li class="si" data-p="rep"><a href="#" class="sl" onclick="nav('rep')"><i class="fas fa-chart-bar"></i><span>Reports</span></a></li>
    </ul></nav><div class="sf"><button class="slo" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button></div></aside>
    <div class="so" id="so" onclick="cmsb()"></div>
    <main class="mc"><header class="tb"><span id="pt">Dashboard</span><div style="display:flex;gap:16px"><span class="td" id="td"></span><span class="tt" id="tt"></span><button class="ttb" onclick="tth()" id="tth"><i class="fas fa-moon"></i></button></div></header><div class="pc" id="pc"></div></main>
</div>
<div class="nc" id="nc"></div>
<div id="modalContainer"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbxqvvfI1j8aOnKNKjnnSfaGPJw5ANiW6XEnLehaHxJ8YjjegbId8uvcMcHQSaxzHkjM/exec';
const MODELS='https://raw.githubusercontent.com/sebs-school/sebs-smart-attendance/main/models';
let th='lt',stream=null,attendanceActive=false,modelsLoaded=false;
let faceMatcher=null,markedToday={},pendingDescriptor=null;
let lastMark=0,scanning=true,faceDetection,faceDetected=false,detectedBox=null;
let prevEAR=1,motionFrames=0,detectCount=0;

function init(){updateTime();setInterval(updateTime,1000);if(localStorage.getItem('s-login')==='1'){showApp();nav('db');}}
function updateTime(){const n=new Date();document.getElementById('td').textContent=n.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});document.getElementById('tt').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function tth(){th=th==='lt'?'dt':'lt';document.body.style.background=th==='dt'?'linear-gradient(180deg,#0d1b2a,#1b2838)':'';document.getElementById('tth').innerHTML=th==='dt'?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';localStorage.setItem('s-theme',th);}
function login(){localStorage.setItem('s-login','1');showApp();nav('db');notify('✅ स्वागत छ!','success');}
function logout(){stopAttendance();localStorage.removeItem('s-login');document.getElementById('lp').style.display='flex';document.getElementById('app').style.display='none';}
function showApp(){document.getElementById('lp').style.display='none';document.getElementById('app').style.display='flex';}
function tmsb(){document.getElementById('sb').classList.toggle('mo');document.getElementById('so').classList.toggle('act');}
function cmsb(){document.getElementById('sb').classList.remove('mo');document.getElementById('so').classList.remove('act');}
function notify(m,t){const n=document.createElement('div');n.className=`nt ${t}`;n.innerHTML=`<div>${m}</div>`;document.getElementById('nc').appendChild(n);setTimeout(()=>n.remove(),3000);}
async function api(action,data=null){try{if(data){const r=await fetch(API,{method:'POST',body:JSON.stringify({action,...data})});return await r.json();}else{const r=await fetch(API+'?action='+action);return await r.json();}}catch(e){return null;}}
function showModal(html){document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()">${html}</div></div>`;}

async function preloadModels(){if(modelsLoaded)return;notify('⏳ Loading models...','warning');await Promise.all([faceapi.nets.faceLandmark68Net.loadFromUri(MODELS),faceapi.nets.faceRecognitionNet.loadFromUri(MODELS)]);modelsLoaded=true;await loadAllEmbeddings();notify('✅ Ready!','success');}
async function loadAllEmbeddings(){const d=await api('getAllEmbeddings');if(!d||!d.embeddings){faceMatcher=null;return;}let lb=[];for(let e of d.embeddings){if(e.embedding&&Array.isArray(e.embedding))lb.push(new faceapi.LabeledFaceDescriptors(e.studentId,[new Float32Array(e.embedding)]));}faceMatcher=lb.length>0?new faceapi.FaceMatcher(lb,0.42):null;}

function nav(p){
    document.querySelectorAll('.si').forEach(e=>e.classList.remove('act'));const i=document.querySelector(`[data-p="${p}"]`);if(i)i.classList.add('act');
    document.getElementById('pt').textContent={db:'Dashboard',att:'Live Attendance',reg:'Registration',stu:'Students',rep:'Reports'}[p]||p;
    if(p==='att')preloadModels();else stopAttendance();const c=document.getElementById('pc');
    if(p==='db')loadDb(c);else if(p==='att')loadAtt(c);else if(p==='reg')loadReg(c);else if(p==='stu')loadStu(c);else if(p==='rep')loadRep(c);cmsb();
}

async function loadDb(c){c.innerHTML='<div class="spinner"></div>';const d=await api('getDashboard');if(!d)return;c.innerHTML=`<div class="sr"><div class="stc"><div class="sci b"><i class="fas fa-users"></i></div><div class="sti"><h3>${d.totalStudents||0}</h3><p>Total</p></div></div><div class="stc"><div class="sci g"><i class="fas fa-check-circle"></i></div><div class="sti"><h3>${d.present||0}</h3><p>Present</p></div></div><div class="stc"><div class="sci g"><i class="fas fa-clock"></i></div><div class="sti"><h3>${d.late||0}</h3><p>Late</p></div></div><div class="stc"><div class="sci" style="background:rgba(231,76,60,.08);color:var(--d)"><i class="fas fa-times-circle"></i></div><div class="sti"><h3>${d.absent||0}</h3><p>Absent</p></div></div></div><button class="btn btn-p btn-lg" style="width:100%" onclick="nav('att')"><i class="fas fa-camera"></i> Start Attendance</button>`;}

function loadReg(c){c.innerHTML=`<div class="card" style="max-width:700px;margin:0 auto"><h2>📝 Student Registration</h2><form id="rf" onsubmit="return submitReg()"><div class="fr"><div class="fg"><label class="fl">Name *</label><input id="sn" required></div><div class="fg"><label class="fl">Admission No</label><input id="sa"></div></div><div class="fr3"><div class="fg"><label class="fl">Class *</label><select id="sc" required><option value="">Select</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select></div><div class="fg"><label class="fl">Section</label><select id="ss"><option value="">Select</option><option>JUPITER</option><option>SATURN</option><option>URANUS</option><option>NEPTUNE</option></select></div><div class="fg"><label class="fl">Roll</label><input id="sr"></div></div><div class="fr"><div class="fg"><label class="fl">Gender</label><select id="sg"><option value="">Select</option><option>Male</option><option>Female</option></select></div><div class="fg"><label class="fl">DOB</label><input type="date" id="sd"></div></div><div class="fr"><div class="fg"><label class="fl">Father</label><input id="sf"></div><div class="fg"><label class="fl">Mother</label><input id="sm"></div></div><div class="fr"><div class="fg"><label class="fl">Phone</label><input id="sp"></div><div class="fg"><label class="fl">Address</label><textarea id="saddr"></textarea></div></div><button class="btn btn-p btn-lg" style="width:100%;margin-top:8px"><i class="fas fa-save"></i> Register</button></form></div>`;}
async function submitReg(){const b=document.querySelector('#rf .btn');b.disabled=true;b.innerHTML='Saving...';const d={studentName:document.getElementById('sn').value,admissionNumber:document.getElementById('sa').value,class:document.getElementById('sc').value,section:document.getElementById('ss').value,rollNumber:document.getElementById('sr').value,gender:document.getElementById('sg').value,dateOfBirth:document.getElementById('sd').value,fatherName:document.getElementById('sf').value,motherName:document.getElementById('sm').value,guardianPhone:document.getElementById('sp').value,address:document.getElementById('saddr').value};const r=await api('registerStudent',d);b.disabled=false;b.innerHTML='<i class="fas fa-save"></i> Register';if(r&&r.success){notify('✅ '+d.studentName+' Registered!','success');document.getElementById('rf').reset();}else notify('❌ Failed!','error');return false;}

function loadAtt(c){c.innerHTML=`<div><div class="cam-box"><video id="cam" autoplay playsinline muted></video><canvas id="overlay"></canvas><div class="cam-hud"><span class="hud-badge"><span class="hud-dot off" id="hudDot"></span><span id="hudText">Stopped</span></span><span class="hud-badge" id="matchBadge" style="display:none"></span></div><div id="successOverlay" style="display:none"></div></div><div style="text-align:center;margin-top:16px;display:flex;gap:10px;justify-content:center"><button class="btn btn-p btn-lg" id="startBtn" onclick="startAttendance()"><i class="fas fa-play"></i> Start</button><button class="btn btn-d btn-lg" id="stopBtn" onclick="stopAttendance()" style="display:none"><i class="fas fa-stop"></i> Stop</button></div></div>`;}

async function startAttendance(){
    if(!modelsLoaded){await preloadModels();}
    try{stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}});document.getElementById('cam').srcObject=stream;document.getElementById('startBtn').style.display='none';document.getElementById('stopBtn').style.display='inline-flex';document.getElementById('hudText').textContent='Active';document.getElementById('hudDot').className='hud-dot on';
        faceDetection=new FaceDetection({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/${f}`});faceDetection.setOptions({model:'short',minDetectionConfidence:0.5});faceDetection.onResults(onFaceResult);
        const cam=new Camera(document.getElementById('cam'),{onFrame:async()=>{if(attendanceActive)await faceDetection.send({image:document.getElementById('cam')});},width:640,height:480});await cam.start();attendanceActive=true;scanning=true;notify('✅ Camera Active! MediaPipe Detection','success');}catch(e){notify('❌ Camera error','error');stopAttendance();}
}
function stopAttendance(){attendanceActive=false;if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}document.getElementById('hudText').textContent='Stopped';document.getElementById('hudDot').className='hud-dot off';document.getElementById('startBtn').style.display='inline-flex';document.getElementById('stopBtn').style.display='none';}

async function onFaceResult(results){
    if(!attendanceActive||!scanning)return;
    const canvas=document.getElementById('overlay'),video=document.getElementById('cam');if(!canvas||!video)return;
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);
    detectCount++;
    if(results.detections&&results.detections.length>0){
        const det=results.detections[0].boundingBox;faceDetected=true;detectedBox=det;
        const cx=det.xCenter*canvas.width/640,cy=det.yCenter*canvas.height/480;
        const rw=det.width*canvas.width/640,rh=det.height*canvas.height/480,rad=Math.max(rw,rh)/1.3;
        // Circular ring
        ctx.strokeStyle='#00c853';ctx.lineWidth=3;ctx.shadowColor='#00c853';ctx.shadowBlur=16;ctx.beginPath();ctx.arc(cx,cy,rad,0,2*Math.PI);ctx.stroke();ctx.shadowBlur=0;
        ctx.strokeStyle='#00c853';ctx.lineWidth=1;ctx.setLineDash([5,3]);ctx.beginPath();ctx.arc(cx,cy,rad-6,0,2*Math.PI);ctx.stroke();ctx.setLineDash([]);
        document.getElementById('matchBadge').style.display='flex';document.getElementById('matchBadge').textContent='🟢 Face Detected';
        if(detectCount%5===0)notify('✅ अनुहार भेटियो! / Face Found!','success');
        // Auto process after 1.5 sec of stable detection
        if(Date.now()-lastMark>2000){lastMark=Date.now();scanning=false;pendingDescriptor=null;showRegModal();stopAttendance();}
    }else{faceDetected=false;document.getElementById('matchBadge').style.display='none';if(detectCount%20===0)notify('📷 अनुहार खोज्दै...','warning');}
}

function showRegModal(){showModal(`<h3 style="color:#2196f3">🆕 Face Detected!</h3><p style="color:#00c853;font-weight:600">✅ MediaPipe Verified</p><form onsubmit="return quickReg(event)"><div class="fr"><div class="fg"><label class="fl">Name *</label><input id="qn" required></div><div class="fg"><label class="fl">Admission No</label><input id="qa"></div></div><div class="fr"><div class="fg"><label class="fl">Class *</label><select id="qc" required><option value="">Select</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select></div><div class="fg"><label class="fl">Section</label><select id="qs"><option value="">Select</option><option>JUPITER</option><option>SATURN</option><option>URANUS</option><option>NEPTUNE</option></select></div></div><div class="fr"><div class="fg"><label class="fl">Roll</label><input id="qr"></div><div class="fg"><label class="fl">Gender</label><select id="qg"><option value="">Select</option><option>Male</option><option>Female</option></select></div></div><div class="fr"><div class="fg"><label class="fl">Father</label><input id="qf"></div><div class="fg"><label class="fl">Mother</label><input id="qm"></div></div><div class="fr"><div class="fg"><label class="fl">Phone</label><input id="qp"></div><div class="fg"><label class="fl">Address</label><textarea id="qad"></textarea></div></div><button class="btn btn-p btn-lg" style="width:100%;margin-top:10px"><i class="fas fa-save"></i> Register & Mark Present</button></form>`);}

async function quickReg(e){e.preventDefault();const d={studentName:document.getElementById('qn').value,admissionNumber:document.getElementById('qa').value,class:document.getElementById('qc').value,section:document.getElementById('qs').value,rollNumber:document.getElementById('qr').value,gender:document.getElementById('qg').value,fatherName:document.getElementById('qf').value,motherName:document.getElementById('qm').value,guardianPhone:document.getElementById('qp').value,address:document.getElementById('qad').value};const r=await api('registerStudent',d);if(r&&r.success){await api('markAttendance',{studentName:d.studentName,studentId:r.studentId,class:d.class,section:d.section,rollNumber:d.rollNumber,confidence:'0.99'});notify('✅ '+d.studentName+' Registered & Marked!','success');document.getElementById('modalContainer').innerHTML='';}else{notify('❌ Failed!','error');scanning=true;}return false;}

async function loadStu(c){c.innerHTML='<div class="spinner"></div>';const d=await api('getStudents');if(!d||!d.students){c.innerHTML='<div class="card"><p>No students</p></div>';return;}let h='<div class="card"><h2>Students ('+d.students.length+')</h2><div class="tbc"><table><thead><tr><th>ID</th><th>Name</th><th>Class</th><th>Section</th><th>Roll</th><th>Gender</th></tr></thead><tbody>';d.students.forEach(s=>{h+=`<tr><td><small>${s.StudentID||'-'}</small></td><td><strong>${s.StudentName||'-'}</strong></td><td>${s.Class||'-'}</td><td>${s.Section||'-'}</td><td>${s.RollNumber||'-'}</td><td>${s.Gender||'-'}</td></tr>`;});h+='</tbody></table></div></div>';c.innerHTML=h;}
function loadRep(c){c.innerHTML=`<div class="card"><h2>Reports</h2><button class="btn btn-p" onclick="loadRepData()">Load</button></div><div id="rv"></div>`;}
async function loadRepData(){const v=document.getElementById('rv');v.innerHTML='<div class="spinner"></div>';const d=await api('getStudents');if(!d)return;v.innerHTML='<table><thead><tr><th>Name</th><th>Class</th><th>Section</th></tr></thead><tbody>'+d.students.map(s=>`<tr><td>${s.StudentName}</td><td>${s.Class}</td><td>${s.Section}</td></tr>`).join('')+'</tbody></table>';}

document.addEventListener('DOMContentLoaded',init);
</script>
