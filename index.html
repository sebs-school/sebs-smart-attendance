<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEBS Smart Attendance | Systematic English Boarding School</title>
<link rel="icon" href="logo.png">
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--p:#1a3a6b;--p2:#2a5298;--s:#00c853;--w:#ff9800;--d:#e74c3c;--blue:#2196f3;--bg:#f0f4fb;--card:#fff;--border:#e2eaf6;--text:#1a1a2e;--sub:#64748b;--sb-bg:linear-gradient(180deg,#07111f,#0f2044,#1a3a6b);--radius:18px;--radius-sm:12px;--shadow:0 2px 16px rgba(26,58,107,.07);--shadow-lg:0 8px 40px rgba(26,58,107,.13);--transition:.22s cubic-bezier(.4,0,.2,1)}
body.dark{--bg:#0d1b2a;--card:#111e30;--border:#1e3050;--text:#e8f0fe;--sub:#8ba4c8}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}a{text-decoration:none;color:inherit}ul{list-style:none}button{cursor:pointer;border:none;outline:none;font-family:inherit}input,select,textarea{font-family:inherit;font-size:.88rem;border:2px solid var(--border);border-radius:var(--radius-sm);padding:11px 15px;background:var(--card);color:var(--text);width:100%}input:focus,select:focus,textarea:focus{outline:none;border-color:var(--p)}textarea{resize:vertical;min-height:52px}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}@keyframes scaleIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.ac{display:flex;min-height:100vh}.mc{flex:1;margin-left:260px;display:flex;flex-direction:column;min-height:100vh}.pc{flex:1;padding:28px 32px;overflow-y:auto}
.sb{width:260px;height:100vh;background:var(--sb-bg);position:fixed;left:0;top:0;z-index:1000;display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(0,0,0,.18)}.sh{padding:22px 20px;display:flex;align-items:center;gap:13px;border-bottom:1px solid rgba(255,255,255,.07)}.slogo{width:44px;height:44px;border-radius:13px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,.25)}.slogo img{width:34px;height:34px;object-fit:contain}.sn{font-weight:800;font-size:1.08rem;color:#fff;line-height:1.2}.sn small{font-size:.62rem;font-weight:400;color:rgba(255,255,255,.45);display:block;letter-spacing:.5px}.snv{flex:1;overflow-y:auto;padding:14px 10px}.sm{display:flex;flex-direction:column;gap:3px}.sg{margin-bottom:6px}.sg-label{font-size:.6rem;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,.28);padding:8px 16px 4px;text-transform:uppercase}.si{border-radius:11px}.si:hover .sl{background:rgba(255,255,255,.07);color:#c8daf4}.si.act .sl{background:rgba(255,255,255,.14);color:#fff}.si.act .sl i{color:#4da6ff}.sl{display:flex;align-items:center;gap:12px;padding:11px 17px;color:rgba(255,255,255,.55);font-size:.83rem;font-weight:500;border-radius:11px}.sl i{font-size:1rem;width:20px;text-align:center;color:rgba(255,255,255,.35)}.sf{padding:14px 10px;border-top:1px solid rgba(255,255,255,.07);margin-top:auto}.slo{width:100%;display:flex;align-items:center;gap:12px;padding:11px 17px;background:rgba(231,76,60,.08);color:#f4877a;font-size:.83rem;font-weight:500;border-radius:11px}.slo:hover{background:rgba(231,76,60,.16)}.so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;backdrop-filter:blur(2px)}.so.act{display:block}
.tb{height:68px;background:rgba(255,255,255,.95);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:900;backdrop-filter:blur(12px)}#pt{font-size:1.15rem;font-weight:800}.td{font-size:.72rem;color:var(--sub);font-weight:500}.tt{font-size:.8rem;font-weight:700;color:var(--p);font-family:monospace;background:rgba(26,58,107,.07);padding:5px 10px;border-radius:8px}.ttb{background:var(--border);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:.9rem}.ttb:hover{background:var(--p);color:#fff}
.lc{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#04091a,#0a1628,#1a3a6b)}.lcd{width:100%;max-width:430px;background:rgba(255,255,255,.98);border-radius:28px;padding:52px 42px 44px;box-shadow:0 40px 100px rgba(0,0,0,.35);animation:scaleIn .4s;text-align:center}.llw{width:84px;height:84px;margin:0 auto 20px;border-radius:20px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 8px 28px rgba(26,58,107,.18)}.llw img{width:66px;height:66px;object-fit:contain}.lsn{font-size:1.5rem;font-weight:900;color:#1a1a2e;line-height:1.25}.lst{font-size:.7rem;color:#64748b;text-transform:uppercase;letter-spacing:2.5px;margin-bottom:30px}.login-divider{display:flex;align-items:center;gap:14px;margin-bottom:28px}.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:#e2e8f0}.login-divider span{color:#94a3b8;font-size:.7rem;font-weight:600}.lbtn{display:block;width:100%;padding:16px 24px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border-radius:14px;font-size:.92rem;font-weight:700;cursor:pointer;border:none;text-align:center;transition:var(--transition);box-shadow:0 6px 24px rgba(26,58,107,.3)}.lbtn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(26,58,107,.4)}.login-info{margin-top:20px;text-align:center;font-size:.72rem;color:#94a3b8}
.card{background:var(--card);border-radius:var(--radius);padding:24px 28px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:20px}.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}.stc{background:var(--card);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow);border:1px solid var(--border);display:flex;align-items:center;gap:18px;cursor:pointer}.stc:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}.sci{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:1.4rem}.sci.b{background:rgba(26,58,107,.08);color:var(--p)}.sci.g{background:rgba(0,200,83,.1);color:var(--s)}.sci.o{background:rgba(255,152,0,.1);color:var(--w)}.sci.r{background:rgba(231,76,60,.1);color:var(--d)}.sti h3{font-size:1.8rem;font-weight:900;line-height:1}.sti p{font-size:.68rem;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 20px;border-radius:11px;font-weight:600;font-size:.84rem;cursor:pointer;border:none;transition:var(--transition)}.btn-p{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff}.btn-s{background:linear-gradient(135deg,#00c853,#00e676);color:#fff}.btn-d{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}.btn-o{background:linear-gradient(135deg,#ff9800,#f57c00);color:#fff}.btn-ghost{background:var(--border);color:var(--text)}.btn-lg{padding:14px 28px;font-size:.92rem;border-radius:14px}.btn-block{width:100%;justify-content:center}
.tbc{overflow-x:auto;border-radius:14px;border:1px solid var(--border)}table{width:100%;border-collapse:collapse}thead{background:rgba(26,58,107,.04)}th{padding:13px 18px;text-align:left;font-weight:700;font-size:.68rem;text-transform:uppercase;color:var(--sub)}td{padding:12px 18px;border-top:1px solid var(--border);font-size:.82rem}tbody tr:hover{background:rgba(26,58,107,.025)}
.fg{margin-bottom:14px}.fl{display:block;font-size:.7rem;font-weight:700;margin-bottom:6px;text-transform:uppercase;color:var(--sub)}.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}.section-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--p);margin:20px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--p);display:inline-block}
.cam-wrap{max-width:720px;margin:0 auto}.cam-box{position:relative;background:#000;border-radius:22px;overflow:hidden;width:100%;aspect-ratio:4/3;box-shadow:0 20px 60px rgba(0,0,0,.35)}.cam-box video{width:100%;height:100%;object-fit:cover;display:block}.cam-box canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}.cam-hud{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:flex-start;z-index:5;gap:8px}.hud-badge{background:rgba(7,17,31,.72);backdrop-filter:blur(8px);color:#fff;padding:8px 14px;border-radius:22px;font-size:.72rem;display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.08)}.hud-dot{width:9px;height:9px;border-radius:50%}.hud-dot.on{background:#00e676;animation:pulse .9s infinite}.hud-dot.off{background:#e74c3c}.cam-footer{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px}.cam-status{text-align:center;margin-top:10px;font-size:.8rem;color:var(--sub)}.time-badge{background:rgba(0,0,0,.5);color:#fff;padding:6px 14px;border-radius:16px;font-size:.7rem;font-weight:600;display:inline-flex;align-items:center;gap:6px}.marked-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.marked-chip{display:flex;align-items:center;gap:6px;background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.2);color:#00a544;padding:5px 12px;border-radius:20px;font-size:.72rem;font-weight:600;animation:slideIn .25s}
.liveness-tip{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(7,17,31,.82);backdrop-filter:blur(8px);color:#fff;padding:10px 20px;border-radius:20px;font-size:.75rem;text-align:center;white-space:nowrap;z-index:10;border:1px solid rgba(255,255,255,.1)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2500;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}.modal{background:var(--card);border-radius:22px;padding:30px 34px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;animation:scaleIn .25s;box-shadow:0 30px 80px rgba(0,0,0,.3);border:1px solid var(--border)}.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}.modal-title{font-size:1.1rem;font-weight:800}.modal-close{width:32px;height:32px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;color:var(--sub)}.modal-close:hover{background:var(--d);color:#fff}
.nc{position:fixed;top:18px;right:18px;z-index:3000;display:flex;flex-direction:column;gap:8px;pointer-events:none}.nt{background:var(--card);border-radius:12px;padding:14px 18px;box-shadow:0 12px 40px rgba(0,0,0,.15);display:flex;align-items:flex-start;gap:10px;border-left:4px solid var(--p);min-width:260px;max-width:340px;animation:slideIn .25s;font-size:.82rem;pointer-events:auto;border:1px solid var(--border);border-left-width:4px}.nt.success{border-left-color:var(--s)}.nt.error{border-left-color:var(--d)}.nt.warning{border-left-color:var(--w)}.nt-icon{font-size:1.1rem;flex-shrink:0}.nt-body{flex:1}.nt-msg{color:var(--sub);font-size:.78rem}
.db-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}.rate-ring{display:flex;align-items:center;justify-content:center;flex-direction:column;padding:32px}.rate-num{font-size:4rem;font-weight:900;line-height:1;background:linear-gradient(135deg,var(--p),var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.rate-label{font-size:.72rem;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-top:6px}
@media(max-width:1100px){.sr{grid-template-columns:repeat(2,1fr)}.db-grid{grid-template-columns:1fr}}@media(max-width:860px){.mc{margin-left:0}.sb{transform:translateX(-100%)}.sb.mo{transform:translateX(0)}.sr{grid-template-columns:repeat(2,1fr)}.db-grid{grid-template-columns:1fr}}@media(max-width:600px){.sr{grid-template-columns:1fr}.fr{grid-template-columns:1fr}.pc{padding:14px}.tb{padding:0 14px}.cam-box{aspect-ratio:4/3;max-height:320px}.modal{padding:20px 16px}#pt{max-width:140px}.stc{padding:16px 18px}.sti h3{font-size:1.5rem}}
</style>
</head>
<body>

<div id="lp" class="lc"><div class="lcd"><div class="llw"><img src="logo.png" alt="SEBS" onerror="this.outerHTML='<span style=font-size:2rem>🏫</span>'"></div><h1 class="lsn">Systematic English<br>Boarding School</h1><p class="lst">Smart Attendance</p><div class="login-divider"><span>सुरक्षित पहुँच / Secure Access</span></div><button class="lbtn" onclick="doLogin()">🔑 Sign in</button><p class="login-info">5:30-10:30 Present | 10:30-12 Late | Face Memory ON</p></div></div>

<div id="app" class="ac" style="display:none">
  <aside id="sb" class="sb"><div class="sh"><div class="slogo"><img src="logo.png" alt="SEBS" onerror="this.outerHTML='<span style=font-size:1.4rem>🏫</span>'"></div><div><h2 class="sn">SEBS<small>Smart Attendance</small></h2></div></div><nav class="snv"><ul class="sm">
    <li class="si act" data-p="db"><a href="#" class="sl" onclick="nav('db');return false"><i class="fas fa-th-large"></i><span>ड्यासबोर्ड / Dashboard</span></a></li>
    <li class="si" data-p="att"><a href="#" class="sl" onclick="nav('att');return false"><i class="fas fa-camera"></i><span>लाइभ हाजिरी / Live</span></a></li>
    <li class="si" data-p="reg"><a href="#" class="sl" onclick="nav('reg');return false"><i class="fas fa-user-plus"></i><span>दर्ता / Register</span></a></li>
    <li class="si" data-p="stu"><a href="#" class="sl" onclick="nav('stu');return false"><i class="fas fa-users"></i><span>विद्यार्थी / Students</span></a></li>
    <li class="si" data-p="rep"><a href="#" class="sl" onclick="nav('rep');return false"><i class="fas fa-chart-bar"></i><span>रिपोर्ट / Reports</span></a></li>
  </ul></nav><div class="sf"><button class="slo" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>बाहिरिनुहोस् / Logout</span></button></div></aside>
  <div class="so" id="so" onclick="cmsb()"></div>
  <main class="mc"><header class="tb"><span id="pt">ड्यासबोर्ड</span><div style="display:flex;gap:16px"><span class="td" id="td"></span><span class="tt" id="tt"></span><button class="ttb" onclick="tth()" id="tthBtn"><i class="fas fa-moon"></i></button></div></header><div class="pc" id="pc"></div></main>
</div>
<div class="nc" id="nc"></div>
<div id="modalContainer"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbxqvvfI1j8aOnKNKjnnSfaGPJw5ANiW6XEnLehaHxJ8YjjegbId8uvcMcHQSaxzHkjM/exec';
const MODELS='https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
let dm=false,stream=null,attActive=false,modelsLoaded=false,modelsLoading=false;
let faceMatcher=null,markedToday={},cooldowns={},pendingDescriptor=null;
let lastMark=0,scanning=true,paused=false;
let allStudents=[],dashData=null;
let lState={prevEAR:1,blinkFrames:0,lastNose:null,headFrames:0};
let rafId=null;

function ts(){const n=new Date();const h=n.getHours(),m=n.getMinutes(),ct=h*60+m;if(ct<330)return{open:false,status:'बन्द / Closed',reason:'५:३० पछि खुल्छ / Opens 5:30 AM'};if(ct<630)return{open:true,status:'Present / उपस्थित',reason:'उपस्थित / Present'};if(ct<=720)return{open:true,status:'Late / ढिलो',reason:'ढिलो / Late'};return{open:false,status:'बन्द / Closed',reason:'१२ बजेपछि बन्द / Closed after 12'};}
function init(){updateTime();setInterval(updateTime,1000);if(localStorage.getItem('s-login')==='1'){showApp();nav('db');}if(localStorage.getItem('s-theme')==='dark'){applyDark(true);}}
function updateTime(){const n=new Date();const de=document.getElementById('td'),te=document.getElementById('tt');if(de)de.textContent=n.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});if(te)te.textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function applyDark(on){dm=on;document.body.classList.toggle('dark',on);const btn=document.getElementById('tthBtn');if(btn)btn.innerHTML=on?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';localStorage.setItem('s-theme',on?'dark':'light');}
function tth(){applyDark(!dm);}
function doLogin(){localStorage.setItem('s-login','1');document.getElementById('lp').style.display='none';document.getElementById('app').style.display='flex';nav('db');notify('✅ स्वागत! / Welcome!','success');}
function logout(){stopAtt();localStorage.removeItem('s-login');document.getElementById('lp').style.display='flex';document.getElementById('app').style.display='none';}
function showApp(){document.getElementById('lp').style.display='none';document.getElementById('app').style.display='flex';}
function tmsb(){document.getElementById('sb').classList.toggle('mo');document.getElementById('so').classList.toggle('act');}
function cmsb(){document.getElementById('sb').classList.remove('mo');document.getElementById('so').classList.remove('act');}
function notify(msg,type='info'){const nc=document.getElementById('nc');const icons={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};const n=document.createElement('div');n.className=`nt ${type}`;n.innerHTML=`<span class="nt-icon">${icons[type]||'ℹ️'}</span><div class="nt-body"><div class="nt-msg">${msg}</div></div>`;nc.appendChild(n);setTimeout(()=>{n.style.opacity='0';n.style.transform='translateX(40px)';n.style.transition='all .3s ease';setTimeout(()=>n.remove(),300);},5000);}
async function api(action,data=null){try{if(data){const r=await fetch(API,{method:'POST',body:JSON.stringify({action,...data})});return await r.json();}else{const r=await fetch(`${API}?action=${action}`);return await r.json();}}catch(e){return null;}}
function showModal(html){document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()">${html}</div></div>`;}
function closeModal(){document.getElementById('modalContainer').innerHTML='';}

function nav(p){
  document.querySelectorAll('.si').forEach(e=>e.classList.remove('act'));
  const item=document.querySelector(`[data-p="${p}"]`);if(item)item.classList.add('act');
  document.getElementById('pt').textContent={db:'ड्यासबोर्ड / Dashboard',att:'लाइभ हाजिरी / Live',reg:'दर्ता / Register',stu:'विद्यार्थी / Students',rep:'रिपोर्ट / Reports'}[p]||p;
  if(p!=='att')stopAtt();if(p==='att')preloadModels();
  const c=document.getElementById('pc');
  if(p==='db')loadDb(c);else if(p==='att')loadAtt(c);else if(p==='reg')loadReg(c);else if(p==='stu')loadStu(c);else if(p==='rep')loadRep(c);cmsb();
}

async function loadEmbeddings(){
  const cached=localStorage.getItem('sebs-faces');
  if(cached){try{const parsed=JSON.parse(cached);if(parsed.length>0){const lb=[];for(const e of parsed){if(e.embedding&&Array.isArray(e.embedding))lb.push(new faceapi.LabeledFaceDescriptors(e.studentId,[new Float32Array(e.embedding)]));}faceMatcher=lb.length>0?new faceapi.FaceMatcher(lb,0.55):null;refreshCache();return;}}catch(e){}}
  const d=await api('getAllEmbeddings');if(!d||!d.embeddings||!d.embeddings.length){faceMatcher=null;return;}localStorage.setItem('sebs-faces',JSON.stringify(d.embeddings));const lb=[];for(const e of d.embeddings){if(e.embedding&&Array.isArray(e.embedding))lb.push(new faceapi.LabeledFaceDescriptors(e.studentId,[new Float32Array(e.embedding)]));}faceMatcher=lb.length>0?new faceapi.FaceMatcher(lb,0.55):null;}
async function refreshCache(){const d=await api('getAllEmbeddings');if(d&&d.embeddings&&d.embeddings.length>0){localStorage.setItem('sebs-faces',JSON.stringify(d.embeddings));}}

async function preloadModels(){if(modelsLoaded||modelsLoading)return;modelsLoading=true;notify('⏳ लोड... / Loading...');try{await Promise.all([faceapi.nets.ssdMobilenetv1.loadFromUri(MODELS),faceapi.nets.faceLandmark68Net.loadFromUri(MODELS),faceapi.nets.faceRecognitionNet.loadFromUri(MODELS)]);modelsLoaded=true;modelsLoading=false;await loadEmbeddings();notify('✅ तयार! / Ready!','success');}catch(e){modelsLoading=false;notify('❌ असफल / Failed','error');}}
async function loadAllStudents(){const d=await api('getStudents');if(d&&d.students)allStudents=d.students;return allStudents;}

function loadAtt(c){const t=ts();c.innerHTML=`<div class="cam-wrap"><div style="text-align:center;margin-bottom:12px"><span class="time-badge" style="background:${t.open?(t.status.includes('Late')?'rgba(255,152,0,.7)':'rgba(0,200,83,.7)'):'rgba(231,76,60,.7)'}">${t.open?'🟢':'🔴'} ${t.status} | ${t.reason}</span></div><div class="cam-box"><video id="cam" autoplay playsinline muted></video><canvas id="overlay"></canvas><div class="cam-hud"><span class="hud-badge"><span class="hud-dot off" id="hudDot"></span><span id="hudText">बन्द / Off</span></span><span class="hud-badge" id="matchBadge" style="display:none"><span id="matchText"></span></span></div><div class="liveness-tip" id="livenessTip" style="display:none">👀 झिम्काउनुहोस् वा टाउको हल्लाउनुहोस् / Blink or move</div></div><div class="cam-footer"><button class="btn btn-p btn-lg" id="startBtn" onclick="startAtt()"><i class="fas fa-play"></i> सुरु / Start</button><button class="btn btn-d btn-lg" id="stopBtn" onclick="stopAtt()" style="display:none"><i class="fas fa-stop"></i> रोक / Stop</button><button class="btn btn-ghost btn-lg" onclick="reloadFaces()"><i class="fas fa-sync-alt"></i> रिलोड / Reload</button></div><div class="cam-status" id="camStatus">"सुरु" थिच्नुहोस् / Press Start</div><div class="card" style="margin-top:18px"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-weight:700">✅ आज / Today</span><span id="markedCount">0</span></div><div class="marked-strip" id="markedStrip"><span style="font-size:.78rem;color:var(--sub)">कोही छैन / None</span></div></div></div>`;}
async function startAtt(){if(!modelsLoaded){notify('⏳ लोड... / Loading...','warning');await preloadModels();if(!modelsLoaded)return;}try{const cl=[{video:{width:{ideal:640},height:{ideal:480}}},{video:{width:640,height:480}},{video:{width:320,height:240}},{video:true}];let gs=false;for(const c of cl){try{stream=await navigator.mediaDevices.getUserMedia(c);if(stream&&stream.active){gs=true;break;}}catch(err){}}if(!gs)throw new Error('No camera');const video=document.getElementById('cam');video.srcObject=stream;await new Promise((resolve,reject)=>{video.onloadedmetadata=()=>{video.play().then(resolve).catch(reject);};setTimeout(()=>reject(new Error('Timeout')),5000);});document.getElementById('startBtn').style.display='none';document.getElementById('stopBtn').style.display='inline-flex';document.getElementById('hudDot').className='hud-dot on';document.getElementById('hudText').textContent='स्क्यान / Scan';attActive=true;scanning=true;resetL();const t=ts();setStatus(t.open?'👁️ स्क्यान... / Scanning... ('+t.status+')':'🔴 '+t.reason);notify('✅ क्यामेरा तयार! / Camera ready!','success');detectLoop();}catch(e){notify('❌ क्यामेरा त्रुटि / Camera error','error');}}
function stopAtt(){attActive=false;scanning=false;if(rafId){cancelAnimationFrame(rafId);rafId=null;}if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}const el=id=>document.getElementById(id);if(el('hudDot'))el('hudDot').className='hud-dot off';if(el('hudText'))el('hudText').textContent='बन्द / Off';if(el('startBtn'))el('startBtn').style.display='inline-flex';if(el('stopBtn'))el('stopBtn').style.display='none';if(el('livenessTip'))el('livenessTip').style.display='none';setStatus('रोकियो / Stopped');}
async function reloadFaces(){notify('🔄 रिलोड... / Reloading...');localStorage.removeItem('sebs-faces');await loadEmbeddings();notify('✅ ताजा! / Fresh!','success');}
function setStatus(msg){const el=document.getElementById('camStatus');if(el)el.textContent=msg;}
function id(s){return document.getElementById(s);}
function resetL(){lState={prevEAR:1,blinkFrames:0,lastNose:null,headFrames:0};}
function eyeAR(lm,t,b,lt,rt){const p=lm.positions;const tp=p[t],bp=p[b],lp=p[lt],rp=p[rt];const v=Math.hypot(tp.x-bp.x,tp.y-bp.y),h=Math.hypot(lp.x-rp.x,lp.y-rp.y);return h<0.5?1:v/h;}
function checkLive(det){if(!det.landmarks)return false;const p=det.landmarks.positions;const le=eyeAR(det.landmarks,37,41,36,39),re=eyeAR(det.landmarks,43,47,42,45),ear=(le+re)/2;if(ear<0.20&&lState.prevEAR>0.24){lState.blinkFrames++;if(lState.blinkFrames>=1){lState.prevEAR=ear;setStatus('👁️ झिम्काइ / Blink!');return true;}}if(ear>0.26)lState.blinkFrames=0;lState.prevEAR=ear;const nn={x:p[30].x,y:p[30].y};if(lState.lastNose){const dx=Math.abs(nn.x-lState.lastNose.x),dy=Math.abs(nn.y-lState.lastNose.y);if(dx>8||dy>8)lState.headFrames++;else lState.headFrames=Math.max(0,lState.headFrames-1);if(lState.headFrames>=5){lState.headFrames=0;setStatus('🤙 हल्लाइ / Move!');return true;}}lState.lastNose=nn;return false;}

async function detectLoop(){
  if(!attActive)return;
  const video=document.getElementById('cam'),canvas=document.getElementById('overlay');if(!video||!canvas||video.readyState<2){rafId=requestAnimationFrame(detectLoop);return;}
  try{const opts=new faceapi.SsdMobilenetv1Options({minConfidence:0.25});const faces=await faceapi.detectAllFaces(video,opts).withFaceLandmarks().withFaceDescriptors();canvas.width=video.videoWidth;canvas.height=video.videoHeight;const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);const rs=faceapi.resizeResults(faces,{width:video.videoWidth,height:video.videoHeight});
    if(rs.length===0){id('matchBadge').style.display='none';if(id('livenessTip'))id('livenessTip').style.display='none';setStatus('👀 खोज्दै... / Looking...');}
    for(const det of rs){
      const box=det.detection.box,cx=box.x+box.width/2,cy=box.y+box.height/2,rad=Math.max(box.width,box.height)/1.4;
      let isKnown=false,matchLabel='',matchDist=1;
      if(faceMatcher&&det.descriptor){const bm=faceMatcher.findBestMatch(det.descriptor);isKnown=bm.label!=='unknown'&&bm.distance<0.55;matchLabel=bm.label;matchDist=bm.distance;}
      // FIX: Only show GREEN for known/registered faces, BLUE for truly new faces
      const ringColor=isKnown?'#00c853':'#2196f3';
      ctx.save();ctx.shadowColor=ringColor;ctx.shadowBlur=20;ctx.strokeStyle=ringColor;ctx.lineWidth=3.5;ctx.beginPath();ctx.arc(cx,cy,rad,0,2*Math.PI);ctx.stroke();ctx.restore();
      const labelText=isKnown?`✅ चिनियो: ${matchLabel.substring(0,14)}`:'🆕 नयाँ / New';
      ctx.font='bold 13px Inter';const tw=ctx.measureText(labelText).width,lx=cx-tw/2-10,ly=cy+rad+12;
      ctx.fillStyle='rgba(0,0,0,.78)';roundRect(ctx,lx,ly,tw+20,24,6);ctx.fill();ctx.fillStyle='#fff';ctx.fillText(labelText,cx-tw/2,ly+16);
      id('matchBadge').style.display='flex';id('matchText').textContent=isKnown?`✅ चिनियो / ${matchLabel}`:'🆕 नयाँ / New';
      
      if(scanning&&!paused&&Date.now()-lastMark>2000){
        const tipEl=id('livenessTip');if(tipEl)tipEl.style.display='block';
        const live=checkLive(det);
        if(live){lastMark=Date.now();scanning=false;if(tipEl)tipEl.style.display='none';paused=true;
          const todayKey=new Date().toDateString(),dayKey=`${matchLabel}_${todayKey}`;
          if(isKnown && !markedToday[dayKey]){
            const t=ts();
            if(!t.open){notify('⛔ '+t.reason,'warning');resume(2000);}
            else{await markStudent(matchLabel,matchDist,t.status);}
          }else if(isKnown && markedToday[dayKey]){
            showAlreadyMarkedPopup(matchLabel);
          }else{
            pendingDescriptor=det.descriptor?Array.from(det.descriptor):null;
            showRegModal();
          }
          break;
        }
      }
    }
  }catch(e){}if(attActive)rafId=requestAnimationFrame(detectLoop);
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
async function markStudent(sid,dist,status){const now=Date.now(),tk=new Date().toDateString(),dk=`${sid}_${tk}`;if(cooldowns[sid]&&now-cooldowns[sid]<30000){resume(1500);return;}if(markedToday[dk]){resume(1500);return;}cooldowns[sid]=now;setStatus(`⏳ ${sid} हाजिर गर्दै... / Marking...`);const r=await api('markAttendance',{studentId:sid,studentName:sid,confidence:(1-dist).toFixed(3),status:status});if(r&&r.success){markedToday[dk]=true;const dn=r.studentName||sid;showSuccessPopup(dn,status);addToStrip(dn);}else{notify('❌ असफल / Failed','error');resume(1500);}}
function resume(d=1800){setTimeout(()=>{scanning=true;paused=false;resetL();if(attActive)detectLoop();},d);}

function showAlreadyMarkedPopup(name){const ov=document.createElement('div');ov.className='modal-overlay';ov.style.zIndex='2000';ov.innerHTML=`<div class="modal" style="text-align:center;max-width:340px;padding:32px 28px"><h1 style="font-size:3rem">⚠️</h1><h3 style="color:#ff9800">पहिल्यै हाजिर / Already Marked</h3><p style="font-weight:700;font-size:1.1rem">${name}</p><p style="color:var(--sub);margin-top:4px">आजका लागि हाजिर भइसकेको छ! / Already marked today!</p><p style="font-size:.7rem;color:var(--sub);margin-top:12px">५ सेकेण्ड / 5 sec</p></div>`;document.body.appendChild(ov);setTimeout(()=>{ov.style.opacity='0';ov.style.transition='opacity .3s';setTimeout(()=>{ov.remove();resume(0);},300);},5000);}

function loadRep(c){c.innerHTML=`<div class="card"><h2>📊 रिपोर्ट / Reports</h2><p>मिति: <strong>${new Date().toISOString().split('T')[0]}</strong></p><div style="display:flex;gap:10px;margin-top:16px"><button class="btn btn-p btn-lg" onclick="printRep()"><i class="fas fa-print"></i> प्रिन्ट / Print</button><button class="btn btn-s btn-lg" onclick="expCSV()"><i class="fas fa-file-csv"></i> CSV</button></div></div>`;}
function printRep(){const w=window.open('','_blank','width=900,height=700');w.document.write(`<!DOCTYPE html><html><head><title>SEBS</title><style>@page{size:A4 landscape}body{font-family:sans-serif;padding:20px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #000;padding:8px}</style></head><body><div style="text-align:center"><img src="logo.png" width="60"><h2>Systematic English Boarding School</h2><p>${new Date().toLocaleString()}</p></div><div id="dt"></div><script>fetch('${API}?action=getStudents').then(r=>r.json()).then(d=>{let h='<table><tr><th>#</th><th>ID</th><th>Name</th><th>Class</th><th>Section</th><th>Roll</th><th>Gender</th></tr>';if(d&&d.students)d.students.forEach((s,i)=>{h+='<tr><td>'+(i+1)+'</td><td>'+(s.StudentID||'-')+'</td><td>'+(s.StudentName||'-')+'</td><td>'+(s.Class||'-')+'</td><td>'+(s.Section||'-')+'</td><td>'+(s.RollNumber||'-')+'</td><td>'+(s.Gender||'-')+'</td></tr>';});h+='</table>';document.getElementById('dt').innerHTML=h;setTimeout(()=>print(),800);});<\/script></body></html>`);w.document.close();}
async function expCSV(){const d=await api('getStudents');if(!d||!d.students){notify('डेटा छैन','warning');return;}let csv='#,ID,Name,Class,Section,Roll,Gender,Phone\n';d.students.forEach((s,i)=>{csv+=`${i+1},"${s.StudentID||''}","${s.StudentName||''}","${s.Class||''}","${s.Section||''}","${s.RollNumber||''}","${s.Gender||''}","${s.GuardianPhone||''}"\n`;});const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`sebs-${new Date().toISOString().split('T')[0]}.csv`;a.click();URL.revokeObjectURL(url);notify('✅ CSV!','success');}

document.addEventListener('DOMContentLoaded',init);
</script>
