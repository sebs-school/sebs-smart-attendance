<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEBS Smart Attendance</title>
    <link rel="icon" href="logo.png">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4.1646425229/face_detection.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root{--p:#1a3a6b;--pl:#2a5298;--s:#2ecc71;--w:#f39c12;--d:#e74c3c;--r:12px}
        .lt{--bg:#f8f9fc;--bg2:#fff;--bg3:#f1f3f9;--bgS:#1a3a6b;--bgC:#fff;--t:#1a1a2e;--t2:#636e72;--tS:#c8d6e5;--b:#e0e5ec}
        .dt{--bg:#0f1923;--bg2:#1a2634;--bg3:#243447;--bgS:#0d1117;--bgC:#1a2634;--t:#e8eaed;--t2:#9aa0a6;--tS:#8b949e;--b:#2d3748}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}a{text-decoration:none;color:inherit}ul{list-style:none}button{cursor:pointer;border:none;outline:none;font-family:inherit;font-size:inherit}input,select,textarea{font-family:inherit;font-size:inherit;border:2px solid var(--b);border-radius:8px;padding:12px 16px;background:var(--bgC);color:var(--t);width:100%;transition:all .2s}input:focus,select:focus,textarea:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(26,58,107,.08);outline:none}textarea{resize:vertical;min-height:60px}
        .ac{display:flex;min-height:100vh}.mc{flex:1;margin-left:260px;min-height:100vh;display:flex;flex-direction:column}.sb{width:260px;height:100vh;background:var(--bgS);position:fixed;left:0;top:0;z-index:1000;display:flex;flex-direction:column;overflow:hidden}.sh{height:70px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid rgba(255,255,255,.08);gap:12px}.slogo{width:42px;height:42px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}.slogo img{width:34px;height:34px;object-fit:contain}.sn{font-weight:700;font-size:1.1rem;color:#fff}.snv{flex:1;overflow-y:auto;padding:16px 12px}.sm{display:flex;flex-direction:column;gap:4px}.si{border-radius:10px;transition:all .2s}.si:hover{background:rgba(255,255,255,.08)}.si.act{background:rgba(255,255,255,.15)}.sl{display:flex;align-items:center;gap:12px;padding:12px 16px;color:var(--tS);font-size:.9rem;font-weight:500;border-radius:10px}.sl i{font-size:1.15rem;width:24px;text-align:center}.sf{padding:16px 12px;border-top:1px solid rgba(255,255,255,.08)}.slo{width:100%;display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(231,76,60,.1);color:#ec7063;font-size:.9rem;font-weight:500;border-radius:10px;cursor:pointer}.so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999}.so.act{display:block}.tb{height:70px;background:var(--bgC);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:900}#pt{font-size:1.3rem;font-weight:700}.td{font-size:.85rem;color:var(--t2)}.tt{font-size:.9rem;font-weight:700;color:var(--p);font-family:monospace}.ttb{background:var(--bg3);color:var(--t);width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:all .2s}.ttb:hover{background:var(--p);color:#fff;transform:rotate(15deg)}.pc{flex:1;padding:32px;overflow-y:auto}.lc{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f2444 0%,#1a3a6b 40%,#2a5298 70%,#4da8da 100%)}.lcd{width:100%;max-width:440px;background:rgba(255,255,255,.97);border-radius:24px;padding:56px 48px;box-shadow:0 32px 80px rgba(0,0,0,.3);text-align:center;animation:fadeUp .6s}.llw{width:96px;height:96px;margin:0 auto 24px;border-radius:20px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 40px rgba(26,58,107,.2);overflow:hidden}.llw img{width:76px;height:76px;object-fit:contain}.lsn{font-size:1.7rem;font-weight:800;color:#1a1a2e;line-height:1.3;margin-bottom:8px}.lst{font-size:.85rem;color:#636e72;font-weight:500;text-transform:uppercase;letter-spacing:2px}.ld{display:flex;align-items:center;gap:16px;margin:32px 0}.ld::before,.ld::after{content:'';flex:1;height:1px;background:#e0e5ec}.ld span{font-size:.75rem;color:#a0a8b0;font-weight:600;text-transform:uppercase;letter-spacing:1px}.glb{width:100%;padding:16px 24px;background:var(--p);color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .25s;box-shadow:0 4px 16px rgba(26,58,107,.3)}.glb:hover{background:var(--pl);transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,58,107,.4)}.card{background:var(--bgC);border-radius:var(--r);padding:28px;box-shadow:0 2px 16px rgba(0,0,0,.04);border:1px solid var(--b);margin-bottom:24px}.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:28px}.stc{background:var(--bgC);border-radius:var(--r);padding:24px 28px;box-shadow:0 2px 16px rgba(0,0,0,.04);border:1px solid var(--b);display:flex;align-items:center;gap:20px;cursor:pointer;transition:all .3s}.stc:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,0,0,.1)}.sci{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem}.sci.b{background:rgba(26,58,107,.08);color:var(--p)}.sci.g{background:rgba(46,204,113,.08);color:var(--s)}.sci.o{background:rgba(243,156,18,.08);color:var(--w)}.sci.r{background:rgba(231,76,60,.08);color:var(--d)}.sti h3{font-size:2rem;font-weight:800;line-height:1}.sti p{font-size:.8rem;color:var(--t2);margin-top:4px;font-weight:500}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:10px;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s}.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pl);transform:translateY(-1px)}.btn-s{background:var(--s);color:#fff}.btn-d{background:var(--d);color:#fff}.btn-lg{padding:16px 32px;font-size:1rem;border-radius:12px}.tbc{overflow-x:auto;border-radius:var(--r);border:1px solid var(--b)}table{width:100%;border-collapse:collapse}thead{background:var(--bg3)}th{padding:14px 20px;text-align:left;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;color:var(--t2)}td{padding:14px 20px;border-top:1px solid var(--b);font-size:.875rem;font-weight:500}tbody tr:hover{background:var(--bg3)}.badge{display:inline-flex;padding:5px 14px;border-radius:20px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}.bg-s{background:rgba(46,204,113,.1);color:#27ae60}.bg-w{background:rgba(243,156,18,.1);color:#e67e22}.fg{margin-bottom:18px}.fl{display:block;font-size:.8rem;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2)}.fr{display:grid;grid-template-columns:1fr 1fr;gap:16px}.nc{position:fixed;top:24px;right:24px;z-index:3000;display:flex;flex-direction:column;gap:12px}.nt{background:var(--bgC);border-radius:12px;padding:16px 20px;box-shadow:0 16px 48px rgba(0,0,0,.12);display:flex;align-items:flex-start;gap:14px;border-left:5px solid var(--p);min-width:340px;animation:slideIn .35s;font-size:.875rem}.nt.success{border-left-color:var(--s)}.nt.error{border-left-color:var(--d)}.spinner{width:44px;height:44px;border:3px solid var(--b);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;margin:24px auto}.cam-container{position:relative;background:linear-gradient(135deg,#1a1a2e,#0f2444);border-radius:var(--r);overflow:hidden;width:100%;max-width:720px;margin:0 auto;box-shadow:0 16px 64px rgba(0,0,0,.2)}.cam-container video{width:100%;display:block;transform:scaleX(-1)}.cam-container canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}.cam-hud{position:absolute;top:16px;left:16px;right:16px;display:flex;justify-content:space-between;z-index:10}.hud-badge{background:rgba(0,0,0,.6);backdrop-filter:blur(10px);color:#fff;padding:8px 16px;border-radius:24px;font-size:.75rem;font-weight:600;display:flex;align-items:center;gap:8px}.hud-dot{width:10px;height:10px;border-radius:50%;background:#2ecc71;animation:pulse 1.5s infinite}.hud-dot.red{background:#e74c3c}.face-highlight{position:absolute;border:3px solid #2ecc71;border-radius:50%;pointer-events:none;animation:glow 2s infinite}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:2500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}.modal{background:var(--bgC);border-radius:20px;padding:32px;max-width:560px;width:95%;max-height:85vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.3);animation:scaleIn .3s}@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(46,204,113,.4)}50%{box-shadow:0 0 25px rgba(46,204,113,.8)}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}@media(max-width:1024px){.mc{margin-left:0}.sr{grid-template-columns:repeat(2,1fr)}.sb{transform:translateX(-100%);width:260px}.sb.mo{transform:translateX(0)}}@media(max-width:768px){.pc{padding:16px}.sr{grid-template-columns:1fr}.fr{grid-template-columns:1fr}.nc{left:12px;right:12px}.nt{min-width:auto}}
    </style>
</head>
<body class="lt">

<div id="lp" class="lc"><div class="lcd"><div class="llw"><img src="logo.png" alt="SEBS" onerror="this.innerHTML='🏫'"></div><h1 class="lsn">Systematic English<br>Boarding School</h1><p class="lst">Smart Attendance System</p><p style="color:#e67e22;font-weight:600;margin-top:12px;font-size:.8rem">⚠️ MEDIAPIPE FAST DETECTION</p><div class="ld"><span>Secure Access</span></div><button class="glb" onclick="login()">🔑 Sign in to Continue</button></div></div>

<div id="app" class="ac" style="display:none">
    <aside id="sb" class="sb"><div class="sh"><div class="slogo"><img src="logo.png" alt="SEBS" onerror="this.innerHTML='🏫'"></div><h2 class="sn">SEBS</h2></div><nav class="snv"><ul class="sm">
        <li class="si act" data-p="db"><a href="#" class="sl" onclick="nav('db')"><i class="fas fa-th-large"></i><span>Dashboard</span></a></li>
        <li class="si" data-p="att"><a href="#" class="sl" onclick="nav('att')"><i class="fas fa-camera"></i><span>Live Attendance</span></a></li>
        <li class="si" data-p="stu"><a href="#" class="sl" onclick="nav('stu')"><i class="fas fa-users"></i><span>Students</span></a></li>
        <li class="si" data-p="rep"><a href="#" class="sl" onclick="nav('rep')"><i class="fas fa-chart-bar"></i><span>Reports</span></a></li>
    </ul></nav><div class="sf"><button class="slo" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button></div></aside>
    <div class="so" id="so" onclick="cmsb()"></div>
    <main class="mc"><header class="tb"><span id="pt">Dashboard</span><div style="display:flex;align-items:center;gap:24px"><span class="td" id="td"></span><span class="tt" id="tt"></span><button class="ttb" onclick="tth()" id="tth"><i class="fas fa-moon"></i></button></div></header><div class="pc" id="pc"></div></main>
</div>
<div class="nc" id="nc"></div>
<div id="modalContainer"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbxqvvfI1j8aOnKNKjnnSfaGPJw5ANiW6XEnLehaHxJ8YjjegbId8uvcMcHQSaxzHkjM/exec';
let th='lt',attendanceActive=false,lastDetectTime=0,markedToday={},pendingFace=null;
let faceDetection;

function init(){updateTime();setInterval(updateTime,1000);if(localStorage.getItem('s-login')==='1'){showApp();nav('db');}if(localStorage.getItem('s-theme')==='dt'){th='dt';document.body.className='dt';document.getElementById('tth').innerHTML='<i class="fas fa-sun"></i>';}}
function updateTime(){const n=new Date();document.getElementById('td').textContent=n.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});document.getElementById('tt').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function tth(){th=th==='lt'?'dt':'lt';document.body.className=th;document.getElementById('tth').innerHTML=th==='dt'?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';localStorage.setItem('s-theme',th);}
function login(){localStorage.setItem('s-login','1');showApp();nav('db');notify('Welcome!','success');}
function logout(){stopAttendance();localStorage.removeItem('s-login');document.getElementById('lp').style.display='flex';document.getElementById('app').style.display='none';}
function showApp(){document.getElementById('lp').style.display='none';document.getElementById('app').style.display='flex';}
function tmsb(){document.getElementById('sb').classList.toggle('mo');document.getElementById('so').classList.toggle('act');}
function cmsb(){document.getElementById('sb').classList.remove('mo');document.getElementById('so').classList.remove('act');}
function notify(m,t){const icons={success:'fa-check-circle',error:'fa-exclamation-circle'};const n=document.createElement('div');n.className=`nt ${t}`;n.innerHTML=`<div style="font-size:1.2rem"><i class="fas ${icons[t]}"></i></div><div><strong>${t==='success'?'Success':'Error'}</strong><p style="font-size:.75rem;margin-top:2px">${m}</p></div>`;document.getElementById('nc').appendChild(n);setTimeout(()=>{n.style.opacity='0';setTimeout(()=>n.remove(),300);},3000);}
async function api(action,data=null){try{if(data){const r=await fetch(API,{method:'POST',body:JSON.stringify({action,...data})});return await r.json();}else{const r=await fetch(API+'?action='+action);return await r.json();}}catch(e){return null;}}
function showModal(html){document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()">${html}</div></div>`;}

function nav(p){
    document.querySelectorAll('.si').forEach(e=>e.classList.remove('act'));
    const i=document.querySelector(`[data-p="${p}"]`);if(i)i.classList.add('act');
    document.getElementById('pt').textContent={db:'Dashboard',att:'Live Attendance',stu:'Students',rep:'Reports'}[p]||p;
    if(p!=='att')stopAttendance();
    const c=document.getElementById('pc');
    if(p==='db')loadDb(c);else if(p==='att')loadAtt(c);else if(p==='stu')loadStu(c);else if(p==='rep')loadRep(c);
    cmsb();
}

async function loadDb(c){c.innerHTML='<div class="spinner"></div>';const d=await api('getDashboard');if(!d){c.innerHTML='<p>Error</p>';return;}const t=d.totalStudents||0,p=d.present||0,l=d.late||0,a=d.absent||0;c.innerHTML=`<div style="background:var(--bg3);padding:12px 20px;border-radius:var(--r);margin-bottom:24px;text-align:center;font-weight:600;font-size:.85rem">⚡ MediaPipe Fast Face Detection</div><div class="sr"><div class="stc" onclick="nav('stu')"><div class="sci b"><i class="fas fa-users"></i></div><div class="sti"><h3>${t}</h3><p>Total Students</p></div></div><div class="stc"><div class="sci g"><i class="fas fa-check-circle"></i></div><div class="sti"><h3>${p}</h3><p>Present</p></div></div><div class="stc"><div class="sci o"><i class="fas fa-clock"></i></div><div class="sti"><h3>${l}</h3><p>Late</p></div></div><div class="stc"><div class="sci r"><i class="fas fa-times-circle"></i></div><div class="sti"><h3>${a}</h3><p>Absent</p></div></div></div><div style="display:grid;grid-template-columns:2fr 1fr;gap:24px"><div class="card" style="text-align:center;padding:40px"><div style="font-size:4rem;font-weight:900;color:var(--p)">${d.percentage||0}%</div><p style="color:var(--t2);margin-top:8px">Attendance Rate</p></div><div class="card"><h3 style="margin-bottom:16px">Quick Actions</h3><button class="btn btn-p btn-lg" style="width:100%;margin-bottom:12px" onclick="nav('att')"><i class="fas fa-camera"></i> Start Attendance</button></div></div>`;}

function loadAtt(c){
    c.innerHTML=`<div style="display:grid;grid-template-columns:2fr 1fr;gap:24px"><div><div class="cam-container"><video id="cam" autoplay playsinline muted></video><canvas id="overlay"></canvas><div class="cam-hud"><span class="hud-badge"><span class="hud-dot red" id="hudDot"></span><span id="hudText">Stopped</span></span></div></div><div style="text-align:center;margin-top:20px;display:flex;gap:12px;justify-content:center"><button class="btn btn-p btn-lg" id="startBtn" onclick="startAttendance()"><i class="fas fa-play"></i> Start Attendance</button><button class="btn btn-d btn-lg" id="stopBtn" onclick="stopAttendance()" style="display:none"><i class="fas fa-stop"></i> Stop</button></div></div><div class="card"><h3 style="margin-bottom:16px">📋 Today's List</h3><div id="attList" style="max-height:500px;overflow-y:auto">Loading...</div></div></div>`;
    loadAttList();
}

async function startAttendance(){
    try{
        const stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}});
        const video=document.getElementById('cam');video.srcObject=stream;
        document.getElementById('startBtn').style.display='none';
        document.getElementById('stopBtn').style.display='inline-flex';
        document.getElementById('hudText').textContent='Initializing...';
        
        faceDetection=new FaceDetection({locateFile:(f)=>`https://raw.githubusercontent.com/sebs-school/sebs-smart-attendance/main/models/${f}`});
        faceDetection.setOptions({model:'short',minDetectionConfidence:0.5});
        faceDetection.onResults(onFaceResults);
        
        const camera=new Camera(video,{onFrame:async()=>{await faceDetection.send({image:video});},width:640,height:480});
        await camera.start();
        
        document.getElementById('hudText').textContent='Active - Detecting';
        document.getElementById('hudDot').classList.remove('red');
        attendanceActive=true;
        notify('✅ Fast detection active!','success');
    }catch(e){notify('❌ Camera error: '+e.message,'error');stopAttendance();}
}

function stopAttendance(){
    attendanceActive=false;
    if(window.camInstance){window.camInstance.stop();}
    const v=document.getElementById('cam');if(v&&v.srcObject){v.srcObject.getTracks().forEach(t=>t.stop());}
    document.getElementById('hudText').textContent='Stopped';document.getElementById('hudDot').classList.add('red');
    document.getElementById('startBtn').style.display='inline-flex';document.getElementById('stopBtn').style.display='none';
}

function onFaceResults(results){
    if(!attendanceActive)return;
    const canvas=document.getElementById('overlay'),video=document.getElementById('cam');
    if(!canvas||!video)return;
    const ctx=canvas.getContext('2d');
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    if(results.detections&&results.detections.length>0&&Date.now()-lastDetectTime>2000){
        lastDetectTime=Date.now();
        const det=results.detections[0];
        const box=det.boundingBox;
        const cx=box.xCenter*canvas.width/640,cy=box.yCenter*canvas.height/480;
        const w=box.width*canvas.width/640,h=box.height*canvas.height/480;
        const x=cx-w/2,y=cy-h/2;
        
        ctx.strokeStyle='#2ecc71';ctx.lineWidth=3;
        ctx.beginPath();ctx.ellipse(cx,cy,w/2,h/2,0,0,2*Math.PI);ctx.stroke();
        ctx.fillStyle='rgba(46,204,113,.15)';ctx.fill();
        
        pendingFace={cx,cy,w,h,time:Date.now()};
        
        // Simple blink detection via aspect ratio change
        const ar=h/w;
        if(ar>1.2&&Date.now()-lastDetectTime<2500){
            // Face detected + likely looking at camera
            showModal(`<h3 style="margin-bottom:20px;font-size:1.3rem">🆕 Face Detected!</h3><p style="margin-bottom:16px;color:var(--t2)">Register this student:</p><form onsubmit="return quickReg(event)"><div class="fr"><div class="fg"><label class="fl">Name *</label><input id="qsn" required></div><div class="fg"><label class="fl">Class *</label><select id="qsc" required><option value="">Select</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select></div></div><div class="fr"><div class="fg"><label class="fl">Section</label><select id="qss"><option value="">Select</option><option>JUPITER</option><option>SATURN</option><option>URANUS</option><option>NEPTUNE</option></select></div><div class="fg"><label class="fl">Roll</label><input id="qsr"></div></div><div class="fr"><div class="fg"><label class="fl">Father</label><input id="qsf"></div><div class="fg"><label class="fl">Mother</label><input id="qsm"></div></div><div class="fr"><div class="fg"><label class="fl">Phone</label><input id="qsp"></div><div class="fg"><label class="fl">Address</label><input id="qsa"></div></div><button class="btn btn-p btn-lg" style="width:100%;margin-top:16px"><i class="fas fa-save"></i> Save & Mark Present</button></form>`);
            stopAttendance();
        }
    }
}

async function quickReg(e){e.preventDefault();const d={studentName:document.getElementById('qsn').value,class:document.getElementById('qsc').value,section:document.getElementById('qss').value,rollNumber:document.getElementById('qsr').value,gender:'Male',fatherName:document.getElementById('qsf').value,motherName:document.getElementById('qsm').value,guardianPhone:document.getElementById('qsp').value,address:document.getElementById('qsa').value};const r=await api('registerStudent',d);if(r&&r.success){const ar=await api('markAttendance',{studentName:d.studentName,studentId:r.studentId,class:d.class,section:d.section,rollNumber:d.rollNumber,confidence:'0.99'});notify('✅ Registered & Marked Present!','success');document.getElementById('modalContainer').innerHTML='';loadAttList();}else notify('❌ Failed','error');return false;}

async function loadAttList(){const el=document.getElementById('attList');if(!el)return;const d=await api('getStudents');el.innerHTML=d&&d.students?d.students.map(s=>`<div style="padding:10px 0;border-bottom:1px solid var(--b);display:flex;justify-content:space-between"><strong>${s.StudentName}</strong><span style="color:var(--t2);font-size:.8rem">${s.Class||'-'} ${s.Section||'-'}</span></div>`).join(''):'<p style="color:var(--t2)">No students</p>';}
async function loadStu(c){c.innerHTML='<div class="spinner"></div>';const d=await api('getStudents');if(!d||!d.students){c.innerHTML='<div class="card"><p style="text-align:center;padding:40px;color:var(--t2)">No students registered</p></div>';return;}let h='<div class="card"><h2>Students ('+d.students.length+')</h2><div class="tbc" style="margin-top:20px"><table><thead><tr><th>ID</th><th>Name</th><th>Class</th><th>Section</th><th>Roll</th><th>Gender</th><th>Phone</th><th>Address</th></tr></thead><tbody>';d.students.forEach(s=>{h+=`<tr><td><small>${s.StudentID||'-'}</small></td><td><strong>${s.StudentName||'-'}</strong></td><td>${s.Class||'-'}</td><td>${s.Section||'-'}</td><td>${s.RollNumber||'-'}</td><td>${s.Gender||'-'}</td><td>${s.GuardianPhone||'-'}</td><td>${(s.Address||'-').substring(0,25)}</td></tr>`;});h+='</tbody></table></div></div>';c.innerHTML=h;}
function loadRep(c){c.innerHTML=`<div class="card"><h2>Reports</h2><button class="btn btn-p" onclick="loadRepData()"><i class="fas fa-download"></i> Load Data</button></div><div id="rv" style="margin-top:16px"></div>`;}
async function loadRepData(){const v=document.getElementById('rv');v.innerHTML='<div class="spinner"></div>';const d=await api('getStudents');if(!d){v.innerHTML='<p>Error</p>';return;}v.innerHTML='<div class="card"><table><thead><tr><th>Name</th><th>Class</th><th>Section</th><th>Roll</th><th>Phone</th><th>Address</th></tr></thead><tbody>'+d.students.map(s=>`<tr><td><strong>${s.StudentName}</strong></td><td>${s.Class}</td><td>${s.Section}</td><td>${s.RollNumber}</td><td>${s.GuardianPhone||'-'}</td><td>${s.Address||'-'}</td></tr>`).join('')+'</tbody></table></div>';}

document.addEventListener('DOMContentLoaded',init);
</script>
