<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEBS Smart Attendance</title>
<link rel="icon" href="logo.png">
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ─── TOKENS ─────────────────────────────────────────────────────────── */
:root{
  --p:#1a3a6b; --p2:#2a5298; --s:#00c853; --w:#ff9800;
  --d:#e74c3c; --blue:#2196f3;
  --bg:#f0f4fb; --card:#fff; --border:#e2eaf6;
  --text:#1a1a2e; --sub:#64748b;
  --sb-bg:linear-gradient(180deg,#07111f 0%,#0f2044 60%,#1a3a6b 100%);
  --radius:18px; --radius-sm:12px;
  --shadow:0 2px 16px rgba(26,58,107,.07);
  --shadow-lg:0 8px 40px rgba(26,58,107,.13);
  --transition:.22s cubic-bezier(.4,0,.2,1);
}
body.dark{
  --bg:#0d1b2a; --card:#111e30; --border:#1e3050;
  --text:#e8f0fe; --sub:#8ba4c8;
  --shadow:0 2px 16px rgba(0,0,0,.3);
  --shadow-lg:0 8px 40px rgba(0,0,0,.4);
}

/* ─── RESET ──────────────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--transition),color var(--transition)}
a{text-decoration:none;color:inherit}ul{list-style:none}
button{cursor:pointer;border:none;outline:none;font-family:inherit;transition:var(--transition)}
input,select,textarea{font-family:inherit;font-size:.88rem;border:2px solid var(--border);border-radius:var(--radius-sm);padding:11px 15px;background:var(--card);color:var(--text);width:100%;transition:border-color var(--transition)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--p)}
textarea{resize:vertical;min-height:52px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes scaleIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes ringPulse{0%{box-shadow:0 0 0 0 rgba(0,200,83,.5)}70%{box-shadow:0 0 0 18px rgba(0,200,83,0)}100%{box-shadow:0 0 0 0 rgba(0,200,83,0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ─── LAYOUT ─────────────────────────────────────────────────────────── */
.ac{display:flex;min-height:100vh}
.mc{flex:1;margin-left:260px;display:flex;flex-direction:column;min-height:100vh}
.pc{flex:1;padding:28px 32px;overflow-y:auto}

/* ─── SIDEBAR ────────────────────────────────────────────────────────── */
.sb{
  width:260px;height:100vh;
  background:var(--sb-bg);
  position:fixed;left:0;top:0;z-index:1000;
  display:flex;flex-direction:column;
  box-shadow:4px 0 24px rgba(0,0,0,.18);
}
.sh{
  padding:22px 20px 18px;
  display:flex;align-items:center;gap:13px;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.slogo{
  width:44px;height:44px;border-radius:13px;
  background:#fff;display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
.slogo img{width:34px;height:34px;object-fit:contain}
.sn{font-weight:800;font-size:1.08rem;color:#fff;line-height:1.2}
.sn small{font-size:.62rem;font-weight:400;color:rgba(255,255,255,.45);display:block;letter-spacing:.5px}
.snv{flex:1;overflow-y:auto;padding:14px 10px}
.snv::-webkit-scrollbar{width:4px}
.snv::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.sm{display:flex;flex-direction:column;gap:3px}
.sg{margin-bottom:6px}
.sg-label{font-size:.6rem;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,.28);padding:8px 16px 4px;text-transform:uppercase}
.si{border-radius:11px;overflow:hidden}
.si:hover .sl{background:rgba(255,255,255,.07);color:#c8daf4}
.si.act .sl{background:rgba(255,255,255,.14);color:#fff}
.si.act .sl i{color:#4da6ff}
.sl{display:flex;align-items:center;gap:12px;padding:11px 17px;color:rgba(255,255,255,.55);font-size:.83rem;font-weight:500;transition:var(--transition);border-radius:11px}
.sl i{font-size:1rem;width:20px;text-align:center;color:rgba(255,255,255,.35);transition:var(--transition)}
.sf{padding:14px 10px;border-top:1px solid rgba(255,255,255,.07);margin-top:auto}
.slo{width:100%;display:flex;align-items:center;gap:12px;padding:11px 17px;background:rgba(231,76,60,.08);color:#f4877a;font-size:.83rem;font-weight:500;border-radius:11px;transition:var(--transition)}
.slo:hover{background:rgba(231,76,60,.16)}
.so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;backdrop-filter:blur(2px)}
.so.act{display:block}

/* ─── TOPBAR ─────────────────────────────────────────────────────────── */
.tb{
  height:68px;
  background:rgba(255,255,255,.95);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;position:sticky;top:0;z-index:900;
  backdrop-filter:blur(12px);
  transition:background var(--transition);
}
body.dark .tb{background:rgba(17,30,48,.95)}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-hamburger{display:none;width:38px;height:38px;align-items:center;justify-content:center;border-radius:10px;background:var(--border);cursor:pointer;font-size:1rem;color:var(--text)}
#pt{font-size:1.15rem;font-weight:800;color:var(--text)}
.tb-right{display:flex;align-items:center;gap:16px}
.td{font-size:.72rem;color:var(--sub);font-weight:500}
.tt{font-size:.8rem;font-weight:700;color:var(--p);font-family:monospace;background:rgba(26,58,107,.07);padding:5px 10px;border-radius:8px}
.ttb{background:var(--border);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:.9rem}
.ttb:hover{background:var(--p);color:#fff}

/* ─── LOGIN ──────────────────────────────────────────────────────────── */
.lc{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#04091a 0%,#0a1628 40%,#1a3a6b 100%);
  position:relative;overflow:hidden;
}
.lc::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 80%,rgba(42,82,152,.4) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 20%,rgba(0,200,83,.15) 0%,transparent 50%);
}
.lc-orb{
  position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;
}
.lc-orb-1{width:500px;height:500px;background:rgba(26,58,107,.45);top:-100px;left:-100px}
.lc-orb-2{width:400px;height:400px;background:rgba(0,200,83,.1);bottom:-80px;right:-80px}
.lcd{
  position:relative;z-index:1;width:100%;max-width:430px;
  background:rgba(255,255,255,.98);
  border-radius:28px;padding:52px 42px 44px;
  box-shadow:0 40px 100px rgba(0,0,0,.35);
  animation:scaleIn .4s;
}
.llw{
  width:84px;height:84px;margin:0 auto 20px;
  border-radius:20px;background:#fff;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;box-shadow:0 8px 28px rgba(26,58,107,.18);
}
.llw img{width:66px;height:66px;object-fit:contain}
.lsn{font-size:1.5rem;font-weight:900;color:#1a1a2e;line-height:1.25;margin-bottom:6px}
.lst{font-size:.7rem;color:#64748b;text-transform:uppercase;letter-spacing:2.5px;margin-bottom:30px}
.login-divider{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:#e2e8f0}
.login-divider span{color:#94a3b8;font-size:.7rem;font-weight:600;white-space:nowrap}
.lbtn{
  display:block;width:100%;padding:16px 24px;
  background:linear-gradient(135deg,var(--p) 0%,var(--p2) 100%);
  color:#fff;border-radius:14px;font-size:.92rem;font-weight:700;
  cursor:pointer;border:none;text-align:center;transition:var(--transition);
  box-shadow:0 6px 24px rgba(26,58,107,.3);
  font-family:'Inter',sans-serif;
}
.lbtn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(26,58,107,.4)}
.lbtn:active{transform:translateY(0)}
.login-info{margin-top:20px;text-align:center;font-size:.72rem;color:#94a3b8}

/* ─── CARDS & STATS ──────────────────────────────────────────────────── */
.card{background:var(--card);border-radius:var(--radius);padding:24px 28px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:20px;transition:background var(--transition),border-color var(--transition)}
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:20px}
.stc{
  background:var(--card);border-radius:var(--radius);
  padding:22px 24px;box-shadow:var(--shadow);border:1px solid var(--border);
  display:flex;align-items:center;gap:18px;cursor:pointer;
  transition:var(--transition);
}
.stc:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.sci{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.sci.b{background:rgba(26,58,107,.08);color:var(--p)}
.sci.g{background:rgba(0,200,83,.1);color:var(--s)}
.sci.o{background:rgba(255,152,0,.1);color:var(--w)}
.sci.r{background:rgba(231,76,60,.1);color:var(--d)}
.sti h3{font-size:1.8rem;font-weight:900;line-height:1}
.sti p{font-size:.68rem;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.sti .trend{font-size:.7rem;font-weight:600;margin-top:4px}
.trend.up{color:var(--s)}.trend.dn{color:var(--d)}

/* ─── BUTTONS ────────────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 20px;border-radius:11px;font-weight:600;font-size:.84rem;cursor:pointer;border:none;transition:var(--transition);font-family:'Inter',sans-serif}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-p{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;box-shadow:0 4px 16px rgba(26,58,107,.25)}
.btn-s{background:linear-gradient(135deg,#00c853,#00e676);color:#fff;box-shadow:0 4px 16px rgba(0,200,83,.25)}
.btn-d{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;box-shadow:0 4px 16px rgba(231,76,60,.25)}
.btn-o{background:linear-gradient(135deg,#ff9800,#f57c00);color:#fff;box-shadow:0 4px 16px rgba(255,152,0,.25)}
.btn-ghost{background:var(--border);color:var(--text)}
.btn-lg{padding:14px 28px;font-size:.92rem;border-radius:14px}
.btn-sm{padding:8px 14px;font-size:.78rem;border-radius:9px}
.btn-block{width:100%;justify-content:center}

/* ─── TABLE ──────────────────────────────────────────────────────────── */
.tbc{overflow-x:auto;border-radius:14px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;min-width:600px}
thead{background:rgba(26,58,107,.04)}
body.dark thead{background:rgba(255,255,255,.03)}
th{padding:13px 18px;text-align:left;font-weight:700;font-size:.68rem;text-transform:uppercase;color:var(--sub);letter-spacing:.5px;white-space:nowrap}
td{padding:12px 18px;border-top:1px solid var(--border);font-size:.82rem;vertical-align:middle}
tbody tr:hover{background:rgba(26,58,107,.025)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.7rem;font-weight:600}
.badge-g{background:rgba(0,200,83,.12);color:#00a544}
.badge-r{background:rgba(231,76,60,.12);color:#c0392b}
.badge-o{background:rgba(255,152,0,.12);color:#e65c00}

/* ─── FORM ───────────────────────────────────────────────────────────── */
.fg{margin-bottom:14px}
.fl{display:block;font-size:.7rem;font-weight:700;margin-bottom:6px;text-transform:uppercase;color:var(--sub);letter-spacing:.3px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.section-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--p);margin:20px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--p);display:inline-block}

/* ─── CAMERA / ATTENDANCE ────────────────────────────────────────────── */
.cam-wrap{max-width:720px;margin:0 auto}
.cam-box{
  position:relative;background:#000;
  border-radius:22px;overflow:hidden;
  width:100%;aspect-ratio:4/3;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
}
.cam-box video{width:100%;height:100%;object-fit:cover;display:block}
.cam-box canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.cam-hud{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:flex-start;z-index:5;gap:8px}
.hud-badge{
  background:rgba(7,17,31,.72);backdrop-filter:blur(8px);
  color:#fff;padding:8px 14px;border-radius:22px;
  font-size:.72rem;display:flex;align-items:center;gap:8px;
  border:1px solid rgba(255,255,255,.08);
}
.hud-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.hud-dot.on{background:#00e676;animation:pulse .9s infinite}
.hud-dot.off{background:#e74c3c}
.hud-dot.loading{background:#ff9800;animation:pulse .5s infinite}
.cam-footer{
  display:flex;align-items:center;justify-content:center;
  gap:12px;margin-top:16px;flex-wrap:wrap;
}
.cam-status{
  text-align:center;margin-top:10px;
  font-size:.8rem;color:var(--sub);min-height:20px;
}
/* Today marked list */
.marked-strip{
  display:flex;gap:8px;flex-wrap:wrap;
  margin-top:10px;min-height:36px;
}
.marked-chip{
  display:flex;align-items:center;gap:6px;
  background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.2);
  color:#00a544;padding:5px 12px;border-radius:20px;font-size:.72rem;font-weight:600;
  animation:slideIn .25s;
}

/* Success overlay */
.success-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;z-index:20;
  backdrop-filter:blur(4px);
}
.success-card{
  background:#fff;border-radius:22px;padding:34px 40px;
  text-align:center;animation:scaleIn .3s;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
  max-width:280px;
}
body.dark .success-card{background:#111e30;color:var(--text)}
.success-icon{font-size:4rem;line-height:1;margin-bottom:8px}
.success-name{font-size:1.2rem;font-weight:800;color:var(--p)}
.success-msg{font-size:.8rem;color:var(--sub);margin-top:6px}

/* Liveness instruction */
.liveness-tip{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(7,17,31,.82);backdrop-filter:blur(8px);
  color:#fff;padding:10px 20px;border-radius:20px;
  font-size:.75rem;text-align:center;white-space:nowrap;z-index:10;
  border:1px solid rgba(255,255,255,.1);
}

/* ─── MODAL ──────────────────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:2500;display:flex;align-items:center;justify-content:center;
  padding:16px;backdrop-filter:blur(4px);animation:fadeIn .2s;
}
.modal{
  background:var(--card);border-radius:22px;padding:30px 34px;
  max-width:580px;width:100%;max-height:90vh;overflow-y:auto;
  box-shadow:0 30px 80px rgba(0,0,0,.3);animation:scaleIn .25s;
  border:1px solid var(--border);
}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.modal-title{font-size:1.1rem;font-weight:800}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;color:var(--sub);transition:var(--transition)}
.modal-close:hover{background:var(--d);color:#fff}

/* ─── NOTIFICATION ───────────────────────────────────────────────────── */
.nc{position:fixed;top:18px;right:18px;z-index:3000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.nt{
  background:var(--card);border-radius:12px;
  padding:14px 18px;box-shadow:0 12px 40px rgba(0,0,0,.15);
  display:flex;align-items:flex-start;gap:10px;
  border-left:4px solid var(--p);min-width:260px;max-width:340px;
  animation:slideIn .25s;font-size:.82rem;pointer-events:auto;
  border:1px solid var(--border);border-left-width:4px;
}
.nt.success{border-left-color:var(--s)}
.nt.error{border-left-color:var(--d)}
.nt.warning{border-left-color:var(--w)}
.nt-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px}
.nt-body{flex:1}
.nt-title{font-weight:700;margin-bottom:2px}
.nt-msg{color:var(--sub);font-size:.78rem}

/* ─── DASHBOARD EXTRAS ───────────────────────────────────────────────── */
.db-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.rate-ring{display:flex;align-items:center;justify-content:center;flex-direction:column;padding:32px}
.rate-num{font-size:4rem;font-weight:900;line-height:1;background:linear-gradient(135deg,var(--p),var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rate-label{font-size:.72rem;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-top:6px}
.quick-grid{display:flex;flex-direction:column;gap:10px}

/* ─── REPORTS ────────────────────────────────────────────────────────── */
.report-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.rtab{padding:9px 18px;border-radius:10px;font-size:.82rem;font-weight:600;background:var(--border);color:var(--sub);cursor:pointer;transition:var(--transition)}
.rtab.act{background:var(--p);color:#fff;box-shadow:0 4px 14px rgba(26,58,107,.25)}
.filter-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.filter-bar input,.filter-bar select{width:auto;min-width:140px}

/* ─── LOADING ────────────────────────────────────────────────────────── */
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:spin .55s linear infinite;margin:0 auto}
.loading-box{text-align:center;padding:48px 24px}
.loading-box p{color:var(--sub);margin-top:14px;font-size:.85rem}

/* ─── RESPONSIVE ─────────────────────────────────────────────────────── */
@media(max-width:1100px){.sr{grid-template-columns:repeat(2,1fr)}.db-grid{grid-template-columns:1fr}}
@media(max-width:860px){
  .mc{margin-left:0}
  .sb{transform:translateX(-100%);transition:transform var(--transition)}
  .sb.mo{transform:translateX(0)}
  .tb-hamburger{display:flex}
  .sr{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
  .sr{grid-template-columns:1fr}
  .fr,.fr-3{grid-template-columns:1fr}
  .pc{padding:18px}
  .tb{padding:0 18px}
  .cam-box{aspect-ratio:1/1}
  .modal{padding:22px 18px}
}
@media print{
  body{background:#fff!important;color:#000!important}
  .sb,.tb,.so,.nc,.modal-overlay,#app > .so,
  .cam-footer,.cam-status,
  button.no-print,.btn{display:none!important}
  .mc{margin-left:0!important}
  .pc{padding:0!important}
  .card{box-shadow:none!important;border:1px solid #ccc!important}
}
</style>
</head>
<body>

<!-- ══════ LOGIN ══════ -->
<div id="lp" class="lc">
  <div class="lc-orb lc-orb-1"></div>
  <div class="lc-orb lc-orb-2"></div>
  <div class="lcd">
    <div class="llw">
      <img src="logo.png" alt="SEBS" id="loginLogo" onerror="this.outerHTML='<span style=font-size:2rem>🏫</span>'">
    </div>
    <h1 class="lsn">Systematic English<br>Boarding School</h1>
    <p class="lst">Smart Attendance System</p>
    <div class="login-divider"><span>Secure Access</span></div>
    <button class="lbtn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt" style="margin-right:8px"></i>Sign in to Continue
    </button>
    <p class="login-info">Powered by Face Recognition AI</p>
  </div>
</div>

<!-- ══════ MAIN APP ══════ -->
<div id="app" class="ac" style="display:none">

  <!-- SIDEBAR -->
  <aside id="sb" class="sb">
    <div class="sh">
      <div class="slogo">
        <img src="logo.png" alt="SEBS" onerror="this.outerHTML='<span style=font-size:1.4rem>🏫</span>'">
      </div>
      <div>
        <h2 class="sn">SEBS<small>Smart Attendance</small></h2>
      </div>

/* ════════════════════════════════════════════════════════

function notify(msg, type = 'info', title = '') {
  const nc = document.getElementById('nc');

  const n = document.createElement('div');
  n.className = `nt ${type}`;
  n.innerHTML = `

      ${title ? `<div class="nt-title">${title}</div>` : ''}

}

/* ════════════════════════════════════════════════════════
   API
════════════════════════════════════════════════════════ */
async function api(action, data = null) {
  try {
    if (data) {
      const r = await fetch(API, {
        method: 'POST',
        body: JSON.stringify({ action, ...data })
      });
      const json = await r.json();
      return json;
    } else {
      const r = await fetch(`${API}?action=${action}`);
      return await r.json();
    }
  } catch (e) {
    console.error('API error:', e);
    return null;
  }
}

async function preloadModels() {
  if (modelsLoaded || modelsLoading) return;
  modelsLoading = true;
  notify('⏳ Loading AI models...', 'info', 'Please wait');
  try {
    await Promise.all([
      faceapi.nets.ssdMobilenetv1.loadFromUri(MODELS),
      faceapi.nets.faceLandmark68Net.loadFromUri(MODELS),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODELS)
    ]);
    modelsLoaded = true;
    modelsLoading = false;
    await loadEmbeddings();
    notify('✅ Models loaded! Ready.', 'success');
  } catch (e) {
    modelsLoading = false;
    notify('❌ Model load failed. Check internet.', 'error');
  }
}

async function loadEmbeddings() {
  const d = await api('getAllEmbeddings');
  if (!d || !d.embeddings || !d.embeddings.length) {
    faceMatcher = null;
    return;
  }
  const lb = [];
  for (const e of d.embeddings) {
    if (e.embedding && Array.isArray(e.embedding)) {
      lb.push(new faceapi.LabeledFaceDescriptors(
        e.studentId,
        [new Float32Array(e.embedding)]
      ));
    }
  }
  faceMatcher = lb.length > 0 ? new faceapi.FaceMatcher(lb, 0.48) : null;
  console.log(`Loaded ${lb.length} face embeddings`);
}

async function loadAllStudents() {
  const d = await api('getStudents');
  if (d && d.students) allStudents = d.students;

function updateModelBadge() {
  const dot = document.getElementById('modelDot');
  const txt = document.getElementById('modelText');

  if (modelsLoaded) {
    dot.className = 'hud-dot on';
    txt.textContent = 'AI Ready';
  } else if (modelsLoading) {
    dot.className = 'hud-dot loading';
    txt.textContent = 'Loading...';
    setTimeout(updateModelBadge, 1000);
  } else {
    dot.className = 'hud-dot off';
    txt.textContent = 'AI Not Loaded';
  }
}

async function startAttendance() {
  if (!modelsLoaded) {
    notify('Loading AI models first...', 'warning');
    await preloadModels();
    if (!modelsLoaded) return;
  }

  try {
    // FIXED: Try ALL camera options until one works
    const constraintsList = [
      { video: { width: { ideal: 640 }, height: { ideal: 480 } } },
      { video: { width: 640, height: 480 } },
      { video: { width: 320, height: 240 } },
      { video: true }
    ];

    let gotStream = false;
    let lastError = '';

    for (const c of constraintsList) {
      try {
        stream = await navigator.mediaDevices.getUserMedia(c);
        if (stream && stream.active) {
          gotStream = true;
          break;
        }
      } catch (err) {
        lastError = err.message || 'Unknown error';
      }
    }

    if (!gotStream) {
      throw new Error(lastError || 'No camera available. Check connection and permissions.');
    }

    const video = document.getElementById('cam');
    if (!video) throw new Error('Video element not found');

    video.srcObject = stream;
    
    // Wait for video to be ready
    await new Promise((resolve, reject) => {
      video.onloadedmetadata = () => {
        video.play().then(resolve).catch(reject);
      };
      // Timeout after 5 seconds
      setTimeout(() => reject(new Error('Camera stream timeout. Check your webcam connection.')), 5000);
    });

    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'inline-flex';
    document.getElementById('hudDot').className = 'hud-dot on';
    document.getElementById('hudText').textContent = 'Scanning...';
    attendanceActive = true;
    scanning = true;
    resetLiveness();
    updateModelBadge();
    setStatus('👁️ Scanning for faces...');
    notify('✅ Camera connected! Show your face. | क्यामेरा जडान भयो!', 'success');
    detectLoop();
  } catch (e) {
    console.error('Camera error:', e);
    notify('❌ Camera error: ' + (e.message || 'Permission denied. Check webcam connection.'), 'error');
    setStatus('⚠️ Camera failed. Check your webcam and refresh.');
  }
}
function stopAttendance() {
  attendanceActive = false;
  scanning = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }

  const el = id => document.getElementById(id);
  if (el('hudDot')) el('hudDot').className = 'hud-dot off';
  if (el('hudText')) el('hudText').textContent = 'Stopped';
  if (el('startBtn')) el('startBtn').style.display = 'inline-flex';
  if (el('stopBtn')) el('stopBtn').style.display = 'none';
  if (el('successOverlay')) el('successOverlay').style.display = 'none';
  if (el('matchBadge')) el('matchBadge').style.display = 'none';
  if (el('livenessTip')) el('livenessTip').style.display = 'none';
  setStatus('Camera stopped');
}

/* ─── LIVENESS ─────────────────────────────────────── */
function resetLiveness() {
  livenessState = {
    prevEAR: 1,
    blinkFrames: 0,
    motionBuffer: [],
    passed: false,
    attempts: 0,
    lastNosePos: null,
    headMoveFrames: 0
  };
}

function eyeAspectRatio(landmarks, topIdx, botIdx, leftIdx, rightIdx) {
  const pts = landmarks.positions;
  const top = pts[topIdx], bot = pts[botIdx];
  const left = pts[leftIdx], right = pts[rightIdx];
  const vertical = Math.hypot(top.x - bot.x, top.y - bot.y);
  const horizontal = Math.hypot(left.x - right.x, left.y - right.y);
  return horizontal < 0.5 ? 1 : vertical / horizontal;
}

function checkLiveness(detection) {
  if (!detection.landmarks) return false;

  const pts = detection.landmarks.positions;

  // Eye Aspect Ratio blink detection
  // Left eye: 37,41,36,39 — Right eye: 43,47,42,45 (0-indexed)
  const leftEAR  = eyeAspectRatio(detection.landmarks, 37, 41, 36, 39);
  const rightEAR = eyeAspectRatio(detection.landmarks, 43, 47, 42, 45);
  const ear = (leftEAR + rightEAR) / 2;

  // Blink: EAR drops below threshold
  if (ear < 0.20 && livenessState.prevEAR > 0.24) {
    livenessState.blinkFrames++;
    if (livenessState.blinkFrames >= 1) {
      livenessState.prevEAR = ear;
      setStatus('👁️ Blink detected! Processing...');
      return true;
    }
  }
  if (ear > 0.26) livenessState.blinkFrames = 0;
  livenessState.prevEAR = ear;

  // Head movement: track nose tip (pts[30])
  const noseNow = { x: pts[30].x, y: pts[30].y };
  if (livenessState.lastNosePos) {
    const dx = Math.abs(noseNow.x - livenessState.lastNosePos.x);
    const dy = Math.abs(noseNow.y - livenessState.lastNosePos.y);
    if (dx > 8 || dy > 8) {
      livenessState.headMoveFrames++;
    } else {
      livenessState.headMoveFrames = Math.max(0, livenessState.headMoveFrames - 1);
    }
    if (livenessState.headMoveFrames >= 5) {
      livenessState.headMoveFrames = 0;
      setStatus('🤙 Movement detected! Processing...');
      return true;
    }
  }
  livenessState.lastNosePos = noseNow;
  return false;
}

/* ─── DETECTION LOOP ───────────────────────────────── */
async function detectLoop() {
  if (!attendanceActive) return;

  const video = document.getElementById('cam');
  const canvas = document.getElementById('overlay');
  if (!video || !canvas || video.readyState < 2) {
    rafId = requestAnimationFrame(detectLoop);
    return;
  }

  try {
    const options = new faceapi.SsdMobilenetv1Options({ minConfidence: 0.28 });
    const faces = await faceapi
      .detectAllFaces(video, options)
      .withFaceLandmarks()
      .withFaceDescriptors();

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const results = faceapi.resizeResults(faces, {
      width: video.videoWidth,
      height: video.videoHeight
    });

    if (results.length === 0) {
      id('matchBadge').style.display = 'none';
      if (id('livenessTip')) id('livenessTip').style.display = 'none';
      setStatus('👀 Looking for faces...');
    }

    for (const det of results) {
      const box = det.detection.box;
      const cx = box.x + box.width / 2;
      const cy = box.y + box.height / 2;
      const rad = Math.max(box.width, box.height) / 1.4;

      let isKnown = false;
      let matchLabel = '';
      let matchDist = 1;

      if (faceMatcher && det.descriptor) {
        const bm = faceMatcher.findBestMatch(det.descriptor);
        isKnown = bm.label !== 'unknown' && bm.distance < 0.5;
        matchLabel = bm.label;
        matchDist = bm.distance;
      }

      // Draw circular ring
      const ringColor = isKnown ? '#00c853' : '#2196f3';
      ctx.save();
      ctx.shadowColor = ringColor;
      ctx.shadowBlur = 20;
      ctx.strokeStyle = ringColor;
      ctx.lineWidth = 3.5;
      ctx.beginPath();
      ctx.arc(cx, cy, rad, 0, 2 * Math.PI);
      ctx.stroke();
      ctx.restore();

      // Inner glow
      ctx.save();
      ctx.strokeStyle = ringColor + '33';
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.arc(cx, cy, rad + 5, 0, 2 * Math.PI);
      ctx.stroke();
      ctx.restore();

      // Label
      const labelText = isKnown
        ? `✅ ${matchLabel.substring(0, 16)} (${Math.round((1 - matchDist) * 100)}%)`
        : '🆕 New Face';
      ctx.font = 'bold 13px Inter, sans-serif';
      const tw = ctx.measureText(labelText).width;
      const lx = cx - tw / 2 - 10;
      const ly = cy + rad + 12;
      ctx.fillStyle = 'rgba(0,0,0,.78)';
      roundRect(ctx, lx, ly, tw + 20, 24, 6);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillText(labelText, cx - tw / 2, ly + 16);

      // Update HUD
      id('matchBadge').style.display = 'flex';
      id('matchText').textContent = isKnown ? `✅ ${matchLabel}` : '🆕 New';

      // Liveness check & marking — only one face at a time
      if (scanning && !detectionPaused && Date.now() - lastMarkTime > 2000) {
        const tipEl = id('livenessTip');
        if (tipEl) tipEl.style.display = 'block';

        const live = checkLiveness(det);
        if (live) {
          lastMarkTime = Date.now();
          scanning = false;
          if (tipEl) tipEl.style.display = 'none';
          detectionPaused = true;

          if (isKnown) {
            await markStudent(matchLabel, matchDist, det.descriptor);
          } else {
            pendingDescriptor = det.descriptor ? Array.from(det.descriptor) : null;
            showRegModal();
          }
          break; // process one face
        }
      }
    }
  } catch (e) {
    console.warn('Detection error:', e);
  }

  if (attendanceActive) {
    rafId = requestAnimationFrame(detectLoop);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* ─── MARK STUDENT ─────────────────────────────────── */
async function markStudent(studentId, distance, descriptor) {
  const now = Date.now();
  const todayKey = new Date().toDateString();
  const dayKey = `${studentId}_${todayKey}`;

  // 30-second cooldown
  if (cooldowns[studentId] && now - cooldowns[studentId] < 30000) {
    const wait = Math.ceil((30000 - (now - cooldowns[studentId])) / 1000);
    notify(`⏳ ${studentId} — wait ${wait}s`, 'warning');
    resumeScanning(1500);
    return;
  }

  // Already marked today
  if (markedToday[dayKey]) {
    notify(`✅ ${studentId} already marked today`, 'info');
    resumeScanning(1500);
    return;
  }

  cooldowns[studentId] = now;
  setStatus(`⏳ Marking ${studentId}...`);

  const r = await api('markAttendance', {
    studentId,
    confidence: (1 - distance).toFixed(3)
  });

  if (r && r.success) {
    markedToday[dayKey] = true;
    const displayName = r.studentName || studentId;
    showSuccessOverlay(displayName);
    addToMarkedStrip(displayName);
    notify(`✅ ${displayName} — Present!`, 'success', 'Attendance Marked');
  } else {
    notify('❌ Mark failed. Retry.', 'error');
    resumeScanning(1500);
  }
}

function resumeScanning(delay = 1800) {
  setTimeout(() => {
    scanning = true;
    detectionPaused = false;
    resetLiveness();
    if (attendanceActive) detectLoop();
  }, delay);
}

async function exportCSV() {
  const data = await fetchReportData();
  if (!data.rows || !data.rows.length) {
    notify('No data to export', 'warning');
    return;
  }
  let csv = '#,ID,Name,Class,Section,Roll,Status,Time\n';
  data.rows.forEach((r, i) => {
    csv += `${i+1},"${r.id||''}","${r.name||''}","${r.class||''}","${r.section||''}","${r.roll||''}","${r.status||''}","${r.time||''}"\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `sebs-attendance-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  notify('✅ CSV exported!', 'success');
}
