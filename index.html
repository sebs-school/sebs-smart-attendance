<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEBS Smart Attendance - TEST</title>
    <link rel="icon" href="logo.png">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root{--p:#1a3a6b;--pl:#2a5298;--s:#2ecc71;--w:#f39c12;--d:#e74c3c;--r:10px}
        .lt{--bg:#f8f9fc;--bg2:#fff;--bg3:#f1f3f9;--bgS:#1a3a6b;--bgC:#fff;--bgI:#f8f9fc;--t:#1a1a2e;--t2:#636e72;--tS:#c8d6e5;--b:#e0e5ec}
        .dt{--bg:#0f1923;--bg2:#1a2634;--bg3:#243447;--bgS:#0d1117;--bgC:#1a2634;--bgI:#243447;--t:#e8eaed;--t2:#9aa0a6;--tS:#8b949e;--b:#2d3748}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}a{text-decoration:none;color:inherit}ul{list-style:none}button{cursor:pointer;border:none;outline:none;font-family:inherit;font-size:inherit}input,select,textarea{font-family:inherit;font-size:inherit;border:1px solid var(--b);border-radius:6px;padding:10px 14px;background:var(--bgI);color:var(--t);width:100%}textarea{resize:vertical;min-height:60px}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg3)}::-webkit-scrollbar-thumb{background:#888;border-radius:3px}.ac{display:flex;min-height:100vh}.mc{flex:1;margin-left:260px;display:flex;flex-direction:column;min-height:100vh}.sb{width:260px;height:100vh;background:var(--bgS);position:fixed;left:0;top:0;z-index:1000;display:flex;flex-direction:column;overflow:hidden}.sh{height:64px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.08);gap:12px;flex-shrink:0}.slogo{width:40px;height:40px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}.slogo img{width:32px;height:32px;object-fit:contain}.sn{font-weight:700;font-size:1.1rem;color:#fff;white-space:nowrap}.st{margin-left:auto;background:rgba(255,255,255,.1);color:#fff;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.snv{flex:1;overflow-y:auto;padding:12px 8px}.sm{display:flex;flex-direction:column;gap:2px}.si{border-radius:10px}.si:hover{background:rgba(255,255,255,.1)}.si.act{background:rgba(255,255,255,.15)}.sl{display:flex;align-items:center;gap:12px;padding:12px 14px;color:var(--tS);font-size:.9rem;font-weight:500;border-radius:10px;white-space:nowrap}.sl i{font-size:1.2rem;width:22px;text-align:center}.sf{padding:12px 8px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}.slo{width:100%;display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(231,76,60,.1);color:#ec7063;font-size:.9rem;font-weight:500;border-radius:10px;cursor:pointer}.so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999}.so.act{display:block}.tb{height:64px;background:var(--bg2);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:900}.tbl{display:flex;align-items:center;gap:16px}.tbr{display:flex;align-items:center;gap:20px}.mmb{display:none;background:none;color:var(--t);font-size:1.4rem;padding:8px}#pt{font-size:1.25rem;font-weight:600}.td,.tt{font-size:.85rem;color:var(--t2)}.tt{font-weight:600;color:var(--p);font-family:monospace}.ttb{background:var(--bg3);color:var(--t);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem}.ua{width:36px;height:36px;border-radius:50%;background:var(--pl);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}.pc{flex:1;padding:24px;overflow-y:auto}.lc{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f2444,#1a3a6b,#2a5298,#4da8da)}.lcd{width:100%;max-width:440px;background:rgba(255,255,255,.95);border-radius:24px;padding:48px 40px;box-shadow:0 25px 80px rgba(0,0,0,.25);text-align:center}.llw{width:90px;height:90px;margin:0 auto 20px;border-radius:24px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(26,58,107,.2);overflow:hidden}.llw img{width:70px;height:70px;object-fit:contain}.lsn{font-size:1.6rem;font-weight:700;color:#1a1a2e;line-height:1.3;margin-bottom:6px}.lst{font-size:.9rem;color:#636e72;font-weight:500;text-transform:uppercase;letter-spacing:1px}.ld{display:flex;align-items:center;gap:16px;margin:28px 0}.ld::before,.ld::after{content:'';flex:1;height:1px;background:#e0e5ec}.ld span{font-size:.8rem;color:#a0a8b0;text-transform:uppercase}.glb{width:100%;padding:14px 24px;background:#fff;border:2px solid #e0e5ec;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:12px;font-size:1rem;font-weight:600;color:#1a1a2e;cursor:pointer;position:relative;z-index:5}.lit{text-align:center;margin-top:20px;font-size:.8rem;color:#a0a8b0}.lf{text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid #eef1f6}.lf p{font-size:.78rem;color:#a0a8b0}.card{background:var(--bgC);border-radius:var(--r);padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.06);border:1px solid var(--b);margin-bottom:20px}.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:24px}.stc{background:var(--bgC);border-radius:var(--r);padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.06);border:1px solid var(--b);display:flex;align-items:flex-start;gap:16px;cursor:pointer;transition:.3s}.stc:hover{transform:translateY(-4px)}.sci{width:48px;height:48px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}.sci.b{background:rgba(26,58,107,.1);color:var(--p)}.sci.g{background:rgba(46,204,113,.1);color:var(--s)}.sci.o{background:rgba(243,156,18,.1);color:var(--w)}.sci.r{background:rgba(231,76,60,.1);color:var(--d)}.sti h3{font-size:1.8rem;font-weight:700;line-height:1}.sti p{font-size:.85rem;color:var(--t2);margin-top:4px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:8px;font-weight:600;font-size:.9rem;cursor:pointer;white-space:nowrap;transition:.15s}.btn-p{background:var(--p);color:#fff}.btn-s{background:var(--s);color:#fff}.btn-w{background:var(--w);color:#fff}.btn-d{background:var(--d);color:#fff}.btn-lg{padding:14px 28px;font-size:1rem}.tbc{overflow-x:auto;border-radius:var(--r);border:1px solid var(--b)}table{width:100%;border-collapse:collapse;background:var(--bgC)}thead{background:var(--bg3)}th{padding:12px 16px;text-align:left;font-weight:600;font-size:.8rem;text-transform:uppercase;color:var(--t2)}td{padding:10px 16px;border-top:1px solid var(--b);font-size:.9rem}tbody tr:hover{background:var(--bg3)}.badge{display:inline-flex;padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:600}.bg-s{background:rgba(46,204,113,.12);color:#27ae60}.bg-w{background:rgba(243,156,18,.12);color:#e67e22}.fg{margin-bottom:16px}.fl{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px}.fr{display:grid;grid-template-columns:1fr 1fr;gap:16px}.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}.nc{position:fixed;top:20px;right:20px;z-index:3000;display:flex;flex-direction:column;gap:12px;max-width:400px}.nt{background:var(--bgC);border-radius:8px;padding:16px 20px;box-shadow:0 10px 40px rgba(0,0,0,.1);display:flex;align-items:flex-start;gap:12px;border-left:4px solid var(--p);min-width:320px;animation:si .3s}.nt.success{border-left-color:var(--s)}.nt.error{border-left-color:var(--d)}.nt.warning{border-left-color:var(--w)}.ni{font-size:1.3rem}.spinner{width:40px;height:40px;border:4px solid var(--b);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}.cam-box{background:#000;border-radius:var(--r);overflow:hidden;position:relative;width:100%;max-width:640px;margin:0 auto}.cam-box video{width:100%;display:block}.cam-overlay{position:absolute;top:16px;left:16px;right:16px;display:flex;justify-content:space-between;z-index:10}.cam-badge{background:rgba(0,0,0,.7);color:#fff;padding:6px 14px;border-radius:20px;font-size:.8rem;font-weight:500}.cam-badge.active{background:rgba(46,204,113,.8)}.cam-badge.inactive{background:rgba(231,76,60,.8)}.rec-dot{width:12px;height:12px;border-radius:50%;background:var(--d);animation:pulse 1s infinite;display:inline-block;margin-right:6px}@keyframes si{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}@media(max-width:1024px){.mc{margin-left:72px}.sr{grid-template-columns:repeat(2,1fr)}}@media(max-width:768px){.mc{margin-left:0!important}.mmb{display:flex}.td,.un{display:none}.pc{padding:16px}.sb{transform:translateX(-100%);width:260px}.sb.mo{transform:translateX(0)}.sr{grid-template-columns:1fr}.fr,.fr3{grid-template-columns:1fr}.nc{left:16px;right:16px;max-width:none}.nt{min-width:auto}}
    </style>
</head>
<body class="lt">

<div id="lp" class="lc">
    <div class="lcd">
        <div class="llw"><img src="logo.png" alt="SEBS" onerror="this.innerHTML='🏫'"></div>
        <h1 class="lsn">Systematic English<br>Boarding School</h1>
        <p class="lst">Smart Attendance System</p>
        <p style="color:#e67e22;font-weight:600;margin-top:8px">⚠️ TESTING MODE</p>
        <div class="ld"><span>Secure Access</span></div>
        <button class="glb" onclick="login()">🔑 Sign in to Continue</button>
        <p class="lit">🔒 Authorized administrators only</p>
        <div class="lf"><p>&copy; 2026 Systematic English Boarding School</p></div>
    </div>
</div>

<div id="app" class="ac" style="display:none">
    <aside id="sb" class="sb">
        <div class="sh"><div class="slogo"><img src="logo.png" alt="SEBS" onerror="this.innerHTML='🏫'"></div><h2 class="sn">SEBS</h2><button class="st" onclick="tgsb()"><i class="fas fa-chevron-left"></i></button></div>
        <nav class="snv"><ul class="sm">
            <li class="si act" data-p="db"><a href="#" class="sl" onclick="nav('db')"><i class="fas fa-th-large"></i><span>Dashboard</span></a></li>
            <li class="si" data-p="att"><a href="#" class="sl" onclick="nav('att')"><i class="fas fa-camera"></i><span>Live Attendance</span></a></li>
            <li class="si" data-p="reg"><a href="#" class="sl" onclick="nav('reg')"><i class="fas fa-user-plus"></i><span>Registration</span></a></li>
            <li class="si" data-p="stu"><a href="#" class="sl" onclick="nav('stu')"><i class="fas fa-users"></i><span>Students</span></a></li>
            <li class="si" data-p="rep"><a href="#" class="sl" onclick="nav('rep')"><i class="fas fa-chart-bar"></i><span>Reports</span></a></li>
        </ul></nav>
        <div class="sf"><button class="slo" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button></div>
    </aside>
    <div class="so" id="so" onclick="cmsb()"></div>
    <main class="mc">
        <header class="tb">
            <div class="tbl"><button class="mmb" onclick="tmsb()"><i class="fas fa-bars"></i></button><span id="pt">Dashboard</span></div>
            <div class="tbr"><span class="td" id="td"></span><span class="tt" id="tt"></span><button class="ttb" onclick="tth()" id="tth"><i class="fas fa-moon"></i></button><div class="ua">A</div></div>
        </header>
        <div class="pc" id="pc"></div>
    </main>
</div>
<div class="nc" id="nc"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbxqvvfI1j8aOnKNKjnnSfaGPJw5ANiW6XEnLehaHxJ8YjjegbId8uvcMcHQSaxzHkjM/exec';
const MODELS='https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
let th='lt',stream=null,markedToday={},attendanceActive=false,modelsLoaded=false;
let lastHeadX=null,lastHeadY=null,headMoved=false,lastMarkTime=0;

function init(){updateTime();setInterval(updateTime,1000);if(localStorage.getItem('s-login')==='1'){showApp();nav('db');}if(localStorage.getItem('s-theme')==='dt'){th='dt';document.body.className='dt';document.getElementById('tth').innerHTML='<i class="fas fa-sun"></i>';}}
function updateTime(){const n=new Date();const d=document.getElementById('td'),t=document.getElementById('tt');if(d)d.textContent=n.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});if(t)t.textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function tth(){th=th==='lt'?'dt':'lt';document.body.className=th;document.getElementById('tth').innerHTML=th==='dt'?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';localStorage.setItem('s-theme',th);}
function login(){localStorage.setItem('s-login','1');showApp();nav('db');notify('Welcome! Testing Mode','success');}
function logout(){stopAttendance();localStorage.removeItem('s-login');document.getElementById('lp').style.display='flex';document.getElementById('app').style.display='none';}
function showApp(){document.getElementById('lp').style.display='none';document.getElementById('app').style.display='flex';}
function tgsb(){document.getElementById('sb').classList.toggle('collapsed');}
function tmsb(){document.getElementById('sb').classList.toggle('mo');document.getElementById('so').classList.toggle('act');}
function cmsb(){document.getElementById('sb').classList.remove('mo');document.getElementById('so').classList.remove('act');}
function notify(m,t){const icons={success:'fa-check-circle',error:'fa-exclamation-circle',warning:'fa-exclamation-triangle'};const n=document.createElement('div');n.className=`nt ${t}`;n.innerHTML=`<div class="ni"><i class="fas ${icons[t]}"></i></div><div style="flex:1"><strong>${t}</strong><p style="font-size:.8rem">${m}</p></div>`;document.getElementById('nc').appendChild(n);setTimeout(()=>{n.style.opacity='0';setTimeout(()=>n.remove(),300);},4000);}
async function api(action,data=null){try{if(data){const r=await fetch(API,{method:'POST',body:JSON.stringify({action,...data})});return await r.json();}else{const r=await fetch(API+'?action='+action);return await r.json();}}catch(e){return null;}}
function getTimeStatus(){const n=new Date();const ct=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');return{open:true,status:ct>='10:30'?'Late':'Present'};}

function nav(p){
    document.querySelectorAll('.si').forEach(e=>e.classList.remove('act'));
    const i=document.querySelector(`[data-p="${p}"]`);if(i)i.classList.add('act');
    const t={db:'Dashboard',att:'Live Attendance',reg:'Registration',stu:'Students',rep:'Reports'};
    document.getElementById('pt').textContent=t[p]||p;
    if(p!=='att')stopAttendance();
    const c=document.getElementById('pc');
    if(p==='db')loadDb(c);else if(p==='att')loadAtt(c);else if(p==='reg')loadReg(c);else if(p==='stu')loadStu(c);else if(p==='rep')loadRep(c);
    cmsb();
}

async function loadDb(c){
    c.innerHTML='<div class="spinner"></div>';
    const d=await api('getDashboard');
    if(!d){c.innerHTML='<p>Error</p>';return;}
    const t=d.totalStudents||0,p=d.present||0,l=d.late||0,a=d.absent||0,pct=d.percentage||0;
    c.innerHTML=`<div style="background:rgba(243,156,18,.1);border:1px solid var(--w);padding:8px 16px;border-radius:8px;margin-bottom:16px;text-align:center;color:var(--w);font-weight:600">⚠️ TESTING MODE - Auto Mark</div>
        <div class="sr"><div class="stc" onclick="nav('stu')"><div class="sci b"><i class="fas fa-users"></i></div><div class="sti"><h3>${t}</h3><p>Total</p></div></div>
        <div class="stc"><div class="sci g"><i class="fas fa-check-circle"></i></div><div class="sti"><h3>${p}</h3><p>Present</p></div></div>
        <div class="stc"><div class="sci o"><i class="fas fa-clock"></i></div><div class="sti"><h3>${l}</h3><p>Late</p></div></div>
        <div class="stc"><div class="sci r"><i class="fas fa-times-circle"></i></div><div class="sti"><h3>${a}</h3><p>Absent</p></div></div></div>`;
}

function loadReg(c){c.innerHTML=`<div class="card" style="max-width:700px;margin:0 auto"><h2>📝 Register Student</h2><form id="rf" onsubmit="return submitReg()"><div class="fr"><div class="fg"><label class="fl">Name *</label><input type="text" id="sn" required></div><div class="fg"><label class="fl">Admission No</label><input type="text" id="sa"></div></div><div class="fr3"><div class="fg"><label class="fl">Class *</label><select id="sc" required><option value="">Select</option><option>Nursery</option><option>LKG</option><option>UKG</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select></div><div class="fg"><label class="fl">Section</label><select id="ss"><option value="">Select</option><option>JUPITER</option><option>SATURN</option><option>URANUS</option><option>NEPTUNE</option></select></div><div class="fg"><label class="fl">Roll</label><input type="text" id="sr"></div></div><div class="fr"><div class="fg"><label class="fl">Gender</label><select id="sg"><option value="">Select</option><option>Male</option><option>Female</option></select></div><div class="fg"><label class="fl">DOB</label><input type="date" id="sd"></div></div><div class="fr"><div class="fg"><label class="fl">Father</label><input type="text" id="sf"></div><div class="fg"><label class="fl">Mother</label><input type="text" id="sm"></div></div><div class="fr"><div class="fg"><label class="fl">Phone</label><input type="text" id="sp"></div><div class="fg"><label class="fl">Address</label><textarea id="saddr"></textarea></div></div><button type="submit" class="btn btn-p btn-lg"><i class="fas fa-save"></i> Register</button></form></div>`;}
async function submitReg(){const btn=document.querySelector('#rf .btn');btn.disabled=true;btn.innerHTML='Saving...';const data={studentName:document.getElementById('sn').value,admissionNumber:document.getElementById('sa').value,class:document.getElementById('sc').value,section:document.getElementById('ss').value,rollNumber:document.getElementById('sr').value,gender:document.getElementById('sg').value,dateOfBirth:document.getElementById('sd').value,fatherName:document.getElementById('sf').value,motherName:document.getElementById('sm').value,guardianPhone:document.getElementById('sp').value,address:document.getElementById('saddr').value};const r=await api('registerStudent',data);btn.disabled=false;btn.innerHTML='<i class="fas fa-save"></i> Register';if(r&&r.success){notify('✅ Registered!','success');document.getElementById('rf').reset();}else notify('❌ Failed!','error');return false;}

function loadAtt(c){
    c.innerHTML=`<div style="display:grid;grid-template-columns:2fr 1fr;gap:24px"><div class="card"><h2>📷 Live Face Recognition</h2><div class="cam-box" style="margin-top:16px"><video id="cam" autoplay playsinline muted></video><div class="cam-overlay"><span class="cam-badge inactive" id="camStatus">Stopped</span><span class="cam-badge" id="timeBadge">Ready</span></div><canvas id="overlay" style="position:absolute;top:0;left:0;width:100%;height:100%"></canvas></div><div style="text-align:center;margin-top:16px"><button class="btn btn-p btn-lg" id="startBtn" onclick="startAttendance()"><i class="fas fa-play"></i> Start Attendance</button><button class="btn btn-d btn-lg" id="stopBtn" onclick="stopAttendance()" style="display:none"><i class="fas fa-stop"></i> Stop</button></div><div style="margin-top:12px;padding:16px;background:var(--bg3);border-radius:8px;text-align:center"><strong>Status:</strong> <span id="attStatus">🟢 Ready</span><p style="font-size:.8rem;color:var(--t2);margin-top:6px">⚠️ Testing: Auto-Mark | Blink + Head Move = Marked in 1-2 sec</p></div></div><div class="card"><h3>📋 Today</h3><div id="attList" style="max-height:400px;overflow-y:auto;margin-top:12px">Loading...</div></div></div>`;
    loadAttList();
}

async function startAttendance(){
    try{
        stream=await navigator.mediaDevices.getUserMedia({video:{width:320,height:240,facingMode:'user'}});
        document.getElementById('cam').srcObject=stream;
        document.getElementById('camStatus').textContent='Loading...';
        document.getElementById('startBtn').style.display='none';
        document.getElementById('stopBtn').style.display='inline-flex';
        
        if(!modelsLoaded){
            await Promise.all([faceapi.nets.tinyFaceDetector.loadFromUri(MODELS),faceapi.nets.faceLandmark68Net.loadFromUri(MODELS),faceapi.nets.faceRecognitionNet.loadFromUri(MODELS)]);
            modelsLoaded=true;
        }
        
        document.getElementById('camStatus').textContent='Active';
        document.getElementById('camStatus').className='cam-badge active';
        attendanceActive=true;
        detectFaces();
        notify('✅ Ready! Face detect + Auto mark','success');
    }catch(e){notify('❌ Camera error: '+e.message,'error');stopAttendance();}
}

function stopAttendance(){
    attendanceActive=false;
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
    document.getElementById('camStatus').textContent='Stopped';document.getElementById('camStatus').className='cam-badge inactive';
    document.getElementById('startBtn').style.display='inline-flex';document.getElementById('stopBtn').style.display='none';
}

async function detectFaces(){
    if(!attendanceActive)return;
    const video=document.getElementById('cam'),canvas=document.getElementById('overlay');
    if(!video||!canvas)return;
    try{
        const detections=await faceapi.detectAllFaces(video,new faceapi.TinyFaceDetectorOptions({inputSize:160,scoreThreshold:0.5})).withFaceLandmarks().withFaceDescriptors();
        const dSize={width:video.videoWidth,height:video.videoHeight};
        faceapi.matchDimensions(canvas,dSize);
        const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);
        const resized=faceapi.resizeResults(detections,dSize);
        
        for(let i=0;i<resized.length;i++){
            const det=resized[i],box=det.detection.box;
            ctx.strokeStyle='#2ecc71';ctx.lineWidth=2;ctx.strokeRect(box.x,box.y,box.width,box.height);
            ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(box.x,box.y-20,100,18);
            ctx.fillStyle='#fff';ctx.font='12px Inter';ctx.fillText('Face Detected',box.x+4,box.y-6);
            
            if(det.descriptor&&(Date.now()-lastMarkTime>3000)){
                const live=await checkLiveness(det);
                if(live){
                    lastMarkTime=Date.now();
                    const nm='S'+Date.now().toString(36).toUpperCase();
                    const r=await api('markAttendance',{studentName:nm,studentId:'F'+Date.now().toString(36),class:'',section:'',rollNumber:'',confidence:'0.95'});
                    if(r&&r.success){notify('✅ '+nm+' marked!','success');loadAttList();}
                }
            }
        }
    }catch(e){}
    if(attendanceActive)requestAnimationFrame(detectFaces);
}

async function checkLiveness(detection){
    if(!detection.landmarks)return false;
    const lEye=detection.landmarks.getLeftEye(),rEye=detection.landmarks.getRightEye();
    let blinked=false;
    if(lEye&&rEye){const l=eyeAR(lEye),r=eyeAR(rEye);blinked=((l+r)/2)<0.25;}
    const nose=detection.landmarks.getNose();
    if(nose&&nose.length>0){const nx=nose[3].x,ny=nose[3].y;if(lastHeadX!==null){if(Math.abs(nx-lastHeadX)>15||Math.abs(ny-lastHeadY)>15)headMoved=true;}lastHeadX=nx;lastHeadY=ny;}
    if(blinked&&headMoved){headMoved=false;lastHeadX=null;lastHeadY=null;return true;}
    return false;
}
function eyeAR(e){const a=Math.hypot(e[1].x-e[5].x,e[1].y-e[5].y),b=Math.hypot(e[2].x-e[4].x,e[2].y-e[4].y),c=Math.hypot(e[0].x-e[3].x,e[0].y-e[3].y);return(a+b)/(2*c);}

async function loadAttList(){
    const el=document.getElementById('attList');if(!el)return;
    const d=await api('getStudents');
    if(!d||!d.students){el.innerHTML='<p>No students</p>';return;}
    el.innerHTML=d.students.map(s=>`<div style="padding:4px 0;border-bottom:1px solid var(--b)"><strong>${s.StudentName}</strong> <span class="badge bg-s">${s.Status||'Active'}</span></div>`).join('');
}

async function loadStu(c){
    c.innerHTML='<div class="spinner"></div>';
    const d=await api('getStudents');
    if(!d||!d.students){c.innerHTML='<div class="card"><p>No students</p></div>';return;}
    let h='<div class="card"><h2>Students ('+d.students.length+')</h2><div class="tbc"><table><thead><tr><th>ID</th><th>Name</th><th>Class</th><th>Section</th><th>Roll</th><th>Gender</th><th>Phone</th><th>Address</th></tr></thead><tbody>';
    d.students.forEach(s=>{h+=`<tr><td><small>${s.StudentID||'-'}</small></td><td><strong>${s.StudentName||'-'}</strong></td><td>${s.Class||'-'}</td><td>${s.Section||'-'}</td><td>${s.RollNumber||'-'}</td><td>${s.Gender||'-'}</td><td>${s.GuardianPhone||'-'}</td><td>${(s.Address||'-').substring(0,20)}</td></tr>`;});
    h+='</tbody></table></div></div>';c.innerHTML=h;
}

function loadRep(c){c.innerHTML=`<div class="card"><h2>Reports</h2><button class="btn btn-p" onclick="loadRepData()">Load</button></div><div id="rv" style="margin-top:16px"></div>`;}
async function loadRepData(){const v=document.getElementById('rv');v.innerHTML='<div class="spinner"></div>';const d=await api('getStudents');if(!d){v.innerHTML='<p>Error</p>';return;}v.innerHTML='<table><thead><tr><th>Name</th><th>Class</th><th>Section</th></tr></thead><tbody>'+d.students.map(s=>`<tr><td>${s.StudentName}</td><td>${s.Class}</td><td>${s.Section}</td></tr>`).join('')+'</tbody></table>';}

document.addEventListener('DOMContentLoaded',init);
</script>
