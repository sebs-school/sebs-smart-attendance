<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEBS Smart Attendance</title>
<link rel="icon" href="logo.png">
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--p:#1a3a6b;--p2:#2a5298;--s:#00c853;--w:#ff9800;--d:#e74c3c;--blue:#2196f3;--bg:#f0f4fb;--card:#fff;--border:#e2eaf6;--text:#1a1a2e;--sub:#64748b;--sb-bg:linear-gradient(180deg,#07111f,#0f2044,#1a3a6b);--r:18px;--rs:12px;--sh:0 2px 16px rgba(26,58,107,.07)}
body.dark{--bg:#0d1b2a;--card:#111e30;--border:#1e3050;--text:#e8f0fe;--sub:#8ba4c8}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}a{text-decoration:none;color:inherit}ul{list-style:none}button{cursor:pointer;border:none;outline:none;font-family:inherit}input,select,textarea{font-family:inherit;font-size:.88rem;border:2px solid var(--border);border-radius:var(--rs);padding:11px 15px;background:var(--card);color:var(--text);width:100%}textarea{resize:vertical;min-height:52px}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}@keyframes scaleIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.ac{display:flex;min-height:100vh}.mc{flex:1;margin-left:260px;display:flex;flex-direction:column}.pc{flex:1;padding:28px 32px;overflow-y:auto}
.sb{width:260px;height:100vh;background:var(--sb-bg);position:fixed;left:0;top:0;z-index:1000;display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(0,0,0,.18)}.sh{padding:22px 20px;display:flex;align-items:center;gap:13px;border-bottom:1px solid rgba(255,255,255,.07)}.slogo{width:44px;height:44px;border-radius:13px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,.25)}.slogo img{width:34px;height:34px;object-fit:contain}.sn{font-weight:800;font-size:1.08rem;color:#fff;line-height:1.2}.sn small{font-size:.62rem;font-weight:400;color:rgba(255,255,255,.45);display:block}.snv{flex:1;overflow-y:auto;padding:14px 10px}.sm{display:flex;flex-direction:column;gap:3px}.sg{margin-bottom:6px}.sg-label{font-size:.6rem;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,.28);padding:8px 16px 4px;text-transform:uppercase}.si{border-radius:11px}.si:hover .sl{background:rgba(255,255,255,.07);color:#c8daf4}.si.act .sl{background:rgba(255,255,255,.14);color:#fff}.sl{display:flex;align-items:center;gap:12px;padding:11px 17px;color:rgba(255,255,255,.55);font-size:.83rem;font-weight:500;border-radius:11px}.sl i{font-size:1rem;width:20px;text-align:center;color:rgba(255,255,255,.35)}.sf{padding:14px 10px;border-top:1px solid rgba(255,255,255,.07);margin-top:auto}.slo{width:100%;display:flex;align-items:center;gap:12px;padding:11px 17px;background:rgba(231,76,60,.08);color:#f4877a;font-size:.83rem;font-weight:500;border-radius:11px}.so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;backdrop-filter:blur(2px)}.so.act{display:block}
.tb{height:68px;background:rgba(255,255,255,.95);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:900;backdrop-filter:blur(12px)}#pt{font-size:1.15rem;font-weight:800}.td{font-size:.72rem;color:var(--sub)}.tt{font-size:.8rem;font-weight:700;color:var(--p);font-family:monospace;background:rgba(26,58,107,.07);padding:5px 10px;border-radius:8px}.ttb{background:var(--border);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:.9rem}.ttb:hover{background:var(--p);color:#fff}
.lc{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#04091a,#0a1628,#1a3a6b)}.lcd{width:100%;max-width:430px;background:rgba(255,255,255,.98);border-radius:28px;padding:52px 42px 44px;box-shadow:0 40px 100px rgba(0,0,0,.35);animation:scaleIn .4s;text-align:center}.llw{width:84px;height:84px;margin:0 auto 20px;border-radius:20px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 8px 28px rgba(26,58,107,.18)}.llw img{width:66px;height:66px;object-fit:contain}.lsn{font-size:1.5rem;font-weight:900;color:#1a1a2e;line-height:1.25}.lst{font-size:.7rem;color:#64748b;text-transform:uppercase;letter-spacing:2.5px;margin-bottom:30px}.ldiv{display:flex;align-items:center;gap:14px;margin-bottom:28px}.ldiv::before,.ldiv::after{content:'';flex:1;height:1px;background:#e2e8f0}.ldiv span{color:#94a3b8;font-size:.7rem;font-weight:600}.lbtn{display:block;width:100%;padding:16px 24px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border-radius:14px;font-size:.92rem;font-weight:700;cursor:pointer;border:none;text-align:center;box-shadow:0 6px 24px rgba(26,58,107,.3);font-family:'Inter',sans-serif;transition:.2s}.lbtn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(26,58,107,.4)}.login-info{margin-top:20px;text-align:center;font-size:.72rem;color:#94a3b8}
.card{background:var(--card);border-radius:var(--r);padding:24px 28px;box-shadow:var(--sh);border:1px solid var(--border);margin-bottom:20px}.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}.stc{background:var(--card);border-radius:var(--r);padding:22px 24px;box-shadow:var(--sh);border:1px solid var(--border);display:flex;align-items:center;gap:18px;cursor:pointer;transition:.2s}.stc:hover{transform:translateY(-3px)}.sci{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:1.4rem}.sci.b{background:rgba(26,58,107,.08);color:var(--p)}.sci.g{background:rgba(0,200,83,.1);color:var(--s)}.sci.o{background:rgba(255,152,0,.1);color:var(--w)}.sci.r{background:rgba(231,76,60,.1);color:var(--d)}.sti h3{font-size:1.8rem;font-weight:900;line-height:1}.sti p{font-size:.68rem;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 20px;border-radius:11px;font-weight:600;font-size:.84rem;cursor:pointer;border:none;transition:.15s}.btn-p{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff}.btn-s{background:linear-gradient(135deg,#00c853,#00e676);color:#fff}.btn-d{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}.btn-o{background:linear-gradient(135deg,#ff9800,#f57c00);color:#fff}.btn-ghost{background:var(--border);color:var(--text)}.btn-lg{padding:14px 28px;font-size:.92rem;border-radius:14px}.btn-block{width:100%;justify-content:center}
.tbc{overflow-x:auto;border-radius:14px;border:1px solid var(--border)}table{width:100%;border-collapse:collapse}thead{background:rgba(26,58,107,.04)}th{padding:13px 18px;text-align:left;font-weight:700;font-size:.68rem;text-transform:uppercase;color:var(--sub)}td{padding:12px 18px;border-top:1px solid var(--border);font-size:.82rem}tbody tr:hover{background:rgba(26,58,107,.025)}
.fg{margin-bottom:14px}.fl{display:block;font-size:.7rem;font-weight:700;margin-bottom:6px;text-transform:uppercase;color:var(--sub)}.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}.st{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--p);margin:20px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--p);display:inline-block}
.cw{max-width:720px;margin:0 auto}.cam-box{position:relative;background:#000;border-radius:22px;overflow:hidden;width:100%;aspect-ratio:4/3;box-shadow:0 20px 60px rgba(0,0,0,.35)}.cam-box video{width:100%;height:100%;object-fit:cover;display:block}.cam-box canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}.cam-hud{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;z-index:5;gap:8px}.hud-badge{background:rgba(7,17,31,.72);backdrop-filter:blur(8px);color:#fff;padding:8px 14px;border-radius:22px;font-size:.72rem;display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.08)}.hud-dot{width:9px;height:9px;border-radius:50%}.hud-dot.on{background:#00e676;animation:pulse .9s infinite}.hud-dot.off{background:#e74c3c}.cam-footer{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px}.cam-status{text-align:center;margin-top:10px;font-size:.8rem;color:var(--sub)}.time-badge{background:rgba(0,0,0,.5);color:#fff;padding:6px 14px;border-radius:16px;font-size:.7rem;font-weight:600;display:inline-flex;align-items:center;gap:6px}.marked-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.marked-chip{display:flex;align-items:center;gap:6px;background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.2);color:#00a544;padding:5px 12px;border-radius:20px;font-size:.72rem;font-weight:600;animation:slideIn .25s}
.ltip{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(7,17,31,.82);backdrop-filter:blur(8px);color:#fff;padding:10px 20px;border-radius:20px;font-size:.75rem;text-align:center;white-space:nowrap;z-index:10;border:1px solid rgba(255,255,255,.1)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2500;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}.modal{background:var(--card);border-radius:22px;padding:30px 34px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;animation:scaleIn .25s;box-shadow:0 30px 80px rgba(0,0,0,.3);border:1px solid var(--border)}.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}.modal-title{font-size:1.1rem;font-weight:800}.modal-close{width:32px;height:32px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;color:var(--sub)}.modal-close:hover{background:var(--d);color:#fff}
.nc{position:fixed;top:18px;right:18px;z-index:3000;display:flex;flex-direction:column;gap:8px;pointer-events:none}.nt{background:var(--card);border-radius:12px;padding:14px 18px;box-shadow:0 12px 40px rgba(0,0,0,.15);display:flex;align-items:flex-start;gap:10px;border-left:4px solid var(--p);min-width:260px;max-width:340px;animation:slideIn .25s;font-size:.82rem;pointer-events:auto;border:1px solid var(--border);border-left-width:4px}.nt.success{border-left-color:var(--s)}.nt.error{border-left-color:var(--d)}.nt.warning{border-left-color:var(--w)}.nt-icon{font-size:1.1rem;flex-shrink:0}.nt-body{flex:1}.nt-msg{color:var(--sub);font-size:.78rem}
.db-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}.rate-ring{display:flex;align-items:center;justify-content:center;flex-direction:column;padding:32px}.rate-num{font-size:4rem;font-weight:900;line-height:1;background:linear-gradient(135deg,var(--p),var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.rate-label{font-size:.72rem;color:var(--sub);text-transform:uppercase;margin-top:6px}
@media(max-width:1100px){.sr{grid-template-columns:repeat(2,1fr)}.db-grid{grid-template-columns:1fr}}@media(max-width:860px){.mc{margin-left:0}.sb{transform:translateX(-100%)}.sb.mo{transform:translateX(0)}.sr{grid-template-columns:repeat(2,1fr)}.db-grid{grid-template-columns:1fr}}@media(max-width:600px){.sr{grid-template-columns:1fr}.fr{grid-template-columns:1fr}.pc{padding:14px}.tb{padding:0 14px}.cam-box{aspect-ratio:4/3;max-height:320px}.modal{padding:20px 16px}#pt{max-width:140px}.stc{padding:16px 18px}.sti h3{font-size:1.5rem}}
</style>
</head>
<body>

<div id="lp" class="lc"><div class="lcd"><div class="llw"><img src="logo.png" alt="SEBS" onerror="this.outerHTML='🏫'"></div><h1 class="lsn">Systematic English<br>Boarding School</h1><p class="lst">Smart Attendance</p><div class="ldiv"><span>सुरक्षित पहुँच / Secure Access</span></div><button class="lbtn" onclick="doLogin()">🔑 Sign in</button><p class="login-info">5:30-10:30 Present | 10:30-12 Late | Final v4.0</p></div></div>

<div id="app" class="ac" style="display:none">
  <aside id="sb" class="sb"><div class="sh"><div class="slogo"><img src="logo.png" alt="SEBS" onerror="this.outerHTML='🏫'"></div><div><h2 class="sn">SEBS<small>Smart Attendance</small></h2></div></div><nav class="snv"><ul class="sm">
    <li class="si act" data-p="db"><a href="#" class="sl" onclick="nav('db');return false"><i class="fas fa-th-large"></i><span>ड्यासबोर्ड / Dashboard</span></a></li>
    <li class="si" data-p="att"><a href="#" class="sl" onclick="nav('att');return false"><i class="fas fa-camera"></i><span>लाइभ हाजिरी / Live</span></a></li>
    <li class="si" data-p="reg"><a href="#" class="sl" onclick="nav('reg');return false"><i class="fas fa-user-plus"></i><span>दर्ता / Register</span></a></li>
    <li class="si" data-p="stu"><a href="#" class="sl" onclick="nav('stu');return false"><i class="fas fa-users"></i><span>विद्यार्थी / Students</span></a></li>
    <li class="si" data-p="rep"><a href="#" class="sl" onclick="nav('rep');return false"><i class="fas fa-chart-bar"></i><span>रिपोर्ट / Reports</span></a></li>
  </ul></nav><div class="sf"><button class="slo" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>बाहिरिनुहोस् / Logout</span></button></div></aside>
  <div class="so" id="so" onclick="cmsb()"></div>
  <main class="mc"><header class="tb"><span id="pt">ड्यासबोर्ड</span><div style="display:flex;gap:16px"><span class="td" id="td"></span><span class="tt" id="tt"></span><button class="ttb" onclick="tth()" id="tthBtn"><i class="fas fa-moon"></i></button></div></header><div class="pc" id="pc"></div></main>
</div>
<div class="nc" id="nc"></div>
<div id="modalContainer"></div>

<script>
const A='https://script.google.com/macros/s/AKfycbxqvvfI1j8aOnKNKjnnSfaGPJw5ANiW6XEnLehaHxJ8YjjegbId8uvcMcHQSaxzHkjM/exec';
const M='https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
let dm=false,stm=null,aa=false,ml=false,mg=false;
let fm=null,mtd={},cd={},pd=null;
let lm=0,sc=true,ps=false;
let as=[],dd=null;
let ls={pe:1,bf:0,ln:null,hf:0};
let ri=null;

function ts(){const n=new Date();const h=n.getHours(),m=n.getMinutes(),ct=h*60+m;if(ct<330)return{o:false,s:'बन्द / Closed',r:'५:३० पछि खुल्छ'};if(ct<630)return{o:true,s:'Present / उपस्थित',r:'उपस्थित'};if(ct<=720)return{o:true,s:'Late / ढिलो',r:'ढिलो'};return{o:false,s:'बन्द / Closed',r:'१२ बजेपछि बन्द'};}
function init(){ut();setInterval(ut,1000);if(localStorage.getItem('sl')==='1'){sa();nav('db');}if(localStorage.getItem('sth')==='dark'){ad(true);}}
function ut(){const n=new Date();const d=document.getElementById('td'),t=document.getElementById('tt');if(d)d.textContent=n.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});if(t)t.textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function ad(on){dm=on;document.body.classList.toggle('dark',on);const b=document.getElementById('tthBtn');if(b)b.innerHTML=on?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';localStorage.setItem('sth',on?'dark':'light');}
function tth(){ad(!dm);}
function doLogin(){localStorage.setItem('sl','1');document.getElementById('lp').style.display='none';document.getElementById('app').style.display='flex';nav('db');nf('✅ स्वागत! / Welcome!','success');}
function logout(){stp();localStorage.removeItem('sl');document.getElementById('lp').style.display='flex';document.getElementById('app').style.display='none';}
function sa(){document.getElementById('lp').style.display='none';document.getElementById('app').style.display='flex';}
function tmsb(){document.getElementById('sb').classList.toggle('mo');document.getElementById('so').classList.toggle('act');}
function cmsb(){document.getElementById('sb').classList.remove('mo');document.getElementById('so').classList.remove('act');}
function nf(m,tp='info'){const nc=document.getElementById('nc');const ic={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};const n=document.createElement('div');n.className=`nt ${tp}`;n.innerHTML=`<span class="nt-icon">${ic[tp]||'ℹ️'}</span><div class="nt-body"><div class="nt-msg">${m}</div></div>`;nc.appendChild(n);setTimeout(()=>{n.style.opacity='0';n.style.transform='translateX(40px)';n.style.transition='all .3s';setTimeout(()=>n.remove(),300);},5000);}
async function api(ac,dt=null){try{if(dt){const r=await fetch(A,{method:'POST',body:JSON.stringify({action:ac,...dt})});return await r.json();}else{const r=await fetch(`${A}?action=${ac}`);return await r.json();}}catch(e){return null;}}
function sm(html){document.getElementById('modalContainer').innerHTML=`<div class="mo" onclick="if(event.target===this)cm()"><div class="modal" onclick="event.stopPropagation()">${html}</div></div>`;}
function cm(){document.getElementById('modalContainer').innerHTML='';}

function nav(p){
  document.querySelectorAll('.si').forEach(e=>e.classList.remove('act'));
  const it=document.querySelector(`[data-p="${p}"]`);if(it)it.classList.add('act');
  document.getElementById('pt').textContent={db:'ड्यासबोर्ड',att:'लाइभ हाजिरी',reg:'दर्ता',stu:'विद्यार्थी',rep:'रिपोर्ट'}[p]||p;
  if(p!=='att')stp();if(p==='att')plm();
  const c=document.getElementById('pc');
  if(p==='db')ldb(c);else if(p==='att')lat(c);else if(p==='reg')lrg(c);else if(p==='stu')lstu(c);else if(p==='rep')lrp(c);cmsb();
}

// ═══════════ FACE CACHE - CLEAN ═══════════
async function le(){
  localStorage.removeItem('sebs-faces'); // ALWAYS start fresh
  const d=await api('getAllEmbeddings');
  if(!d||!d.embeddings||!d.embeddings.length){fm=null;return;}
  localStorage.setItem('sebs-faces',JSON.stringify(d.embeddings));
  const lb=[];for(const e of d.embeddings){if(e.embedding&&Array.isArray(e.embedding))lb.push(new faceapi.LabeledFaceDescriptors(e.studentId,[new Float32Array(e.embedding)]));}
  fm=lb.length>0?new faceapi.FaceMatcher(lb,0.40):null;
  console.log('Loaded',lb.length,'faces. Threshold: 0.40');
}

async function plm(){if(ml||mg)return;mg=true;nf('⏳ लोड... / Loading...');try{await Promise.all([faceapi.nets.ssdMobilenetv1.loadFromUri(M),faceapi.nets.faceLandmark68Net.loadFromUri(M),faceapi.nets.faceRecognitionNet.loadFromUri(M)]);ml=true;mg=false;await le();nf('✅ तयार! / Ready!','success');}catch(e){mg=false;nf('❌ असफल / Failed','error');}}
async function las(){const d=await api('getStudents');if(d&&d.students)as=d.students;return as;}

async function ldb(c){c.innerHTML='<div style="text-align:center;padding:40px"><div style="width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:spin .5s linear infinite;margin:0 auto"></div></div>';let d=null;try{d=await api('getDashboard');}catch(e){}if(!d){c.innerHTML='<div class="card" style="text-align:center;padding:48px"><h3>एपीआई असफल</h3><button class="btn btn-p" onclick="ldb(document.getElementById(\'pc\'))">पुन: प्रयास</button></div>';return;}const pct=typeof d.percentage==='number'?d.percentage:0;c.innerHTML=`<div class="sr"><div class="stc"><div class="sci b"><i class="fas fa-users"></i></div><div class="sti"><h3>${d.totalStudents||0}</h3><p>कुल / Total</p></div></div><div class="stc"><div class="sci g"><i class="fas fa-check-circle"></i></div><div class="sti"><h3>${d.present||0}</h3><p>उपस्थित / Present</p></div></div><div class="stc"><div class="sci o"><i class="fas fa-clock"></i></div><div class="sti"><h3>${d.late||0}</h3><p>ढिलो / Late</p></div></div><div class="stc"><div class="sci r"><i class="fas fa-times-circle"></i></div><div class="sti"><h3>${d.absent||0}</h3><p>अनुपस्थित / Absent</p></div></div></div><div class="db-grid"><div class="card" style="text-align:center"><div class="rate-ring"><div class="rate-num">${pct}%</div><div class="rate-label">हाजिरी दर</div></div></div><div class="card"><h3>⚡ द्रुत</h3><button class="btn btn-p btn-lg btn-block" onclick="nav(\'att\')"><i class="fas fa-camera"></i> हाजिरी</button><button class="btn btn-s btn-lg btn-block" onclick="nav(\'reg\')"><i class="fas fa-user-plus"></i> दर्ता</button><button class="btn btn-o btn-lg btn-block" onclick="nav(\'rep\')"><i class="fas fa-print"></i> रिपोर्ट</button></div></div>`;}

function lat(c){const t=ts();c.innerHTML=`<div class="cw"><div style="text-align:center;margin-bottom:12px"><span class="time-badge" style="background:${t.o?(t.s.includes('Late')?'rgba(255,152,0,.7)':'rgba(0,200,83,.7)'):'rgba(231,76,60,.7)'}">${t.o?'🟢':'🔴'} ${t.s} | ${t.r}</span></div><div class="cam-box"><video id="cam" autoplay playsinline muted></video><canvas id="overlay"></canvas><div class="cam-hud"><span class="hud-badge"><span class="hud-dot off" id="hudDot"></span><span id="hudText">बन्द</span></span><span class="hud-badge" id="matchBadge" style="display:none"><span id="matchText"></span></span></div><div class="ltip" id="livenessTip" style="display:none">👀 झिम्काउनुहोस् वा टाउको हल्लाउनुहोस्</div></div><div class="cam-footer"><button class="btn btn-p btn-lg" id="startBtn" onclick="sta()"><i class="fas fa-play"></i> सुरु</button><button class="btn btn-d btn-lg" id="stopBtn" onclick="stp()" style="display:none"><i class="fas fa-stop"></i> रोक</button><button class="btn btn-ghost btn-lg" onclick="rf()"><i class="fas fa-sync-alt"></i> रिलोड</button></div><div class="cam-status" id="camStatus">"सुरु" थिच्नुहोस्</div><div class="card" style="margin-top:18px"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-weight:700">✅ आज</span><span id="markedCount">0</span></div><div class="marked-strip" id="markedStrip"><span style="font-size:.78rem;color:var(--sub)">कोही छैन</span></div></div></div>`;}
async function sta(){if(!ml){nf('⏳ लोड...','warning');await plm();if(!ml)return;}try{const cl=[{video:{width:{ideal:640},height:{ideal:480}}},{video:{width:640,height:480}},{video:{width:320,height:240}},{video:true}];let gs=false;for(const c of cl){try{stm=await navigator.mediaDevices.getUserMedia(c);if(stm&&stm.active){gs=true;break;}}catch(err){}}if(!gs)throw new Error('No camera');const v=document.getElementById('cam');v.srcObject=stm;await new Promise((rv,rj)=>{v.onloadedmetadata=()=>{v.play().then(rv).catch(rj);};setTimeout(()=>rj(new Error('Timeout')),5000);});document.getElementById('startBtn').style.display='none';document.getElementById('stopBtn').style.display='inline-flex';document.getElementById('hudDot').className='hud-dot on';document.getElementById('hudText').textContent='स्क्यान';aa=true;sc=true;rl();const t=ts();ss(t.o?'👁️ स्क्यान... ('+t.s+')':'🔴 '+t.r);nf('✅ क्यामेरा तयार!','success');dl();}catch(e){nf('❌ क्यामेरा त्रुटि','error');}}
function stp(){aa=false;sc=false;if(ri){cancelAnimationFrame(ri);ri=null;}if(stm){stm.getTracks().forEach(t=>t.stop());stm=null;}const el=id=>document.getElementById(id);if(el('hudDot'))el('hudDot').className='hud-dot off';if(el('hudText'))el('hudText').textContent='बन्द';if(el('startBtn'))el('startBtn').style.display='inline-flex';if(el('stopBtn'))el('stopBtn').style.display='none';if(el('livenessTip'))el('livenessTip').style.display='none';ss('रोकियो');}
async function rf(){nf('🔄 रिलोड...');await le();nf('✅ ताजा!','success');}
function ss(msg){const el=document.getElementById('camStatus');if(el)el.textContent=msg;}
function id(s){return document.getElementById(s);}
function rl(){ls={pe:1,bf:0,ln:null,hf:0};}
function ear(lm,t,b,lt,rt){const p=lm.positions;const tp=p[t],bp=p[b],lp=p[lt],rp=p[rt];const v=Math.hypot(tp.x-bp.x,tp.y-bp.y),h=Math.hypot(lp.x-rp.x,lp.y-rp.y);return h<0.5?1:v/h;}
function chk(dt){if(!dt.landmarks)return false;const p=dt.landmarks.positions;const le=ear(dt.landmarks,37,41,36,39),re=ear(dt.landmarks,43,47,42,45),e=(le+re)/2;if(e<0.20&&ls.pe>0.24){ls.bf++;if(ls.bf>=1){ls.pe=e;ss('👁️ झिम्काइ!');return true;}}if(e>0.26)ls.bf=0;ls.pe=e;const nn={x:p[30].x,y:p[30].y};if(ls.ln){const dx=Math.abs(nn.x-ls.ln.x),dy=Math.abs(nn.y-ls.ln.y);if(dx>8||dy>8)ls.hf++;else ls.hf=Math.max(0,ls.hf-1);if(ls.hf>=5){ls.hf=0;ss('🤙 हल्लाइ!');return true;}}ls.ln=nn;return false;}

async function dl(){
  if(!aa)return;
  const v=document.getElementById('cam'),c=document.getElementById('overlay');if(!v||!c||v.readyState<2){ri=requestAnimationFrame(dl);return;}
  try{const opts=new faceapi.SsdMobilenetv1Options({minConfidence:0.30});const faces=await faceapi.detectAllFaces(v,opts).withFaceLandmarks().withFaceDescriptors();c.width=v.videoWidth;c.height=v.videoHeight;const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);const rs=faceapi.resizeResults(faces,{width:v.videoWidth,height:v.videoHeight});
    if(rs.length===0){id('matchBadge').style.display='none';if(id('livenessTip'))id('livenessTip').style.display='none';ss('👀 खोज्दै...');}
    for(const det of rs){
      if(det.detection.box.width<35||det.detection.box.height<35)continue;
      const box=det.detection.box,cx=box.x+box.width/2,cy=box.y+box.height/2,rad=Math.max(box.width,box.height)/1.4;
      let ik=false,mlb='',md=1;
      // ONLY match if distance < 0.40 (very strict)
      if(fm&&det.descriptor){const bm=fm.findBestMatch(det.descriptor);ik=bm.label!=='unknown'&&bm.distance<0.40;mlb=bm.label;md=bm.distance;}
      const rc=ik?'#00c853':'#2196f3';
      ctx.save();ctx.shadowColor=rc;ctx.shadowBlur=20;ctx.strokeStyle=rc;ctx.lineWidth=3.5;ctx.beginPath();ctx.arc(cx,cy,rad,0,2*Math.PI);ctx.stroke();ctx.restore();
      const lt=ik?`✅ चिनियो: ${mlb.substring(0,14)}`:'🆕 नयाँ / New';
      ctx.font='bold 13px Inter';const tw=ctx.measureText(lt).width,lx=cx-tw/2-10,ly=cy+rad+12;
      ctx.fillStyle='rgba(0,0,0,.78)';rr(ctx,lx,ly,tw+20,24,6);ctx.fill();ctx.fillStyle='#fff';ctx.fillText(lt,cx-tw/2,ly+16);
      id('matchBadge').style.display='flex';id('matchText').textContent=ik?`✅ चिनियो / ${mlb}`:'🆕 नयाँ / New';
      
      if(sc&&!ps&&Date.now()-lm>2000){
        const tip=id('livenessTip');if(tip)tip.style.display='block';
        const lv=chk(det);
        if(lv){lm=Date.now();sc=false;if(tip)tip.style.display='none';ps=true;
          const tk=new Date().toDateString(),dk=`${mlb}_${tk}`;
          if(ik && !mtd[dk]){
            const t=ts();
            if(!t.o){nf('⛔ '+t.r,'warning');rsm(2000);}
            else{await mk(mlb,md,t.s);}
          }else if(ik && mtd[dk]){
            sap(mlb);
          }else{
            pd=det.descriptor?Array.from(det.descriptor):null;
            srm();
          }
          break;
        }
      }
    }
  }catch(e){}if(aa)ri=requestAnimationFrame(dl);
}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
async function mk(sid,dist,sts){const nw=Date.now(),tk=new Date().toDateString(),dk=`${sid}_${tk}`;if(cd[sid]&&nw-cd[sid]<30000){rsm(1500);return;}if(mtd[dk]){rsm(1500);return;}cd[sid]=nw;ss(`⏳ ${sid} हाजिर गर्दै...`);const r=await api('markAttendance',{studentId:sid,studentName:sid,confidence:(1-dist).toFixed(3),status:sts});if(r&&r.success){mtd[dk]=true;const dn=r.studentName||sid;ssp(dn,sts);ats(dn);}else{nf('❌ असफल','error');rsm(1500);}}
function rsm(d=1800){setTimeout(()=>{sc=true;ps=false;rl();if(aa)dl();},d);}
function ssp(name,sts){const ov=document.createElement('div');ov.className='mo';ov.style.zIndex='2000';ov.innerHTML=`<div class="modal" style="text-align:center;max-width:340px;padding:32px 28px"><h1 style="font-size:3rem">✅</h1><h3 style="color:#00c853">${sts}</h3><p style="font-weight:700;font-size:1.1rem">${name}</p><p style="color:var(--sub);margin-top:4px">हाजिर भयो! / Marked!</p><p style="font-size:.7rem;color:var(--sub);margin-top:12px">५ सेकेण्ड</p></div>`;document.body.appendChild(ov);setTimeout(()=>{ov.style.opacity='0';ov.style.transition='opacity .3s';setTimeout(()=>{ov.remove();rsm(0);},300);},5000);}
function sap(name){const ov=document.createElement('div');ov.className='mo';ov.style.zIndex='2000';ov.innerHTML=`<div class="modal" style="text-align:center;max-width:340px;padding:32px 28px"><h1 style="font-size:3rem">⚠️</h1><h3 style="color:#ff9800">पहिल्यै हाजिर</h3><p style="font-weight:700;font-size:1.1rem">${name}</p><p style="color:var(--sub);margin-top:4px">आज हाजिर भइसकेको छ!</p><p style="font-size:.7rem;color:var(--sub);margin-top:12px">५ सेकेण्ड</p></div>`;document.body.appendChild(ov);setTimeout(()=>{ov.style.opacity='0';ov.style.transition='opacity .3s';setTimeout(()=>{ov.remove();rsm(0);},300);},5000);}

async function qrg(){const nm=document.getElementById('qn').value.trim(),cl=document.getElementById('qc').value,gn=document.getElementById('qg').value;if(!nm||!cl||!gn){nf('सबै भर्नुहोस्','warning');return;}const bt=document.querySelector('#modalContainer .btn-p');bt.disabled=true;bt.innerHTML='<i class="fas fa-spinner fa-spin"></i>';const dt={studentName:nm,admissionNumber:document.getElementById('qa').value,dateOfBirth:'',class:cl,section:document.getElementById('qs').value,rollNumber:document.getElementById('qr').value,gender:gn,fatherName:document.getElementById('qf').value,motherName:'',guardianPhone:document.getElementById('qp').value,address:document.getElementById('qad').value};if(pd)dt.embedding=Array.from(pd);const r=await api('registerStudent',dt);if(r&&r.success){const t=ts();const st=t.o?t.s:'Present / उपस्थित';await api('markAttendance',{studentId:r.studentId,studentName:nm,class:cl,section:document.getElementById('qs').value,rollNumber:document.getElementById('qr').value,confidence:'0.99',status:'Present'});cm();ssp(nm,st);ats(nm);await le();as=[];pd=null;}else{nf('❌ असफल','error');bt.disabled=false;bt.innerHTML='<i class="fas fa-save"></i> दर्ता';}}
