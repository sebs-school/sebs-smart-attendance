<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEBS Smart Attendance | Systematic English Boarding School</title>
    <link rel="icon" href="logo.png">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root{--p:#1a3a6b;--pl:#2a5298;--s:#00c853;--w:#ff9800;--d:#e74c3c;--blue:#2196f3}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(175deg,#e3ecfa,#f0f4fa,#f8f9fc);color:#1a1a2e;min-height:100vh}
        a{text-decoration:none;color:inherit}ul{list-style:none}
        button{cursor:pointer;border:none;outline:none;font-family:inherit;font-size:inherit}
        input,select,textarea{font-family:inherit;font-size:.9rem;border:2px solid #dde4f0;border-radius:12px;padding:12px 16px;background:#fff;color:#1a1a2e;width:100%;transition:all .2s}
        input:focus,select:focus,textarea:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(26,58,107,.06);outline:none}textarea{resize:vertical;min-height:55px}
        .ac{display:flex;min-height:100vh}.mc{flex:1;margin-left:250px;min-height:100vh;display:flex;flex-direction:column}
        .sb{width:250px;height:100vh;background:linear-gradient(180deg,#0a1628,#112240,#1a3a6b);position:fixed;left:0;top:0;z-index:1000;display:flex;flex-direction:column;box-shadow:4px 0 30px rgba(0,0,0,.15)}
        .sh{padding:22px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06)}
        .slogo{width:40px;height:40px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}.slogo img{width:32px;height:32px;object-fit:contain}
        .sn{font-weight:700;font-size:1rem;color:#fff}.snv{flex:1;overflow-y:auto;padding:16px 10px}.sm{display:flex;flex-direction:column;gap:3px}
        .si{border-radius:10px;transition:.15s}.si:hover{background:rgba(255,255,255,.05)}.si.act{background:rgba(255,255,255,.12)}
        .sl{display:flex;align-items:center;gap:12px;padding:11px 16px;color:#b8c9e0;font-size:.85rem;font-weight:500;border-radius:10px}.sl i{font-size:1.1rem;width:22px;text-align:center}
        .sf{padding:14px 10px;border-top:1px solid rgba(255,255,255,.06)}
        .slo{width:100%;display:flex;align-items:center;gap:12px;padding:11px 16px;background:rgba(231,76,60,.06);color:#f4877a;font-size:.85rem;font-weight:500;border-radius:10px}.slo:hover{background:rgba(231,76,60,.12)}
        .so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;backdrop-filter:blur(3px)}.so.act{display:block}
        .tb{height:70px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:900}
        #pt{font-size:1.2rem;font-weight:700}.td{font-size:.78rem;color:#64748b}.tt{font-size:.82rem;font-weight:700;color:var(--p);font-family:monospace;background:#edf2f9;padding:4px 12px;border-radius:8px}
        .ttb{background:#edf2f9;color:#1a1a2e;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.05rem;cursor:pointer;transition:.2s}.ttb:hover{background:var(--p);color:#fff;transform:rotate(15deg)}
        .pc{flex:1;padding:28px;overflow-y:auto}
        .lc{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#060d1f,#0f1d3a,#1a3a6b,#2a5298);position:relative;overflow:hidden}
        .lc::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(33,150,243,.08),transparent 70%);top:-200px;right:-200px;border-radius:50%}
        .lc::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(0,200,83,.06),transparent 70%);bottom:-150px;left:-150px;border-radius:50%}
        .lcd{position:relative;z-index:1;width:100%;max-width:420px;background:#fff;border-radius:28px;padding:52px 40px;box-shadow:0 35px 100px rgba(0,0,0,.3);text-align:center;animation:fadeUp .6s}
        .llw{width:80px;height:80px;margin:0 auto 18px;border-radius:20px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 6px 24px rgba(26,58,107,.12)}.llw img{width:62px;height:62px;object-fit:contain}
        .lsn{font-size:1.5rem;font-weight:800;color:#1a1a2e;line-height:1.3}.lst{font-size:.72rem;color:#64748b;font-weight:500;text-transform:uppercase;letter-spacing:2.5px;margin-top:4px}
        .ld{display:flex;align-items:center;gap:14px;margin:28px 0}.ld::before,.ld::after{content:'';flex:1;height:1px;background:#e2e8f0}.ld span{font-size:.7rem;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:1.5px}
        .glb{width:100%;padding:15px 24px;background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:.92rem;font-weight:600;cursor:pointer;transition:.25s;box-shadow:0 4px 20px rgba(26,58,107,.2)}.glb:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(26,58,107,.3)}
        .card{background:#fff;border-radius:18px;padding:22px 26px;box-shadow:0 2px 12px rgba(0,0,0,.03);border:1px solid #eef2f8;margin-bottom:18px}
        .sr{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:22px}
        .stc{background:#fff;border-radius:18px;padding:20px 22px;box-shadow:0 2px 12px rgba(0,0,0,.03);border:1px solid #eef2f8;display:flex;align-items:center;gap:16px;cursor:pointer;transition:.25s}.stc:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.08)}
        .sci{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem}
        .sci.b{background:linear-gradient(135deg,rgba(26,58,107,.08),rgba(26,58,107,.04));color:var(--p)}.sci.g{background:linear-gradient(135deg,rgba(0,200,83,.08),rgba(0,200,83,.04));color:var(--s)}.sci.o{background:linear-gradient(135deg,rgba(255,152,0,.08),rgba(255,152,0,.04));color:var(--w)}.sci.r{background:linear-gradient(135deg,rgba(231,76,60,.08),rgba(231,76,60,.04));color:var(--d)}
        .sti h3{font-size:1.6rem;font-weight:800;line-height:1}.sti p{font-size:.7rem;color:#64748b;margin-top:3px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 20px;border-radius:10px;font-weight:600;font-size:.84rem;cursor:pointer;transition:.2s}.btn-p{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;box-shadow:0 3px 12px rgba(26,58,107,.18)}.btn-p:hover{box-shadow:0 6px 20px rgba(26,58,107,.28);transform:translateY(-1px)}.btn-s{background:linear-gradient(135deg,#00c853,#00e676);color:#fff;box-shadow:0 3px 12px rgba(0,200,83,.18)}.btn-d{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}.btn-o{background:#fff;border:2px solid #dde4f0;color:#1a1a2e}.btn-lg{padding:15px 28px;font-size:.92rem;border-radius:12px}
        .tbc{overflow-x:auto;border-radius:16px;border:1px solid #eef2f8}table{width:100%;border-collapse:collapse;background:#fff}thead{background:#f8fafd}th{padding:13px 18px;text-align:left;font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:#64748b}td{padding:11px 18px;border-top:1px solid #f4f7fb;font-size:.82rem}tbody tr:hover{background:#fafcfd}
        .fg{margin-bottom:14px}.fl{display:block;font-size:.72rem;font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;color:#64748b}.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
        .nc{position:fixed;top:18px;right:18px;z-index:3000;display:flex;flex-direction:column;gap:8px}.nt{background:#fff;border-radius:12px;padding:14px 18px;box-shadow:0 10px 35px rgba(0,0,0,.12);display:flex;align-items:flex-start;gap:10px;border-left:4px solid var(--p);min-width:280px;animation:slideIn .25s;font-size:.82rem}.nt.success{border-left-color:var(--s)}.nt.error{border-left-color:var(--d)}.nt.warning{border-left-color:var(--w)}
        .spinner{width:36px;height:36px;border:3px solid #eef2f8;border-top-color:var(--p);border-radius:50%;animation:spin .5s linear infinite;margin:18px auto}
        .cam-box{position:relative;background:linear-gradient(170deg,#080f1a,#0f1d30,#162540);border-radius:22px;overflow:hidden;width:100%;max-width:700px;margin:0 auto;aspect-ratio:4/3;box-shadow:0 24px 64px rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.04)}.cam-box video{width:100%;height:100%;object-fit:cover}.cam-box canvas{position:absolute;top:0;left:0;width:100%;height:100%}
        .cam-hud{position:absolute;top:16px;left:16px;right:16px;display:flex;justify-content:space-between;z-index:5}.hud-badge{background:rgba(0,0,0,.5);backdrop-filter:blur(12px);color:#fff;padding:8px 16px;border-radius:22px;font-size:.72rem;font-weight:600;display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.06)}.hud-dot{width:10px;height:10px;border-radius:50%}.hud-dot.on{background:#00e676;box-shadow:0 0 14px rgba(0,230,118,.6);animation:pulse 1.2s infinite}.hud-dot.off{background:#e74c3c}.match-badge{background:rgba(0,0,0,.5);backdrop-filter:blur(12px);color:#fff;padding:8px 16px;border-radius:22px;font-size:.72rem;font-weight:600;border:1px solid rgba(255,255,255,.06)}
        .success-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:20}.success-card{background:#fff;border-radius:22px;padding:32px 38px;text-align:center;animation:scaleIn .3s;box-shadow:0 24px 60px rgba(0,0,0,.2)}.success-icon{font-size:3.5rem;animation:bounceIn .5s}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:2500;display:flex;align-items:center;justify-content:center}.modal{background:#fff;border-radius:22px;padding:30px;max-width:560px;width:95%;max-height:82vh;overflow-y:auto;animation:scaleIn .2s;box-shadow:0 30px 70px rgba(0,0,0,.25)}
        @keyframes fadeUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}@keyframes slideIn{from{opacity:0;transform:translateX(35px)}to{opacity:1;transform:translateX(0)}}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.1)}}@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
        @media(max-width:1024px){.mc{margin-left:0}.sr{grid-template-columns:repeat(2,1fr)}.sb{transform:translateX(-100%);width:250px}.sb.mo{transform:translateX(0)}}@media(max-width:768px){.pc{padding:14px}.sr{grid-template-columns:1fr}.fr,.fr3{grid-template-columns:1fr}.cam-box{aspect-ratio:1/1}.modal{padding:20px}}
    </style>
</head>
<body>

<div id="lp" class="lc"><div class="lcd"><div class="llw"><img src="logo.png" alt="SEBS" onerror="this.innerHTML='🏫'"></div><h1 class="lsn">Systematic English<br>Boarding School</h1><p class="lst">Smart Attendance System</p><div class="ld"><span>सुरक्षित पहुँच / Secure Access</span></div><button class="glb" onclick="login()">🔑 Sign in to Continue</button></div></div>

<div id="app" class="ac" style="display:none">
    <aside id="sb" class="sb"><div class="sh"><div class="slogo"><img src="logo.png" alt="SEBS" onerror="this.innerHTML='🏫'"></div><h2 class="sn">SEBS</h2></div><nav class="snv"><ul class="sm">
        <li class="si act" data-p="db"><a href="#" class="sl" onclick="nav('db')"><i class="fas fa-th-large"></i><span>ड्यासबोर्ड / Dashboard</span></a></li>
        <li class="si" data-p="att"><a href="#" class="sl" onclick="nav('att')"><i class="fas fa-camera"></i><span>लाइभ हाजिरी / Live Attendance</span></a></li>
        <li class="si" data-p="reg"><a href="#" class="sl" onclick="nav('reg')"><i class="fas fa-user-plus"></i><span>दर्ता / Registration</span></a></li>
        <li class="si" data-p="stu"><a href="#" class="sl" onclick="nav('stu')"><i class="fas fa-users"></i><span>विद्यार्थी / Students</span></a></li>
        <li class="si" data-p="rep"><a href="#" class="sl" onclick="nav('rep')"><i class="fas fa-chart-bar"></i><span>रिपोर्ट / Reports</span></a></li>
    </ul></nav><div class="sf"><button class="slo" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>बाहिरिनुहोस् / Logout</span></button></div></aside>
    <div class="so" id="so" onclick="cmsb()"></div>
    <main class="mc"><header class="tb"><span id="pt">ड्यासबोर्ड / Dashboard</span><div style="display:flex;align-items:center;gap:16px"><span class="td" id="td"></span><span class="tt" id="tt"></span><button class="ttb" onclick="tth()" id="tth"><i class="fas fa-moon"></i></button></div></header><div class="pc" id="pc"></div></main>
</div>
<div class="nc" id="nc"></div>
<div id="modalContainer"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbxqvvfI1j8aOnKNKjnnSfaGPJw5ANiW6XEnLehaHxJ8YjjegbId8uvcMcHQSaxzHkjM/exec';
const MODELS='https://raw.githubusercontent.com/sebs-school/sebs-smart-attendance/main/models';
let th='lt',stream=null,attendanceActive=false,modelsLoaded=false,preloading=false;
let faceMatcher=null,markedToday={},pendingDescriptor=null;
let lastMark=0,scanning=true,prevEAR=1,motionFrames=0,detectCount=0;

function init(){updateTime();setInterval(updateTime,1000);if(localStorage.getItem('s-login')==='1'){showApp();nav('db');}if(localStorage.getItem('s-theme')==='dt'){th='dt';document.body.style.background='linear-gradient(180deg,#0d1b2a,#1b2838)';document.getElementById('tth').innerHTML='<i class="fas fa-sun"></i>';}}
function updateTime(){const n=new Date();document.getElementById('td').textContent=n.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});document.getElementById('tt').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function tth(){th=th==='lt'?'dt':'lt';document.body.style.background=th==='dt'?'linear-gradient(180deg,#0d1b2a,#1b2838)':'linear-gradient(175deg,#e3ecfa,#f0f4fa,#f8f9fc)';document.getElementById('tth').innerHTML=th==='dt'?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';localStorage.setItem('s-theme',th);}
function login(){localStorage.setItem('s-login','1');showApp();nav('db');notify('✅ स्वागत छ! / Welcome!','success');}
function logout(){stopAttendance();localStorage.removeItem('s-login');document.getElementById('lp').style.display='flex';document.getElementById('app').style.display='none';}
function showApp(){document.getElementById('lp').style.display='none';document.getElementById('app').style.display='flex';}
function tmsb(){document.getElementById('sb').classList.toggle('mo');document.getElementById('so').classList.toggle('act');}
function cmsb(){document.getElementById('sb').classList.remove('mo');document.getElementById('so').classList.remove('act');}
function notify(m,t){const n=document.createElement('div');n.className=`nt ${t}`;n.innerHTML=`<div>${m}</div>`;document.getElementById('nc').appendChild(n);setTimeout(()=>{n.style.opacity='0';setTimeout(()=>n.remove(),150);},3000);}
async function api(action,data=null){try{if(data){const r=await fetch(API,{method:'POST',body:JSON.stringify({action,...data})});return await r.json();}else{const r=await fetch(API+'?action='+action);return await r.json();}}catch(e){return null;}}
function showModal(html){document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()">${html}</div></div>`;}

// ===== SSD MOBILENET V1 - MOST POWERFUL DETECTION =====
async function preloadModels(){if(modelsLoaded||preloading)return;preloading=true;notify('⏳ AI मोडेल लोड हुँदै... / Loading AI models...','warning');await Promise.all([faceapi.nets.ssdMobilenetv1.loadFromUri(MODELS),faceapi.nets.faceLandmark68Net.loadFromUri(MODELS),faceapi.nets.faceRecognitionNet.loadFromUri(MODELS)]);modelsLoaded=true;preloading=false;await loadAllEmbeddings();notify('✅ मोडेल तयार! / Models ready!','success');}
async function loadAllEmbeddings(){const d=await api('getAllEmbeddings');if(!d||!d.embeddings||d.embeddings.length===0){faceMatcher=null;return;}let lb=[];for(let e of d.embeddings){if(e.embedding&&Array.isArray(e.embedding))lb.push(new faceapi.LabeledFaceDescriptors(e.studentId,[new Float32Array(e.embedding)]));}faceMatcher=lb.length>0?new faceapi.FaceMatcher(lb,0.42):null;}

function nav(p){
    document.querySelectorAll('.si').forEach(e=>e.classList.remove('act'));const i=document.querySelector(`[data-p="${p}"]`);if(i)i.classList.add('act');
    const t={db:'ड्यासबोर्ड / Dashboard',att:'लाइभ हाजिरी / Live Attendance',reg:'दर्ता / Registration',stu:'विद्यार्थी / Students',rep:'रिपोर्ट / Reports'};document.getElementById('pt').textContent=t[p]||p;
    if(p==='att')preloadModels();else stopAttendance();const c=document.getElementById('pc');
    if(p==='db')loadDb(c);else if(p==='att')loadAtt(c);else if(p==='reg')loadReg(c);else if(p==='stu')loadStu(c);else if(p==='rep')loadRep(c);cmsb();
}

async function loadDb(c){c.innerHTML='<div class="spinner"></div>';const d=await api('getDashboard');if(!d){c.innerHTML='<p>त्रुटि / Error</p>';return;}const t=d.totalStudents||0,p=d.present||0,l=d.late||0,a=d.absent||0,pt=d.percentage||0;c.innerHTML=`<div class="sr"><div class="stc" onclick="nav('stu')"><div class="sci b"><i class="fas fa-users"></i></div><div class="sti"><h3>${t}</h3><p>कुल विद्यार्थी / Total</p></div></div><div class="stc"><div class="sci g"><i class="fas fa-check-circle"></i></div><div class="sti"><h3>${p}</h3><p>आज उपस्थित / Present</p></div></div><div class="stc"><div class="sci o"><i class="fas fa-clock"></i></div><div class="sti"><h3>${l}</h3><p>आज ढिलो / Late</p></div></div><div class="stc"><div class="sci r"><i class="fas fa-times-circle"></i></div><div class="sti"><h3>${a}</h3><p>आज अनुपस्थित / Absent</p></div></div></div><div style="display:grid;grid-template-columns:2fr 1fr;gap:18px"><div class="card" style="text-align:center;padding:36px"><div style="font-size:3.5rem;font-weight:900;color:var(--p)">${pt}%</div><p style="color:#64748b;margin-top:6px;font-weight:600">हाजिरी दर / Attendance Rate</p><div style="background:#eef2f8;height:8px;border-radius:4px;margin-top:14px;overflow:hidden"><div style="background:linear-gradient(90deg,var(--s),#00e676);height:100%;width:${pt}%;border-radius:4px;transition:width .5s"></div></div></div><div class="card"><h3 style="margin-bottom:14px">⚡ द्रुत कार्य / Quick Actions</h3><div style="display:flex;flex-direction:column;gap:10px"><button class="btn btn-p btn-lg" onclick="nav('att')"><i class="fas fa-camera"></i> हाजिरी सुरु / Start Attendance</button><button class="btn btn-o btn-lg" onclick="nav('reg')"><i class="fas fa-user-plus"></i> म्यानुअल दर्ता / Manual Registration</button></div></div></div>`;}

function loadReg(c){c.innerHTML=`<div class="card" style="max-width:700px;margin:0 auto"><h2 style="margin-bottom:18px">📝 विद्यार्थी दर्ता / Student Registration</h2><form id="rf" onsubmit="return submitReg()"><div class="fr"><div class="fg"><label class="fl">नाम / Name *</label><input id="sn" required></div><div class="fg"><label class="fl">भर्ना नं. / Admission No</label><input id="sa"></div></div><div class="fr3"><div class="fg"><label class="fl">कक्षा / Class *</label><select id="sc" required><option value="">Select</option><option>Nursery</option><option>LKG</option><option>UKG</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select></div><div class="fg"><label class="fl">सेक्सन / Section</label><select id="ss"><option value="">Select</option><option>JUPITER</option><option>SATURN</option><option>URANUS</option><option>NEPTUNE</option></select></div><div class="fg"><label class="fl">रोल नं. / Roll</label><input id="sr"></div></div><div class="fr"><div class="fg"><label class="fl">लिङ्ग / Gender</label><select id="sg"><option value="">Select</option><option>Male</option><option>Female</option></select></div><div class="fg"><label class="fl">जन्म मिति / DOB</label><input type="date" id="sd"></div></div><div class="fr"><div class="fg"><label class="fl">बुबाको नाम / Father</label><input id="sf"></div><div class="fg"><label class="fl">आमाको नाम / Mother</label><input id="sm"></div></div><div class="fr"><div class="fg"><label class="fl">फोन / Phone</label><input id="sp"></div><div class="fg"><label class="fl">ठेगाना / Address</label><textarea id="saddr"></textarea></div></div><button class="btn btn-p btn-lg" style="width:100%;margin-top:8px"><i class="fas fa-save"></i> दर्ता गर्नुहोस् / Register</button></form></div>`;}
async function submitReg(){const b=document.querySelector('#rf .btn');b.disabled=true;b.innerHTML='<i class="fas fa-spinner fa-spin"></i> सेभ हुँदै...';const d={studentName:document.getElementById('sn').value,admissionNumber:document.getElementById('sa').value,class:document.getElementById('sc').value,section:document.getElementById('ss').value,rollNumber:document.getElementById('sr').value,gender:document.getElementById('sg').value,dateOfBirth:document.getElementById('sd').value,fatherName:document.getElementById('sf').value,motherName:document.getElementById('sm').value,guardianPhone:document.getElementById('sp').value,address:document.getElementById('saddr').value};const r=await api('registerStudent',d);b.disabled=false;b.innerHTML='<i class="fas fa-save"></i> दर्ता गर्नुहोस् / Register';if(r&&r.success){notify('✅ '+d.studentName+' दर्ता भयो! ID: '+r.studentId,'success');document.getElementById('rf').reset();}else notify('❌ दर्ता असफल! / Registration failed!','error');return false;}

function loadAtt(c){c.innerHTML=`<div><div class="cam-box"><video id="cam" autoplay playsinline muted></video><canvas id="overlay"></canvas><div class="cam-hud"><span class="hud-badge"><span class="hud-dot off" id="hudDot"></span><span id="hudText">रोकिएको / Stopped</span></span><span class="match-badge" id="matchBadge" style="display:none"></span></div><div id="successOverlay" style="display:none"></div></div><div style="text-align:center;margin-top:16px;display:flex;gap:10px;justify-content:center"><button class="btn btn-p btn-lg" id="startBtn" onclick="startAttendance()"><i class="fas fa-play"></i> सुरु गर्नुहोस् / Start</button><button class="btn btn-d btn-lg" id="stopBtn" onclick="stopAttendance()" style="display:none"><i class="fas fa-stop"></i> रोक्नुहोस् / Stop</button></div></div>`;}

async function startAttendance(){
    if(!modelsLoaded){notify('⏳ मोडेल लोड हुँदै... / Loading models...','warning');await preloadModels();}
    try{stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}});document.getElementById('cam').srcObject=stream;document.getElementById('startBtn').style.display='none';document.getElementById('stopBtn').style.display='inline-flex';document.getElementById('hudText').textContent='सक्रिय / Active';document.getElementById('hudDot').className='hud-dot on';attendanceActive=true;scanning=true;detectFaces();notify('✅ क्यामेरा सक्रिय! / Camera Active! SSD MobileNet','success');}catch(e){notify('❌ क्यामेरा त्रुटि / Camera error','error');stopAttendance();}
}
function stopAttendance(){attendanceActive=false;if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}document.getElementById('hudText').textContent='रोकिएको / Stopped';document.getElementById('hudDot').className='hud-dot off';document.getElementById('startBtn').style.display='inline-flex';document.getElementById('stopBtn').style.display='none';document.getElementById('successOverlay').style.display='none';document.getElementById('matchBadge').style.display='none';}

// ===== SSD MOBILENET DETECTION =====
async function detectFaces(){
    if(!attendanceActive||!scanning)return;
    const video=document.getElementById('cam'),canvas=document.getElementById('overlay');if(!video||!canvas)return;
    try{
        const faces=await faceapi.detectAllFaces(video,new faceapi.SsdMobilenetv1Options({minConfidence:0.3})).withFaceLandmarks().withFaceDescriptors();
        canvas.width=video.videoWidth;canvas.height=video.videoHeight;const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);
        const rs=faceapi.resizeResults(faces,{width:video.videoWidth,height:video.videoHeight});detectCount++;
        if(rs.length>0){
            const d=rs[0],box=d.detection.box;let bm=null,ik=false;
            if(faceMatcher&&d.descriptor){bm=faceMatcher.findBestMatch(d.descriptor);ik=bm.label!=='unknown'&&bm.distance<0.42;}
            const color=ik?'#00c853':'#2196f3',cx=box.x+box.width/2,cy=box.y+box.height/2,rad=Math.max(box.width,box.height)/1.35;
            const g=ctx.createRadialGradient(cx,cy,rad*.5,cx,cy,rad*1.6);g.addColorStop(0,ik?'rgba(0,200,83,0.1)':'rgba(33,150,243,0.1)');g.addColorStop(1,'transparent');
            ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,rad*1.6,0,2*Math.PI);ctx.fill();
            ctx.strokeStyle=color;ctx.lineWidth=3;ctx.shadowColor=color;ctx.shadowBlur=16;ctx.beginPath();ctx.arc(cx,cy,rad,0,2*Math.PI);ctx.stroke();ctx.shadowBlur=0;
            ctx.strokeStyle=color;ctx.lineWidth=1.2;ctx.globalAlpha=.6;ctx.beginPath();ctx.arc(cx,cy,rad-6,0,2*Math.PI);ctx.stroke();ctx.globalAlpha=1;
            for(let a=0;a<360;a+=60){ctx.fillStyle=color;ctx.beginPath();ctx.arc(cx+Math.cos(a*Math.PI/180)*(rad+8),cy+Math.sin(a*Math.PI/180)*(rad+8),2.5,0,2*Math.PI);ctx.fill();}
            const lb=ik?'✅ '+bm.label.substring(0,12):'🆕 नयाँ अनुहार';ctx.font='bold 11px Inter';const tw=ctx.measureText(lb).width,ly=cy+rad+24;
            ctx.fillStyle='rgba(0,0,0,.75)';ctx.beginPath();ctx.roundRect(cx-tw/2-8,ly-13,tw+16,20,10);ctx.fill();ctx.fillStyle='#fff';ctx.fillText(lb,cx-tw/2,ly);
            document.getElementById('matchBadge').style.display='flex';document.getElementById('matchBadge').textContent=ik?'✅ चिनियो / Recognized':'🆕 नयाँ / New';document.getElementById('matchBadge').style.borderColor=color;
            if(d.descriptor&&Date.now()-lastMark>2000){const live=checkLive(d);if(live){lastMark=Date.now();scanning=false;
                if(ik){const sid=bm.label;if(!markedToday[sid]){const r=await api('markAttendance',{studentName:sid,studentId:sid,class:'',section:'',rollNumber:'',confidence:(1-bm.distance).toFixed(2)});if(r&&r.success){markedToday[sid]=true;showSuccess(sid,r.status||'Present');}else scanning=true;}else{notify('⚠️ '+sid+' - आज पहिल्यै हाजिर भइसकेको! / Already marked!','warning');scanning=true;}}
                else{pendingDescriptor=Array.from(d.descriptor);showRegModal();}
            }}
        }else{document.getElementById('matchBadge').style.display='none';if(detectCount%10===0)notify('📷 अनुहार खोज्दै... / Searching...','warning');}
    }catch(e){}
    if(attendanceActive&&scanning)requestAnimationFrame(detectFaces);
}

function checkLive(detection){if(!detection.landmarks)return true;const lm=detection.landmarks,le=eyeAR(lm.positions,38,40,36,39),re=eyeAR(lm.positions,44,46,42,45),ear=(le+re)/2;let blinked=(ear<0.18&&prevEAR>0.18);prevEAR=ear;if(blinked){motionFrames=0;notify('✅ जीवन्तता: आँखा झिम्काइ / Liveness: Blink!','success');return true;}motionFrames++;if(motionFrames>8){motionFrames=0;notify('✅ जीवन्तता: चाल / Liveness: Motion','success');return true;}return false;}
function eyeAR(lm,t,b,lt,rt){const tp=lm[t],bp=lm[b],lp=lm[lt],rp=lm[rt],v=Math.abs(tp.y-bp.y),h=Math.abs(lp.x-rp.x);return h<.001?1:v/h;}

function showSuccess(name,status){const ov=document.getElementById('successOverlay');ov.style.display='flex';ov.innerHTML=`<div class="success-card"><div class="success-icon">✅</div><h3 style="color:#00c853;margin-top:4px">${status}!</h3><p style="font-weight:700;font-size:1.1rem">${name}</p><p style="color:#64748b;font-size:.78rem;margin-top:4px">हाजिर भयो! / Marked Present!</p></div>`;setTimeout(()=>{ov.style.display='none';scanning=true;detectFaces();},2000);}

function showRegModal(){showModal(`<h3 style="margin-bottom:2px;color:#2196f3">🆕 नयाँ अनुहार भेटियो / New Face Detected</h3><p style="color:#00c853;font-weight:600;margin-bottom:12px;font-size:.82rem">✅ जीवन्तता पुष्टि भयो / Liveness Verified</p><form onsubmit="return quickReg(event)"><div class="fr"><div class="fg"><label class="fl">पूरा नाम / Full Name *</label><input id="qn" required></div><div class="fg"><label class="fl">भर्ना नं. / Admission No</label><input id="qa"></div></div><div class="fr"><div class="fg"><label class="fl">कक्षा / Class *</label><select id="qc" required><option value="">Select</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select></div><div class="fg"><label class="fl">सेक्सन / Section</label><select id="qs"><option value="">Select</option><option>JUPITER</option><option>SATURN</option><option>URANUS</option><option>NEPTUNE</option></select></div></div><div class="fr"><div class="fg"><label class="fl">रोल नं. / Roll</label><input id="qr"></div><div class="fg"><label class="fl">लिङ्ग / Gender</label><select id="qg"><option value="">Select</option><option>Male</option><option>Female</option></select></div></div><div class="fr"><div class="fg"><label class="fl">बुबाको नाम / Father</label><input id="qf"></div><div class="fg"><label class="fl">आमाको नाम / Mother</label><input id="qm"></div></div><div class="fr"><div class="fg"><label class="fl">फोन / Phone</label><input id="qp"></div><div class="fg"><label class="fl">ठेगाना / Address</label><textarea id="qad"></textarea></div></div><button class="btn btn-p btn-lg" style="width:100%;margin-top:10px"><i class="fas fa-save"></i> दर्ता गरी हाजिर गर्नुहोस् / Register & Mark Present</button></form>`);}

async function quickReg(e){e.preventDefault();const d={studentName:document.getElementById('qn').value,admissionNumber:document.getElementById('qa').value,class:document.getElementById('qc').value,section:document.getElementById('qs').value,rollNumber:document.getElementById('qr').value,gender:document.getElementById('qg').value,fatherName:document.getElementById('qf').value,motherName:document.getElementById('qm').value,guardianPhone:document.getElementById('qp').value,address:document.getElementById('qad').value};if(pendingDescriptor)d.embedding=pendingDescriptor;const r=await api('registerStudent',d);if(r&&r.success){await api('markAttendance',{studentName:d.studentName,studentId:r.studentId,class:d.class,section:d.section,rollNumber:d.rollNumber,confidence:'0.99'});notify('✅ '+d.studentName+' दर्ता भई हाजिर भयो! / Registered & Marked!','success');document.getElementById('modalContainer').innerHTML='';loadAllEmbeddings();showSuccess(d.studentName,'Present');}else{notify('❌ असफल! / Failed!','error');scanning=true;detectFaces();}return false;}

async function loadStu(c){c.innerHTML='<div class="spinner"></div>';const d=await api('getStudents');if(!d||!d.students){c.innerHTML='<div class="card"><p style="text-align:center;padding:30px;color:#64748b">कुनै विद्यार्थी छैन / No students</p></div>';return;}let h='<div class="card"><h2 style="margin-bottom:12px">👨‍🎓 विद्यार्थीहरू / Students ('+d.students.length+')</h2><div class="tbc"><table><thead><tr><th>ID</th><th>नाम / Name</th><th>कक्षा / Class</th><th>सेक्सन</th><th>रोल</th><th>लिङ्ग</th><th>फोन</th></tr></thead><tbody>';d.students.forEach(s=>{h+=`<tr><td><small>${s.StudentID||'-'}</small></td><td><strong>${s.StudentName||'-'}</strong></td><td>${s.Class||'-'}</td><td>${s.Section||'-'}</td><td>${s.RollNumber||'-'}</td><td>${s.Gender||'-'}</td><td>${s.GuardianPhone||'-'}</td></tr>`;});h+='</tbody></table></div></div>';c.innerHTML=h;}
function loadRep(c){c.innerHTML=`<div class="card"><h2 style="margin-bottom:12px">📊 रिपोर्ट / Reports</h2><button class="btn btn-p" onclick="loadRepData()"><i class="fas fa-download"></i> लोड गर्नुहोस् / Load</button></div><div id="rv" style="margin-top:12px"></div>`;}
async function loadRepData(){const v=document.getElementById('rv');v.innerHTML='<div class="spinner"></div>';const d=await api('getStudents');if(!d){v.innerHTML='<p>त्रुटि / Error</p>';return;}v.innerHTML='<div class="card"><table><thead><tr><th>नाम / Name</th><th>कक्षा</th><th>सेक्सन</th><th>रोल</th><th>फोन</th></tr></thead><tbody>'+d.students.map(s=>`<tr><td><strong>${s.StudentName}</strong></td><td>${s.Class}</td><td>${s.Section}</td><td>${s.RollNumber}</td><td>${s.GuardianPhone||'-'}</td></tr>`).join('')+'</tbody></table></div>';}

document.addEventListener('DOMContentLoaded',init);
</script>
