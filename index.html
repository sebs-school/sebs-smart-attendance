<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEBS Smart Attendance</title>
    <link rel="icon" href="logo.png">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root{--p:#1a3a6b;--pl:#2a5298;--s:#2ecc71;--w:#f39c12;--d:#e74c3c;--r:14px}
        .lt{--bg:#f6f8fc;--bg2:#fff;--bg3:#edf1f7;--bgS:#0f1a30;--bgC:#fff;--t:#1a1a2e;--t2:#5a6070;--tS:#b0bec5;--b:#e2e6ed}
        .dt{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bgS:#010409;--bgC:#161b22;--t:#e6edf3;--t2:#8b949e;--tS:#6e7681;--b:#30363d}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;transition:all .3s}a{text-decoration:none;color:inherit}ul{list-style:none}button{cursor:pointer;border:none;outline:none;font-family:inherit;font-size:inherit}input,select,textarea{font-family:inherit;font-size:inherit;border:2px solid var(--b);border-radius:10px;padding:12px 16px;background:var(--bgC);color:var(--t);width:100%;transition:all .2s}input:focus,select:focus,textarea:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(26,58,107,.06);outline:none}textarea{resize:vertical;min-height:60px}
        .ac{display:flex;min-height:100vh}.mc{flex:1;margin-left:260px;min-height:100vh;display:flex;flex-direction:column}.sb{width:260px;height:100vh;background:var(--bgS);position:fixed;left:0;top:0;z-index:1000;display:flex;flex-direction:column;overflow:hidden;transition:all .3s}.sh{height:70px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid rgba(255,255,255,.06);gap:12px}.slogo{width:42px;height:42px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}.slogo img{width:34px;height:34px;object-fit:contain}.sn{font-weight:700;font-size:1.05rem;color:#fff;white-space:nowrap}.snv{flex:1;overflow-y:auto;padding:12px 10px}.sm{display:flex;flex-direction:column;gap:2px}.si{border-radius:10px;transition:all .15s}.si:hover{background:rgba(255,255,255,.06)}.si.act{background:rgba(255,255,255,.12)}.sl{display:flex;align-items:center;gap:12px;padding:11px 15px;color:var(--tS);font-size:.875rem;font-weight:500;border-radius:10px;white-space:nowrap;overflow:hidden}.sl i{font-size:1.1rem;width:22px;text-align:center;flex-shrink:0}.sf{padding:12px 10px;border-top:1px solid rgba(255,255,255,.06)}.slo{width:100%;display:flex;align-items:center;gap:12px;padding:11px 15px;background:rgba(231,76,60,.08);color:#ec7063;font-size:.875rem;font-weight:500;border-radius:10px;cursor:pointer;transition:all .15s}.slo:hover{background:rgba(231,76,60,.15)}.so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999}.so.act{display:block}.tb{height:70px;background:var(--bgC);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:900}#pt{font-size:1.2rem;font-weight:700}.td{font-size:.8rem;color:var(--t2)}.tt{font-size:.85rem;font-weight:700;color:var(--p);font-family:'SF Mono','Fira Code',monospace}.ttb{background:var(--bg3);color:var(--t);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .2s}.ttb:hover{background:var(--p);color:#fff;transform:rotate(15deg)}.pc{flex:1;padding:28px;overflow-y:auto}
        .lc{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a1628 0%,#1a3a6b 50%,#2a5298 100%)}.lcd{width:100%;max-width:430px;background:rgba(255,255,255,.96);border-radius:28px;padding:52px 44px;box-shadow:0 40px 100px rgba(0,0,0,.35);text-align:center;animation:fadeUp .6s}.llw{width:88px;height:88px;margin:0 auto 20px;border-radius:20px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 40px rgba(26,58,107,.15);overflow:hidden}.llw img{width:70px;height:70px;object-fit:contain}.lsn{font-size:1.6rem;font-weight:800;color:#1a1a2e;line-height:1.3}.lst{font-size:.8rem;color:#636e72;font-weight:500;text-transform:uppercase;letter-spacing:2px;margin-top:4px}.ld{display:flex;align-items:center;gap:16px;margin:28px 0}.ld::before,.ld::after{content:'';flex:1;height:1px;background:#e0e5ec}.ld span{font-size:.7rem;color:#a0a8b0;font-weight:600;text-transform:uppercase;letter-spacing:1.5px}.glb{width:100%;padding:15px 24px;background:var(--p);color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(26,58,107,.25)}.glb:hover{background:var(--pl);transform:translateY(-2px);box-shadow:0 8px 30px rgba(26,58,107,.35)}
        .card{background:var(--bgC);border-radius:var(--r);padding:24px 28px;box-shadow:0 1px 4px rgba(0,0,0,.04);border:1px solid var(--b);margin-bottom:22px}.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:24px}.stc{background:var(--bgC);border-radius:var(--r);padding:22px 24px;box-shadow:0 1px 4px rgba(0,0,0,.04);border:1px solid var(--b);display:flex;align-items:center;gap:18px;cursor:pointer;transition:all .25s}.stc:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.08)}.sci{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem}.sci.b{background:rgba(26,58,107,.06);color:var(--p)}.sci.g{background:rgba(46,204,113,.06);color:var(--s)}.sci.o{background:rgba(243,156,18,.06);color:var(--w)}.sci.r{background:rgba(231,76,60,.06);color:var(--d)}.sti h3{font-size:1.8rem;font-weight:800;line-height:1}.sti p{font-size:.75rem;color:var(--t2);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 22px;border-radius:10px;font-weight:600;font-size:.875rem;cursor:pointer;transition:all .2s;white-space:nowrap}.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pl);transform:translateY(-1px)}.btn-s{background:var(--s);color:#fff}.btn-d{background:var(--d);color:#fff}.btn-o{background:transparent;border:2px solid var(--b);color:var(--t)}.btn-lg{padding:15px 30px;font-size:.95rem;border-radius:12px}.tbc{overflow-x:auto;border-radius:var(--r);border:1px solid var(--b)}table{width:100%;border-collapse:collapse}thead{background:var(--bg3)}th{padding:13px 18px;text-align:left;font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--t2)}td{padding:12px 18px;border-top:1px solid var(--b);font-size:.85rem;font-weight:500}tbody tr:hover{background:var(--bg3)}.badge{display:inline-flex;padding:4px 12px;border-radius:20px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}.bg-s{background:rgba(46,204,113,.08);color:#27ae60}.bg-w{background:rgba(243,156,18,.08);color:#e67e22}.fg{margin-bottom:16px}.fl{display:block;font-size:.75rem;font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2)}.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}.nc{position:fixed;top:20px;right:20px;z-index:3000;display:flex;flex-direction:column;gap:10px}.nt{background:var(--bgC);border-radius:12px;padding:14px 18px;box-shadow:0 12px 40px rgba(0,0,0,.1);display:flex;align-items:flex-start;gap:12px;border-left:4px solid var(--p);min-width:320px;animation:slideIn .3s;font-size:.85rem}.nt.success{border-left-color:var(--s)}.nt.error{border-left-color:var(--d)}.spinner{width:40px;height:40px;border:3px solid var(--b);border-top-color:var(--p);border-radius:50%;animation:spin .6s linear infinite;margin:20px auto}
        
        .liveness-container{position:relative;background:linear-gradient(160deg,#0d1117,#1a2634);border-radius:20px;overflow:hidden;width:100%;max-width:720px;margin:0 auto;box-shadow:0 24px 80px rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.05)}.liveness-container video{width:100%;display:block;transform:scaleX(-1)}.liveness-container canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}.liveness-hud{position:absolute;top:20px;left:20px;right:20px;display:flex;justify-content:space-between;align-items:center;z-index:10}.hud-status{background:rgba(0,0,0,.7);backdrop-filter:blur(12px);color:#fff;padding:10px 18px;border-radius:30px;font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,.1)}.hud-dot{width:10px;height:10px;border-radius:50%}.hud-dot.active{background:#2ecc71;animation:pulse 1.2s infinite;box-shadow:0 0 12px rgba(46,204,113,.6)}.hud-dot.inactive{background:#e74c3c}.challenge-overlay{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);backdrop-filter:blur(16px);color:#fff;padding:16px 28px;border-radius:40px;font-size:1rem;font-weight:700;text-align:center;z-index:10;border:2px solid rgba(255,255,255,.15);animation:bounceIn .5s}.challenge-overlay.success{border-color:#2ecc71;background:rgba(46,204,113,.2)}.challenge-icon{font-size:2rem;display:block;margin-bottom:4px}.progress-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:2500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}.modal{background:var(--bgC);border-radius:24px;padding:36px;max-width:580px;width:95%;max-height:85vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,.4);animation:scaleIn .3s}@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.15)}}@keyframes bounceIn{0%{opacity:0;transform:translateX(-50%) scale(.8)}50%{transform:translateX(-50%) scale(1.05)}100%{opacity:1;transform:translateX(-50%) scale(1)}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}@media(max-width:1024px){.mc{margin-left:0}.sr{grid-template-columns:repeat(2,1fr)}.sb{transform:translateX(-100%);width:260px}.sb.mo{transform:translateX(0)}}@media(max-width:768px){.pc{padding:14px}.sr{grid-template-columns:1fr}.fr{grid-template-columns:1fr}.nc{left:10px;right:10px}.nt{min-width:auto}.liveness-container{border-radius:14px}}
    </style>
</head>
<body class="lt">

<div id="lp" class="lc"><div class="lcd"><div class="llw"><img src="logo.png" alt="SEBS" onerror="this.innerHTML='🏫'"></div><h1 class="lsn">Systematic English<br>Boarding School</h1><p class="lst">Smart Attendance System</p><p style="color:#e67e22;font-weight:600;margin-top:10px;font-size:.75rem">⚡ eSewa-Style Liveness</p><div class="ld"><span>Secure Access</span></div><button class="glb" onclick="login()">🔑 Sign in to Continue</button></div></div>

<div id="app" class="ac" style="display:none">
    <aside id="sb" class="sb"><div class="sh"><div class="slogo"><img src="logo.png" alt="SEBS" onerror="this.innerHTML='🏫'"></div><h2 class="sn">SEBS</h2></div><nav class="snv"><ul class="sm">
        <li class="si act" data-p="db"><a href="#" class="sl" onclick="nav('db')"><i class="fas fa-th-large"></i><span>Dashboard</span></a></li>
        <li class="si" data-p="att"><a href="#" class="sl" onclick="nav('att')"><i class="fas fa-camera"></i><span>Live Attendance</span></a></li>
        <li class="si" data-p="stu"><a href="#" class="sl" onclick="nav('stu')"><i class="fas fa-users"></i><span>Students</span></a></li>
        <li class="si" data-p="rep"><a href="#" class="sl" onclick="nav('rep')"><i class="fas fa-chart-bar"></i><span>Reports</span></a></li>
    </ul></nav><div class="sf"><button class="slo" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button></div></aside>
    <div class="so" id="so" onclick="cmsb()"></div>
    <main class="mc"><header class="tb"><span id="pt">Dashboard</span><div style="display:flex;align-items:center;gap:20px"><span class="td" id="td"></span><span class="tt" id="tt"></span><button class="ttb" onclick="tth()" id="tth"><i class="fas fa-moon"></i></button></div></header><div class="pc" id="pc"></div></main>
</div>
<div class="nc" id="nc"></div>
<div id="modalContainer"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbxqvvfI1j8aOnKNKjnnSfaGPJw5ANiW6XEnLehaHxJ8YjjegbId8uvcMcHQSaxzHkjM/exec';
let th='lt',attendanceActive=false,markedToday={};
let faceMesh,cameraInstance,challenge=null,challengePassed=false;
let blinkCount=0,blinkState='open',headTurnDone=false,lastEAR=1;

function init(){updateTime();setInterval(updateTime,1000);if(localStorage.getItem('s-login')==='1'){showApp();nav('db');}if(localStorage.getItem('s-theme')==='dt'){th='dt';document.body.className='dt';document.getElementById('tth').innerHTML='<i class="fas fa-sun"></i>';}}
function updateTime(){const n=new Date();document.getElementById('td').textContent=n.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});document.getElementById('tt').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function tth(){th=th==='lt'?'dt':'lt';document.body.className=th;document.getElementById('tth').innerHTML=th==='dt'?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';localStorage.setItem('s-theme',th);}
function login(){localStorage.setItem('s-login','1');showApp();nav('db');notify('Welcome!','success');}
function logout(){stopAttendance();localStorage.removeItem('s-login');document.getElementById('lp').style.display='flex';document.getElementById('app').style.display='none';}
function showApp(){document.getElementById('lp').style.display='none';document.getElementById('app').style.display='flex';}
function tmsb(){document.getElementById('sb').classList.toggle('mo');document.getElementById('so').classList.toggle('act');}
function cmsb(){document.getElementById('sb').classList.remove('mo');document.getElementById('so').classList.remove('act');}
function notify(m,t){const icons={success:'fa-check-circle',error:'fa-exclamation-circle'};const n=document.createElement('div');n.className=`nt ${t}`;n.innerHTML=`<div style="font-size:1.2rem"><i class="fas ${icons[t]}"></i></div><div><strong>${t==='success'?'Success':'Error'}</strong><p style="font-size:.72rem;margin-top:2px">${m}</p></div>`;document.getElementById('nc').appendChild(n);setTimeout(()=>{n.style.opacity='0';setTimeout(()=>n.remove(),300);},3000);}
async function api(action,data=null){try{if(data){const r=await fetch(API,{method:'POST',body:JSON.stringify({action,...data})});return await r.json();}else{const r=await fetch(API+'?action='+action);return await r.json();}}catch(e){return null;}}
function showModal(html){document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()">${html}</div></div>`;}

function nav(p){
    document.querySelectorAll('.si').forEach(e=>e.classList.remove('act'));
    const i=document.querySelector(`[data-p="${p}"]`);if(i)i.classList.add('act');
    document.getElementById('pt').textContent={db:'Dashboard',att:'Live Attendance',stu:'Students',rep:'Reports'}[p]||p;
    if(p!=='att')stopAttendance();
    const c=document.getElementById('pc');
    if(p==='db')loadDb(c);else if(p==='att')loadAtt(c);else if(p==='stu')loadStu(c);else if(p==='rep')loadRep(c);
    cmsb();
}

async function loadDb(c){c.innerHTML='<div class="spinner"></div>';const d=await api('getDashboard');if(!d){c.innerHTML='<p>Error</p>';return;}const t=d.totalStudents||0,p=d.present||0,l=d.late||0,a=d.absent||0;c.innerHTML=`<div style="background:var(--bg3);padding:12px 20px;border-radius:var(--r);margin-bottom:24px;text-align:center;font-weight:600;font-size:.8rem">🔐 eSewa-Style Liveness | Blink + Head Movement</div><div class="sr"><div class="stc" onclick="nav('stu')"><div class="sci b"><i class="fas fa-users"></i></div><div class="sti"><h3>${t}</h3><p>Total Students</p></div></div><div class="stc"><div class="sci g"><i class="fas fa-check-circle"></i></div><div class="sti"><h3>${p}</h3><p>Present</p></div></div><div class="stc"><div class="sci o"><i class="fas fa-clock"></i></div><div class="sti"><h3>${l}</h3><p>Late</p></div></div><div class="stc"><div class="sci r"><i class="fas fa-times-circle"></i></div><div class="sti"><h3>${a}</h3><p>Absent</p></div></div></div><div style="display:grid;grid-template-columns:2fr 1fr;gap:24px"><div class="card" style="text-align:center;padding:40px"><div style="font-size:4rem;font-weight:900;color:var(--p)">${d.percentage||0}%</div><p style="color:var(--t2);margin-top:8px">Rate</p></div><div class="card"><h3>Quick Actions</h3><button class="btn btn-p btn-lg" style="width:100%;margin-top:12px" onclick="nav('att')"><i class="fas fa-camera"></i> Start Attendance</button></div></div>`;}

function loadAtt(c){
    c.innerHTML=`<div style="display:grid;grid-template-columns:2fr 1fr;gap:24px"><div><div class="liveness-container"><video id="cam" autoplay playsinline muted></video><canvas id="overlay"></canvas><div class="liveness-hud"><span class="hud-status"><span class="hud-dot inactive" id="hudDot"></span><span id="hudText">Stopped</span></span><span class="hud-status" id="challengeBadge" style="display:none">🎯 Waiting...</span></div><div id="challengeOverlay" style="display:none"></div></div><div style="text-align:center;margin-top:20px;display:flex;gap:12px;justify-content:center"><button class="btn btn-p btn-lg" id="startBtn" onclick="startAttendance()"><i class="fas fa-play"></i> Start Attendance</button><button class="btn btn-d btn-lg" id="stopBtn" onclick="stopAttendance()" style="display:none"><i class="fas fa-stop"></i> Stop</button></div></div><div class="card"><h3>📋 Today</h3><div id="attList" style="max-height:500px;overflow-y:auto;margin-top:12px">Loading...</div></div></div>`;
    loadAttList();
}

async function startAttendance(){
    try{
        const stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}});
        document.getElementById('cam').srcObject=stream;
        document.getElementById('startBtn').style.display='none';
        document.getElementById('stopBtn').style.display='inline-flex';
        document.getElementById('hudText').textContent='Loading...';
        
        faceMesh=new FaceMesh({locateFile:(f)=>`https://raw.githubusercontent.com/sebs-school/sebs-smart-attendance/main/models/${f}`});
        faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
        faceMesh.onResults(onFaceResults);
        
        cameraInstance=new Camera(document.getElementById('cam'),{onFrame:async()=>{await faceMesh.send({image:document.getElementById('cam')});},width:640,height:480});
        await cameraInstance.start();
        
        document.getElementById('hudText').textContent='Active';
        document.getElementById('hudDot').className='hud-dot active';
        attendanceActive=true;
        startChallenge();
        notify('✅ Liveness active! Follow the instruction','success');
    }catch(e){notify('❌ Camera error: '+e.message,'error');stopAttendance();}
}

function stopAttendance(){
    attendanceActive=false;
    if(cameraInstance)cameraInstance.stop();
    const v=document.getElementById('cam');if(v&&v.srcObject){v.srcObject.getTracks().forEach(t=>t.stop());}
    document.getElementById('hudText').textContent='Stopped';
    document.getElementById('hudDot').className='hud-dot inactive';
    document.getElementById('startBtn').style.display='inline-flex';
    document.getElementById('stopBtn').style.display='none';
    document.getElementById('challengeOverlay').style.display='none';
    document.getElementById('challengeBadge').style.display='none';
}

function startChallenge(){
    const challenges=[
        {type:'blink',text:'👁️ Blink Your Eyes',icon:'👁️',detail:'Please blink both eyes clearly'},
        {type:'head',text:'🔄 Turn Head Slowly',icon:'🔄',detail:'Move head left and right'}
    ];
    challenge=challenges[Math.floor(Math.random()*2)];
    challengePassed=false;blinkCount=0;headTurnDone=false;lastEAR=1;
    
    const ov=document.getElementById('challengeOverlay');
    ov.innerHTML=`<span class="challenge-icon">${challenge.icon}</span>${challenge.text}<br><small style="font-size:.7rem;opacity:.7">${challenge.detail}</small>`;
    ov.style.display='block';ov.className='challenge-overlay';
    document.getElementById('challengeBadge').style.display='flex';
    document.getElementById('challengeBadge').textContent='🎯 '+challenge.text;
}

function onFaceResults(results){
    if(!attendanceActive)return;
    const canvas=document.getElementById('overlay'),video=document.getElementById('cam');
    if(!canvas||!video)return;
    const ctx=canvas.getContext('2d');
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    if(results.multiFaceLandmarks&&results.multiFaceLandmarks.length>0){
        const landmarks=results.multiFaceLandmarks[0];
        
        // Draw face mesh
        ctx.strokeStyle='rgba(46,204,113,.3)';ctx.lineWidth=1;
        for(let i=0;i<landmarks.length;i++){
            const p=landmarks[i];
            ctx.fillStyle='rgba(46,204,113,.5)';
            ctx.beginPath();ctx.arc(p.x*canvas.width,p.y*canvas.height,1.5,0,2*Math.PI);ctx.fill();
        }
        
        // Draw eye contours
        const leftEye=[33,133,155,154,153,145,144,163,7,173,157,158,159,160,161,246];
        const rightEye=[362,263,387,386,385,373,374,380,381,382,398,384,385,386,387,388];
        
        ctx.strokeStyle='#2ecc71';ctx.lineWidth=2;
        [leftEye,rightEye].forEach(eye=>{
            ctx.beginPath();
            for(let i=0;i<eye.length;i++){const p=landmarks[eye[i]];if(i===0)ctx.moveTo(p.x*canvas.width,p.y*canvas.height);else ctx.lineTo(p.x*canvas.width,p.y*canvas.height);}
            ctx.closePath();ctx.stroke();
        });
        
        // EAR calculation for blink
        const leftEAR=calcEAR(landmarks,leftEye.slice(0,6));
        const rightEAR=calcEAR(landmarks,rightEye.slice(0,6));
        const ear=(leftEAR+rightEAR)/2;
        
        // Blink detection
        if(ear<0.2&&lastEAR>0.2){blinkCount++;}
        lastEAR=ear;
        
        // Head pose
        const nose=landmarks[1];
        const leftCheek=landmarks[234];
        const rightCheek=landmarks[454];
        const headTurn=Math.abs(nose.x-leftCheek.x)/(Math.abs(rightCheek.x-leftCheek.x)+0.001);
        
        if(headTurn<0.4||headTurn>0.6)headTurnDone=true;
        
        // Check challenge
        if(challenge&&!challengePassed){
            if(challenge.type==='blink'&&blinkCount>=2)challengePassed=true;
            if(challenge.type==='head'&&headTurnDone)challengePassed=true;
            
            if(challengePassed){
                document.getElementById('challengeOverlay').className='challenge-overlay success';
                document.getElementById('challengeOverlay').innerHTML='<span class="challenge-icon">✅</span>Liveness Passed!<br><small style="font-size:.7rem">Opening registration...</small>';
                document.getElementById('challengeBadge').textContent='✅ Passed!';
                
                setTimeout(()=>{
                    document.getElementById('challengeOverlay').style.display='none';
                    showRegistrationModal();
                    stopAttendance();
                },800);
            }
        }
    }
}

function calcEAR(landmarks,indices){
    const p=indices.map(i=>landmarks[i]);
    const a=Math.hypot(p[1].y-p[5].y,p[1].x-p[5].x);
    const b=Math.hypot(p[2].y-p[4].y,p[2].x-p[4].x);
    const c=Math.hypot(p[0].y-p[3].y,p[0].x-p[3].x);
    return(a+b)/(2*c+0.001);
}

async function quickReg(e){e.preventDefault();const d={studentName:document.getElementById('qsn').value,admissionNumber:document.getElementById('qsa2').value,class:document.getElementById('qsc').value,section:document.getElementById('qss').value,rollNumber:document.getElementById('qsr').value,gender:document.getElementById('qsg').value,fatherName:document.getElementById('qsf').value,motherName:document.getElementById('qsm').value,guardianPhone:document.getElementById('qsp').value,address:document.getElementById('qsaddr').value};const r=await api('registerStudent',d);if(r&&r.success){const ar=await api('markAttendance',{studentName:d.studentName,studentId:r.studentId,class:d.class,section:d.section,rollNumber:d.rollNumber,confidence:'0.99'});notify('✅ Registered & Marked Present!','success');document.getElementById('modalContainer').innerHTML='';loadAttList();}else notify('❌ Failed','error');return false;}

async function loadAttList(){const el=document.getElementById('attList');if(!el)return;const d=await api('getStudents');el.innerHTML=d&&d.students?d.students.map(s=>`<div style="padding:10px 0;border-bottom:1px solid var(--b);display:flex;justify-content:space-between"><strong>${s.StudentName}</strong><span style="color:var(--t2);font-size:.78rem">${s.Class||'-'} ${s.Section||'-'}</span></div>`).join(''):'<p style="color:var(--t2)">No students</p>';}
async function loadStu(c){c.innerHTML='<div class="spinner"></div>';const d=await api('getStudents');if(!d||!d.students){c.innerHTML='<div class="card"><p style="text-align:center;padding:40px;color:var(--t2)">No students</p></div>';return;}let h='<div class="card"><h2>Students ('+d.students.length+')</h2><div class="tbc" style="margin-top:16px"><table><thead><tr><th>ID</th><th>Name</th><th>Class</th><th>Section</th><th>Roll</th><th>Gender</th><th>Phone</th><th>Address</th></tr></thead><tbody>';d.students.forEach(s=>{h+=`<tr><td><small>${s.StudentID||'-'}</small></td><td><strong>${s.StudentName||'-'}</strong></td><td>${s.Class||'-'}</td><td>${s.Section||'-'}</td><td>${s.RollNumber||'-'}</td><td>${s.Gender||'-'}</td><td>${s.GuardianPhone||'-'}</td><td>${(s.Address||'-').substring(0,25)}</td></tr>`;});h+='</tbody></table></div></div>';c.innerHTML=h;}
function loadRep(c){c.innerHTML=`<div class="card"><h2>Reports</h2><button class="btn btn-p" onclick="loadRepData()"><i class="fas fa-download"></i> Load</button></div><div id="rv" style="margin-top:16px"></div>`;}
async function loadRepData(){const v=document.getElementById('rv');v.innerHTML='<div class="spinner"></div>';const d=await api('getStudents');if(!d){v.innerHTML='<p>Error</p>';return;}v.innerHTML='<div class="card"><table><thead><tr><th>Name</th><th>Class</th><th>Section</th><th>Roll</th><th>Phone</th><th>Address</th></tr></thead><tbody>'+d.students.map(s=>`<tr><td><strong>${s.StudentName}</strong></td><td>${s.Class}</td><td>${s.Section}</td><td>${s.RollNumber}</td><td>${s.GuardianPhone||'-'}</td><td>${s.Address||'-'}</td></tr>`).join('')+'</tbody></table></div>';}

document.addEventListener('DOMContentLoaded',init);
